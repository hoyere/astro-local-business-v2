<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .pool-bg {
        background-color: #f5fbf8;
        background-image: url('data:image/svg+xml;utf8,<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg"><g opacity="0.15"><path d="M100 100 Q150 50 200 100 T300 100 T400 100 T500 100 T600 100 T700 100" stroke="%23028fc7" stroke-width="8" fill="none"/><ellipse cx="200" cy="200" rx="80" ry="60" fill="%23028fc7"/><ellipse cx="600" cy="400" rx="100" ry="70" fill="%23028fc7"/><ellipse cx="400" cy="300" rx="120" ry="90" fill="%23028fc7"/><ellipse cx="700" cy="200" rx="60" ry="40" fill="%23028fc7"/><ellipse cx="100" cy="400" rx="70" ry="50" fill="%23028fc7"/></g></svg>');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section pool-bg py-16 md:py-24">
      <div class="container mx-auto px-4 max-w-4xl text-center">
        <div class="flex items-center justify-center mb-4">
          <span class="inline-block w-16 h-0.5 bg-[#028fc7] align-middle mr-4"></span>
          <span class="text-[#028fc7] text-lg font-medium">Our Best Services</span>
          <span class="inline-block w-16 h-0.5 bg-[#028fc7] align-middle ml-4"></span>
        </div>
        <h2 class="text-4xl md:text-5xl font-extrabold text-text mt-2">Our Best Pool Services For You!</h2>
      </div>
    </section>
  </body>
</html>
