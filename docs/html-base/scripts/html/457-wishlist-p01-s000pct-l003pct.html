<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-[#010e2b]">
  <section class="topbar-section">
    <div class="bg-[#010e2b] py-2">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between">
        <div class="flex items-center space-x-6 text-[#bfc9dd] text-base font-normal">
          <div class="flex items-center space-x-2">
            <i class="fas fa-phone-alt text-[#bfc9dd]" data-icon="phone"></i>
            <span>(+468) 254 762 443</span>
          </div>
          <span class="mx-2 text-[#bfc9dd]">|</span>
          <div class="flex items-center space-x-2">
            <i class="fas fa-comments text-[#bfc9dd]" data-icon="comments"></i>
            <span>info@poolax.com</span>
          </div>
          <span class="mx-2 text-[#bfc9dd]">|</span>
          <div class="flex items-center space-x-2">
            <i class="far fa-clock text-[#bfc9dd]" data-icon="clock"></i>
            <span>Work Time: Mon – Fri 09AM – 6PM</span>
          </div>
        </div>
        <div class="flex items-center space-x-2 text-[#bfc9dd] text-base font-normal">
          <span>Follow Us On:</span>
          <a href="#" class="ml-2 hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Facebook">
            <i class="fab fa-facebook-f" data-icon="facebook"></i>
          </a>
          <a href="#" class="hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Twitter">
            <i class="fab fa-twitter" data-icon="twitter"></i>
          </a>
          <a href="#" class="hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in" data-icon="linkedin"></i>
          </a>
          <a href="#" class="hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Skype">
            <i class="fab fa-skype" data-icon="skype"></i>
          </a>
          <a href="#" class="hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="YouTube">
            <i class="fab fa-youtube" data-icon="youtube"></i>
          </a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
