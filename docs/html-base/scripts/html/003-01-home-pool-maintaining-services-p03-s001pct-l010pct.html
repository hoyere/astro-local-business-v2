<html>
  <head>
    <title>Clear Waters, Clear Mind Smart Pool Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom font size for hero */
      .hero-title {
        font-size: 3rem;
      }
      @media (min-width: 768px) {
        .hero-title {
          font-size: 3.5rem;
        }
      }
      @media (min-width: 1024px) {
        .hero-title {
          font-size: 4rem;
        }
      }
      /* Custom background overlay for hero */
      .hero-bg {
        background: linear-gradient(120deg, rgba(255,255,255,0.95) 60%, rgba(255,255,255,0.85) 100%);
        position: relative;
        overflow: hidden;
      }
      .hero-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url('https://www.transparenttextures.com/patterns/cubes.png'), linear-gradient(120deg, #f5fbf8 0%, #fff 100%);
        opacity: 0.25;
        z-index: 0;
      }
      .hero-image {
        position: absolute;
        right: 0;
        bottom: 0;
        top: 0;
        width: 50%;
        max-width: 600px;
        z-index: 1;
        pointer-events: none;
        user-select: none;
        mix-blend-mode: lighten;
      }
      @media (max-width: 1023px) {
        .hero-image {
          width: 60%;
          max-width: 400px;
        }
      }
      @media (max-width: 767px) {
        .hero-image {
          display: none;
        }
      }
      /* Scroll badge */
      .scroll-badge {
        box-shadow: 0 2px 12px 0 rgba(0,0,0,0.08);
        background: #0f1c18;
        color: #fff;
        border-radius: 9999px;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        letter-spacing: 0.1em;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: -32px;
        z-index: 10;
        border: 4px solid #fff;
      }
      .scroll-badge span {
        display: block;
        text-align: center;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-weight: 500;
      }
      .scroll-badge i {
        display: block;
        margin: 0 auto 2px auto;
        font-size: 1.25rem;
      }
      /* Curved divider */
      .curved-divider {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 120px;
        z-index: 2;
        pointer-events: none;
      }
      @media (max-width: 767px) {
        .curved-divider {
          height: 60px;
        }
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text font-sans antialiased">
    <!-- HERO SECTION -->
    <section class="hero-section relative hero-bg min-h-[540px] md:min-h-[600px] flex items-center py-20 md:py-28">
      <div class="container mx-auto px-4 max-w-6xl relative z-10 flex flex-col md:flex-row items-center">
        <div class="w-full md:w-2/3 lg:w-1/2 pt-8 pb-24 md:py-0">
          <h1 class="hero-title font-bold text-text-secondary leading-tight md:leading-tight tracking-tight mb-2">
            Clear Waters,<br>
            Clear Mind Smart<br>
            Pool Maintenance
          </h1>
        </div>
        <div class="hidden md:block w-1/3 lg:w-1/2 relative h-[400px]">
          <!-- Empty for spacing on md+ -->
        </div>
        <!-- Hero image, absolutely positioned -->
        <img src="https://placehold.co/600x700/png?text=Smiling+pool+cleaner+with+bucket+and+brush" alt="Smiling pool cleaner holding a bucket and brush, wearing gloves and apron" class="hero-image object-contain object-bottom select-none pointer-events-none" draggable="false">
      </div>
      <!-- Curved divider SVG -->
      <div class="curved-divider">
        <svg viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
          <path d="M0,80 C480,160 960,0 1440,80 L1440,120 L0,120 Z" fill="#fff"/>
        </svg>
      </div>
      <!-- Scroll badge -->
      <div class="scroll-badge" aria-label="Scroll down">
        <div class="flex flex-col items-center">
          <i class="fas fa-arrow-down" data-icon="arrow-down"></i>
          <span>Scroll</span>
        </div>
      </div>
    </section>
    <!-- PARTNER SECTION -->
    <section class="relative bg-background pt-24 pb-8">
      <div class="container mx-auto px-4 max-w-4xl text-center">
        <div class="flex items-center justify-center gap-2">
          <span class="text-[1.15rem] font-semibold" style="color:#0284c7;">10K+</span>
          <span class="text-text-secondary text-[1.15rem] font-medium">Our Trusted Partner</span>
        </div>
      </div>
    </section>
  </body>
</html>
