<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="blog-meta-row py-8 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="grid grid-cols-4 gap-0" data-collection="blog-meta">
          <!-- Card 1 -->
          <div data-item="blog-meta-1" class="flex flex-col">
            <div class="flex items-center space-x-2 text-text-muted text-sm font-normal">
              <span>January 2, 2024</span>
            </div>
          </div>
          <!-- Card 2 -->
          <div data-item="blog-meta-2" class="flex flex-col">
            <div class="flex items-center space-x-4 text-text-muted text-sm font-normal">
              <span class="flex items-center space-x-1">
                <i class="fas fa-user text-primary" data-icon="user"></i>
                <span>By Poolax</span>
              </span>
              <span>|</span>
              <span class="flex items-center space-x-1">
                <i class="fas fa-calendar-alt text-primary" data-icon="calendar"></i>
                <span>January 2, 2024</span>
              </span>
            </div>
          </div>
          <!-- Card 3 -->
          <div data-item="blog-meta-3" class="flex flex-col">
            <div class="flex items-center space-x-4 text-text-muted text-sm font-normal">
              <span class="flex items-center space-x-1">
                <i class="fas fa-user text-primary" data-icon="user"></i>
                <span>By Poolax</span>
              </span>
              <span>|</span>
              <span class="flex items-center space-x-1">
                <i class="fas fa-calendar-alt text-primary" data-icon="calendar"></i>
                <span>November 5, 2023</span>
              </span>
            </div>
          </div>
          <!-- Card 4 -->
          <div data-item="blog-meta-4" class="flex flex-col">
            <div class="flex items-center space-x-4 text-text-muted text-sm font-normal">
              <span class="flex items-center space-x-1">
                <i class="fas fa-user text-primary" data-icon="user"></i>
                <span>By Poolax</span>
              </span>
              <span>|</span>
              <span class="flex items-center space-x-1">
                <i class="fas fa-calendar-alt text-primary" data-icon="calendar"></i>
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
