<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
      /* Custom pool icon */
      .icon-pool {
        display: inline-block;
        width: 36px;
        height: 36px;
        vertical-align: middle;
      }
      .pool-outline {
        stroke: #fff;
        stroke-width: 2.2;
        fill: none;
      }
      .pool-waves {
        stroke: #fff;
        stroke-width: 2;
        fill: none;
      }
      /* Outlined text effect */
      .text-outline {
        color: transparent;
        -webkit-text-stroke: 1.5px #fff;
        text-stroke: 1.5px #fff;
      }
      /* Responsive font size for outlined text */
      @media (max-width: 768px) {
        .text-outline, .text-white, .font-bold {
          font-size: 1rem !important;
        }
      }
    </style>
  </head>
  <body class="bg-[#169df6]">
    <section class="services-strip-section">
      <div class="w-full bg-[#169df6] py-6">
        <div class="flex flex-row items-center justify-center gap-16 md:gap-24 lg:gap-32 px-2 md:px-8" style="background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 180px);">
          <!-- Left partial text (cropped) -->
          <span class="text-white font-bold text-2xl md:text-3xl uppercase tracking-wide" style="opacity:0.99; letter-spacing:0.01em;">ANCE</span>
          <!-- Item 1 -->
          <div class="flex flex-row items-center gap-3">
            <span aria-hidden="true" class="icon-pool">
              <svg viewBox="0 0 36 36" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g>
                  <rect x="8" y="7" width="20" height="12" rx="5" class="pool-outline"/>
                  <path d="M12 25c1.5 1.5 4.5 1.5 6 0s4.5-1.5 6 0" class="pool-waves"/>
                  <path d="M12 29c1.5 1.5 4.5 1.5 6 0s4.5-1.5 6 0" class="pool-waves"/>
                </g>
              </svg>
            </span>
            <span class="text-outline font-semibold text-2xl md:text-3xl uppercase tracking-wide">POOL PULSE REPAIRS</span>
          </div>
          <!-- Item 2 -->
          <div class="flex flex-row items-center gap-3">
            <span aria-hidden="true" class="icon-pool">
              <svg viewBox="0 0 36 36" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g>
                  <rect x="8" y="7" width="20" height="12" rx="5" class="pool-outline"/>
                  <path d="M12 25c1.5 1.5 4.5 1.5 6 0s4.5-1.5 6 0" class="pool-waves"/>
                  <path d="M12 29c1.5 1.5 4.5 1.5 6 0s4.5-1.5 6 0" class="pool-waves"/>
                </g>
              </svg>
            </span>
            <span class="text-white font-bold text-2xl md:text-3xl uppercase tracking-wide">POOL SPARKLE CLEANING</span>
          </div>
          <!-- Item 3 -->
          <div class="flex flex-row items-center gap-3">
            <span aria-hidden="true" class="icon-pool">
              <svg viewBox="0 0 36 36" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g>
                  <rect x="8" y="7" width="20" height="12" rx="5" class="pool-outline"/>
                  <path d="M12 25c1.5 1.5 4.5 1.5 6 0s4.5-1.5 6 0" class="pool-waves"/>
                  <path d="M12 29c1.5 1.5 4.5 1.5 6 0s4.5-1.5 6 0" class="pool-waves"/>
                </g>
              </svg>
            </span>
            <span class="text-outline font-semibold text-2xl md:text-3xl uppercase tracking-wide">CLEAR CU</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
