<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .callout-bg {
        background: linear-gradient(90deg, #1797ff 60%, transparent 60%);
        position: relative;
        overflow: hidden;
      }
      .callout-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath opacity='0.08' d='M20 0L22.3511 7.64886L30 10L22.3511 12.3511L20 20L17.6489 12.3511L10 10L17.6489 7.64886L20 0Z' fill='white'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 80px 80px;
        pointer-events: none;
        z-index: 0;
      }
      @media (max-width: 900px) {
        .callout-bg {
          background: #1797ff;
        }
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="hero-section py-0">
      <div class="container mx-auto px-0 max-w-full">
        <div class="callout-bg flex rounded-[2rem] overflow-hidden min-h-[220px] md:min-h-[200px] items-stretch">
          <!-- Left: Text -->
          <div class="flex-1 flex flex-col justify-center pl-10 pr-4 py-12 md:py-10 relative z-10">
            <h2 class="text-on-primary text-2xl md:text-3xl font-semibold mb-4">
              Do You need help with Cleaning?
            </h2>
            <p class="text-on-primary text-lg font-medium">
              Call Us +(088) 456 888 (24/7)
            </p>
          </div>
          <!-- Center: Phone Icon -->
          <div class="flex items-center justify-center z-10">
            <span class="bg-white rounded-full w-20 h-20 flex items-center justify-center shadow-lg mx-2 my-auto">
              <i class="fas fa-phone-alt text-primary text-3xl" data-icon="phone"></i>
            </span>
          </div>
          <!-- Right: Image -->
          <div class="flex-1 min-w-[260px] max-w-[45%] relative hidden md:block">
            <img src="https://placehold.co/600x400" alt="A professional cleaner in uniform using a pool vacuum machine" class="w-full h-full object-cover object-center" style="min-height:220px;">
            <div class="absolute inset-0 bg-black/10 rounded-r-[2rem]"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
