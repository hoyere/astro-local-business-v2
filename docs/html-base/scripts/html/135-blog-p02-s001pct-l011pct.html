<html>
  <head>
    <title>Poolax - Latest News</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom styles for logo shape */
      .logo-bg {
        border-bottom-right-radius: 64px;
        border-bottom-left-radius: 0;
        border-top-right-radius: 64px;
        border-top-left-radius: 0;
      }
      @media (max-width: 1023px) {
        .logo-bg {
          border-bottom-right-radius: 40px;
          border-top-right-radius: 40px;
        }
      }
      /* Bubble animation (static for now) */
      .bubble {
        position: absolute;
        border-radius: 9999px;
        background: rgba(255,255,255,0.35);
        pointer-events: none;
        mix-blend-mode: lighten;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-primary">
      <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 h-24 relative">
        <!-- Logo -->
        <div class="logo-bg bg-background h-24 pl-8 pr-16 flex items-center absolute left-0 top-0 z-10" style="min-width:270px;">
          <a href="#" class="flex items-center space-x-2">
            <!-- Custom Poolax logo recreation -->
            <span class="text-4xl font-bold text-text flex items-center">
              <span class="relative mr-1">
                <span class="inline-block relative">
                  <span class="text-text">P</span>
                  <!-- Pool goggles -->
                  <span class="absolute left-2 top-2 flex space-x-1">
                    <span class="w-2 h-2 rounded-full bg-primary border-2 border-primary-dark inline-block"></span>
                    <span class="w-2 h-2 rounded-full bg-primary border-2 border-primary-dark inline-block"></span>
                  </span>
                  <!-- Goggles bridge -->
                  <span class="absolute left-2.5 top-3 w-2 h-0.5 bg-primary-dark rounded-full"></span>
                </span>
              </span>
              <span class="text-text">oolax</span>
            </span>
          </a>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex justify-center items-center ml-[270px]">
          <ul class="flex space-x-8 text-on-primary font-medium text-sm">
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4 ml-4">
          <button class="w-11 h-11 rounded-full bg-background flex items-center justify-center text-text focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search text-xl" data-icon="search"></i>
          </button>
          <button class="w-11 h-11 rounded-full bg-background flex items-center justify-center text-text focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars text-xl" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-primary-dark" style="min-height:340px;">
      <!-- Background overlay with image and bubbles -->
      <div class="absolute inset-0 w-full h-full z-0 overflow-hidden">
        <img src="https://placehold.co/1600x500/1a3e5c/ffffff?text=Pool+background+with+water+and+pool+edge" alt="Background image showing a swimming pool with water and pool edge" class="w-full h-full object-cover opacity-70">
        <!-- Bubbles (static, for visual effect) -->
        <span class="bubble" style="width:48px;height:48px;left:12%;top:38%;"></span>
        <span class="bubble" style="width:32px;height:32px;left:22%;top:60%;"></span>
        <span class="bubble" style="width:24px;height:24px;left:35%;top:70%;"></span>
        <span class="bubble" style="width:40px;height:40px;left:60%;top:30%;"></span>
        <span class="bubble" style="width:28px;height:28px;left:75%;top:55%;"></span>
        <span class="bubble" style="width:36px;height:36px;left:85%;top:40%;"></span>
      </div>
      <div class="relative z-10 container mx-auto max-w-7xl px-4 py-24 flex flex-col justify-center" style="min-height:340px;">
        <h1 class="text-5xl md:text-6xl font-extrabold text-on-primary mb-8">Latest News</h1>
        <nav class="flex items-center space-x-2 text-on-primary text-lg font-medium">
          <a href="#" class="hover:underline text-on-primary">Home</a>
          <span><i class="fas fa-arrow-right text-base mx-1" data-icon="arrow-right"></i></span>
          <span class="text-on-primary opacity-80">Blog</span>
        </nav>
      </div>
    </section>
  </body>
</html>
