<html>
  <head>
    <title>Book An Appointment Section</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <!-- Appointment Section -->
    <section class="appointment-section py-16 md:py-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="bg-surface rounded-2xl shadow-md border border-border p-8 md:p-12">
          <div class="max-w-2xl mx-auto">
            <h2 class="text-2xl md:text-2xl font-bold text-text mb-8">Book An Appointment</h2>
            <form class="space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                  <input type="text" id="name" name="name" placeholder="Your Name" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition" aria-label="Your Name" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                    <i class="fa fa-user" data-icon="user"></i>
                  </span>
                </div>
                <div class="relative">
                  <input type="email" id="email" name="email" placeholder="Your Email" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition" aria-label="Your Email" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                    <i class="fa fa-envelope" data-icon="envelope"></i>
                  </span>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                  <input type="tel" id="phone" name="phone" placeholder="Phone Number" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition" aria-label="Phone Number" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                    <i class="fa fa-phone" data-icon="phone"></i>
                  </span>
                </div>
                <div class="relative">
                  <select id="service" name="service" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition appearance-none" aria-label="Select Service">
                    <option value="">Select Service</option>
                    <option value="service1">Service 1</option>
                    <option value="service2">Service 2</option>
                  </select>
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                    <i class="fa fa-chevron-down" data-icon="chevron-down"></i>
                  </span>
                </div>
              </div>
              <div class="relative">
                <textarea id="message" name="message" rows="4" placeholder="Write message..." class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition resize-none" aria-label="Write message"></textarea>
                <span class="absolute right-3 top-3 text-text-muted pointer-events-none">
                  <i class="fa fa-comment-alt" data-icon="comment-alt"></i>
                </span>
              </div>
              <button type="submit" class="w-full bg-[#0072F5] text-white font-semibold rounded-lg py-3 transition hover:bg-[#005fd1] focus:outline-none focus:ring-2 focus:ring-[#0072F5] focus:ring-offset-2">
                APPOINTMENT NOW
              </button>
            </form>
          </div>
        </div>
        <div class="mt-10 bg-surface rounded-2xl shadow-md border border-border px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-8 md:gap-0">
          <div data-collection="contact-info" class="w-full flex flex-col md:flex-row justify-between items-center gap-8">
            <div data-item="office-location" class="flex items-center gap-4">
              <span class="flex items-center justify-center w-12 h-12 rounded-full border border-border bg-surface-alt text-[#0072F5] text-xl">
                <i class="fa fa-map-marker-alt" data-icon="map-marker-alt"></i>
              </span>
              <div>
                <div class="text-text-muted text-sm">Office location</div>
                <div class="font-semibold text-text">4648 Rocky, New York</div>
              </div>
            </div>
            <div data-item="send-email" class="flex items-center gap-4">
              <span class="flex items-center justify-center w-12 h-12 rounded-full border border-border bg-surface-alt text-[#0072F5] text-xl">
                <i class="fa fa-envelope" data-icon="envelope"></i>
              </span>
              <div>
                <div class="text-text-muted text-sm">Send email</div>
                <div class="font-semibold text-text"><a href="mailto:info@poolax.com" class="hover:underline">info@poolax.com</a></div>
              </div>
            </div>
            <div data-item="call-emergency" class="flex items-center gap-4">
              <span class="flex items-center justify-center w-12 h-12 rounded-full border border-border bg-surface-alt text-[#0072F5] text-xl">
                <i class="fa fa-phone" data-icon="phone"></i>
              </span>
              <div>
                <div class="text-text-muted text-sm">Call emergency</div>
                <div class="font-semibold text-text">+88 0123 654 99</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Blog Section Preview -->
    <section class="blog-section py-16 md:py-24 bg-surface-alt">
      <div class="container mx-auto px-4 max-w-6xl text-center">
        <div class="mb-2">
          <span class="inline-block text-xs font-semibold text-[#0072F5]">
            <i class="fa fa-book" data-icon="book"></i>
            Blog Posts
          </span>
        </div>
        <h2 class="text-3xl md:text-4xl font-bold text-text mb-2">Our Latest News & Updates</h2>
      </div>
    </section>
  </body>
</html>
