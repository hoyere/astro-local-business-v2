<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">
  <section class="topbar-section">
    <div class="w-full bg-[#169fff]">
      <div class="container mx-auto max-w-7xl px-4">
        <div class="flex items-center justify-between h-12 text-sm">
          <!-- Left: Contact Info -->
          <div class="flex items-center divide-x divide-white/30">
            <div class="flex items-center pr-6">
              <i class="fas fa-phone-alt text-white mr-2 text-base" data-icon="phone"></i>
              <span class="text-white">(+468) 254 76243</span>
            </div>
            <div class="flex items-center px-6">
              <i class="fas fa-comments text-white mr-2 text-base" data-icon="comments"></i>
              <span class="text-white">info@poolax.com</span>
            </div>
            <div class="flex items-center pl-6">
              <i class="far fa-clock text-white mr-2 text-base" data-icon="clock"></i>
              <span class="text-white">Work Time: Mon – Fri 09AM – 6PM</span>
            </div>
          </div>
          <!-- Right: Language & Social -->
          <div class="flex items-center divide-x divide-white/30">
            <div class="flex items-center pr-6">
              <span class="text-white cursor-pointer select-none">Language<i class="fas fa-caret-down ml-1 text-xs" data-icon="caret-down"></i></span>
            </div>
            <div class="flex items-center pl-6">
              <span class="text-white mr-2">Follow Us On:</span>
              <a href="#" class="text-white hover:text-accent mx-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Facebook"><i class="fab fa-facebook-f" data-icon="facebook"></i></a>
              <a href="#" class="text-white hover:text-accent mx-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Twitter"><i class="fab fa-twitter" data-icon="twitter"></i></a>
              <a href="#" class="text-white hover:text-accent mx-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="LinkedIn"><i class="fab fa-linkedin-in" data-icon="linkedin"></i></a>
              <a href="#" class="text-white hover:text-accent mx-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Instagram"><i class="fab fa-instagram" data-icon="instagram"></i></a>
              <a href="#" class="text-white hover:text-accent mx-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Behance"><i class="fab fa-behance" data-icon="behance"></i></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
