<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom background for stats section */
      .stats-bg {
        background: #11151c;
        position: relative;
        overflow: hidden;
      }
      .stats-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url('data:image/svg+xml;utf8,<svg width="1440" height="320" viewBox="0 0 1440 320" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.08" d="M0 160L80 154.7C160 149 320 139 480 154.7C640 171 800 213 960 197.3C1120 181 1280 107 1360 69.3L1440 32V320H1360C1280 320 1120 320 960 320C800 320 640 320 480 320C320 320 160 320 80 320H0V160Z" fill="white"/></svg>');
        background-repeat: no-repeat;
        background-size: cover;
        z-index: 0;
        pointer-events: none;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="stats-section py-16 stats-bg">
      <div class="container mx-auto px-4 max-w-6xl relative z-10">
        <div data-collection="stats" class="grid grid-cols-1 md:grid-cols-4 divide-y md:divide-y-0 md:divide-x divide-white/10">
          <div data-item="stat-1" class="flex flex-col items-center py-8 md:py-0">
            <div class="flex items-baseline">
              <span class="text-5xl md:text-6xl font-bold text-white">2,564</span>
              <span class="text-4xl md:text-5xl font-bold text-[#338aff] ml-1">+</span>
            </div>
            <span class="mt-4 text-lg text-[#a2a9b6]">Successfully Projects Complete</span>
          </div>
          <div data-item="stat-2" class="flex flex-col items-center py-8 md:py-0">
            <div class="flex items-baseline">
              <span class="text-5xl md:text-6xl font-bold text-white">164</span>
              <span class="text-4xl md:text-5xl font-bold text-[#338aff] ml-1">+</span>
            </div>
            <span class="mt-4 text-lg text-[#a2a9b6]">Expert Team Members</span>
          </div>
          <div data-item="stat-3" class="flex flex-col items-center py-8 md:py-0">
            <div class="flex items-baseline">
              <span class="text-5xl md:text-6xl font-bold text-white">2,985</span>
              <span class="text-4xl md:text-5xl font-bold text-[#338aff] ml-1">+</span>
            </div>
            <span class="mt-4 text-lg text-[#a2a9b6]">Our Satisfied Customers</span>
          </div>
          <div data-item="stat-4" class="flex flex-col items-center py-8 md:py-0">
            <div class="flex items-baseline">
              <span class="text-5xl md:text-6xl font-bold text-white">85</span>
              <span class="text-4xl md:text-5xl font-bold text-[#338aff] ml-1">+</span>
            </div>
            <span class="mt-4 text-lg text-[#a2a9b6]">Best Company Awards</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
