<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      body {
        background: #f7fafd;
        min-height: 100vh;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>

    <section class="services-cta-section w-full flex justify-center items-center bg-transparent py-32">
      <div class="container mx-auto flex justify-center">
        <div class="flex w-[700px] max-w-full rounded-full shadow-none border border-dashed border-border bg-white overflow-hidden">
          <div class="flex-1 flex items-center px-8 py-5">
            <span class="text-lg font-medium text-text">
              Offering High Quality Pool Services For You
            </span>
          </div>
          <a href="#" class="flex items-center justify-center px-10 bg-[#1194f7] text-white text-base font-semibold rounded-full transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 hover:bg-[#0d7ed6]" style="border-top-left-radius: 0; border-bottom-left-radius: 0;">
            GET ALL SERVICES
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
