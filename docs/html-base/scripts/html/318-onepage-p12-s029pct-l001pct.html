<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-6xl">
        <div data-collection="services" class="grid grid-cols-3 gap-16">
          <article data-item="service-1" class="bg-surface rounded-lg shadow-sm px-8 pt-8 pb-0 flex flex-col items-center min-h-[120px]">
            <h3 class="text-text font-semibold text-lg text-center mb-2" style="letter-spacing:-0.01em;">&nbsp;</h3>
            <p class="text-text-muted text-base text-center leading-tight truncate w-full">to have your pool water</p>
          </article>
          <article data-item="service-2" class="bg-surface rounded-lg shadow-sm px-8 pt-8 pb-0 flex flex-col items-center min-h-[120px]">
            <h3 class="text-text font-semibold text-lg text-center mb-2" style="letter-spacing:-0.01em;">&nbsp;</h3>
            <p class="text-text-muted text-base text-center leading-tight truncate w-full">Contact our emergency pool services offer</p>
          </article>
          <article data-item="service-3" class="bg-surface rounded-lg shadow-sm px-8 pt-8 pb-0 flex flex-col items-center min-h-[120px]">
            <h3 class="text-text font-semibold text-lg text-center mb-2" style="letter-spacing:-0.01em;">&nbsp;</h3>
            <p class="text-text-muted text-base text-center leading-tight truncate w-full">Regular water chemistry analysis is crucial.</p>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
