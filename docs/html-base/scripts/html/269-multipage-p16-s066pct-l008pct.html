<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom background for the right side */
      .bg-map {
        background-color: #06163a;
        background-image: url('https://www.transparenttextures.com/patterns/dotted-world-map.png');
        background-repeat: no-repeat;
        background-size: 80% auto;
        background-position: center right;
      }
      @media (max-width: 1023px) {
        .split-section {
          flex-direction: column;
        }
        .split-left,
        .split-right {
          width: 100% !important;
          min-height: 300px !important;
        }
        .split-right {
          min-height: 300px !important;
        }
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="testimonials-section min-h-screen flex items-stretch">
      <div class="split-section flex w-full h-screen">
        <!-- Left: Image -->
        <div class="split-left w-1/2 min-h-screen hidden lg:block">
          <img src="https://placehold.co/900x900?text=Pool+worker+with+toolbox+by+pool+and+grass" alt="A worker in red uniform kneeling by a pool with toolboxes and green grass, preparing for maintenance" class="w-full h-full object-cover object-left" />
        </div>
        <!-- Right: Content -->
        <div class="split-right w-full lg:w-1/2 min-h-screen flex flex-col justify-center bg-map relative px-6 md:px-16">
          <div class="container mx-auto max-w-2xl flex flex-col justify-center h-full">
            <header>
              <p class="text-primary text-lg font-medium mb-2 mt-8 lg:mt-0" style="letter-spacing:0.01em;">
                Testimonials <span class="inline-block align-middle ml-2 w-12 h-1 bg-primary" style="vertical-align:middle;"></span>
              </p>
              <h2 class="text-on-primary text-4xl md:text-5xl font-bold mb-12 mt-2 leading-tight">
                Our Clients Feedback
              </h2>
            </header>
            <!-- Carousel dots -->
            <div class="flex items-center space-x-4 mt-12 md:mt-24">
              <button aria-label="Go to slide 1" class="focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                <span class="block w-6 h-6 flex items-center justify-center">
                  <span class="block w-4 h-4 rounded-full border-2 border-primary" style="box-shadow:0 0 0 2px #06163a;">
                    <span class="block w-2 h-2 rounded-full bg-primary mx-auto my-auto mt-1"></span>
                  </span>
                </span>
              </button>
              <button aria-label="Go to slide 2" class="focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                <span class="block w-3 h-3 rounded-full bg-[#d1d5db]"></span>
              </button>
              <button aria-label="Go to slide 3" class="focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                <span class="block w-3 h-3 rounded-full bg-[#d1d5db]"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
