    /* Custom logo font and style */

      font-size: 2.5rem;

      color: #181f39;
      display: flex;
      align-items: center;
    }
    .logo-pool {
      color: #181f39;
      position: relative;
      margin-right: 0.1em;
    }
    .logo-pool .pool-o {
      display: inline-block;
      position: relative;
      width: 0.9em;
      height: 0.9em;
      margin: 0 0.02em;
      background: none;
    }
    .logo-pool .pool-o:before,
    .logo-pool .pool-o:after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: #02a26a;
      opacity: 0.8;
    }
    .logo-pool .pool-o:before {
      width: 0.9em;
      height: 0.9em;
      left: 0;
      top: 0;
    }
    .logo-pool .pool-o:after {
      width: 0.5em;
      height: 0.5em;
      left: 0.2em;
      top: 0.2em;
      background: #3ad69e;
      opacity: 0.7;
    }
    .logo-pool .pool-wave {
      position: absolute;
      left: 0.1em;
      top: 0.45em;
      width: 0.7em;
      height: 0.3em;
      background: none;
      border-bottom: 0.12em solid #0c7e5a;
      border-radius: 50%;
      z-index: 2;
    }
    .logo-pool .pool-wave.right {
      left: 0.45em;
    }
    @media (max-width: 640px) {
      .logo-text {
        font-size: 1.5rem;
      }
    }
  </style>
