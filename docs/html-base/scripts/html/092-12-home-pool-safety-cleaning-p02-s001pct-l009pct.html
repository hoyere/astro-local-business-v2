<html>
<head>
  <title>Poolax - Crystal Clear Pools Crystal Clear Joy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text">

  <!-- Header / Navigation -->
  <header class="relative z-20">
    <nav class="flex items-center justify-between bg-[#061a36] px-0 py-0 min-h-[80px]">
      <!-- Left: Logo and nav -->
      <div class="flex items-center w-full">
        <!-- Logo with angled background -->
        <div class="relative h-20 flex items-center z-10" style="clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);">
          <a href="#" class="flex items-center h-full px-8 bg-[#061a36]">
            <!-- Logo SVG -->
            <span class="text-4xl font-bold text-white flex items-center select-none">
              <span class="relative mr-1">
                <span class="inline-block relative">
                  <span class="text-white">P</span>
                  <span class="absolute left-0 top-0">
                    <!-- Pool icon (simulate with circles and lines) -->
                    <svg width="32" height="24" viewBox="0 0 32 24" fill="none" class="inline-block align-middle" aria-hidden="true">
                      <ellipse cx="8" cy="12" rx="7" ry="7" fill="#3ad69e" opacity="0.7"/>
                      <ellipse cx="24" cy="12" rx="7" ry="7" fill="#3ad69e" opacity="0.7"/>
                      <rect x="7" y="7" width="18" height="2" rx="1" fill="#02a26a"/>
                    </svg>
                  </span>
                </span>
              </span>
              <span class="text-white">oolax</span>
            </span>
          </a>
        </div>
        <!-- Navigation links -->
        <div class="flex-1">
          <ul class="flex items-center ml-8 space-x-8 text-[15px] font-medium">
            <li>
              <a href="#" class="text-text-inverse hover:text-primary transition-colors flex items-center">
                HOME <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-text-inverse hover:text-primary transition-colors">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="text-text-inverse hover:text-primary transition-colors flex items-center">
                SERVICES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-text-inverse hover:text-primary transition-colors flex items-center">
                PAGES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-text-inverse hover:text-primary transition-colors flex items-center">
                BLOGS <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-text-inverse hover:text-primary transition-colors">CONTACT US</a>
            </li>
          </ul>
        </div>
      </div>
      <!-- Right: Phone -->
      <div class="flex items-center h-20 pr-8 pl-8 bg-[#061a36]" style="clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);">
        <div class="flex items-center space-x-3">
          <span class="flex items-center justify-center w-10 h-10 rounded-full bg-[#0c7e5a] text-white text-xl">
            <i class="fas fa-phone-alt" data-icon="phone"></i>
          </span>
          <div class="flex flex-col">
            <span class="text-[13px] text-text-muted text-right" style="color: #b3c2d1;">Phone Number:</span>
            <span class="text-base text-white font-medium">(+468) 254 76243</span>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero-section relative min-h-[520px] flex items-center justify-center bg-background overflow-hidden">
    <!-- Background image -->
    <img src="https://placehold.co/1600x900/3ad69e/ffffff?text=Pool+water+background" alt="Blurred pool water background" class="absolute inset-0 w-full h-full object-cover z-0" />
    <!-- Overlay -->
    <div class="absolute inset-0 bg-[#061a36]/70 z-10"></div>
    <!-- Decorative diagonal overlays -->
    <div class="absolute inset-0 z-20 pointer-events-none">
      <svg width="100%" height="100%" viewBox="0 0 1600 520" fill="none" class="w-full h-full">
        <polygon points="0,0 800,0 0,520" fill="#061a36" fill-opacity="0.15"/>
        <polygon points="1600,0 800,0 1600,520" fill="#061a36" fill-opacity="0.15"/>
      </svg>
    </div>
    <!-- Content -->
    <div class="relative z-30 w-full">
      <div class="container mx-auto px-4 max-w-4xl text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold text-white leading-tight mb-6">
          Crystal Clear <span class="text-white">Pools</span> <span class="font-extrabold text-white">Crystal</span><br>
          <span class="text-white">Clear Joy</span>
        </h1>
        <p class="mt-2 text-lg text-white font-medium">
          Regular maintenance is recommended at least once a week to ensure water quality, cleanliness,<br class="hidden md:inline"> and equipment functionality
        </p>
      </div>
    </div>
  </section>
</body>
</html>
