<html>
  <head>
    <title>Wishlist - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text font-sans">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1896f7]">
      <div class="flex items-center justify-between max-w-7xl mx-auto px-4 py-4">
        <!-- Logo -->
        <div class="flex-shrink-0">
          <div class="relative">
            <div class="absolute left-0 top-0 w-[290px] h-[110px] bg-white rounded-br-[60px] z-0" style="clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);"></div>
            <div class="relative flex items-center h-[70px] pl-2 z-10">
              <!-- Poolax Logo Recreation -->
              <span class="text-[48px] font-bold text-[#181c32] flex items-center">
                <span class="relative mr-1">
                  <span class="text-[#1896f7]">P</span>
                  <!-- Pool goggles icon recreation -->
                  <span class="absolute left-2 top-2 flex items-center">
                    <svg width="32" height="18" viewBox="0 0 32 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <ellipse cx="7" cy="9" rx="6" ry="7" stroke="#1896f7" stroke-width="2"/>
                      <ellipse cx="25" cy="9" rx="6" ry="7" stroke="#1896f7" stroke-width="2"/>
                      <ellipse cx="7" cy="9" rx="3" ry="3.5" fill="#1896f7"/>
                      <ellipse cx="25" cy="9" rx="3" ry="3.5" fill="#1896f7"/>
                      <path d="M13 9C13 9 15 9 17 9C19 9 21 9 21 9" stroke="#1896f7" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                  </span>
                </span>
                <span class="ml-2">oolax</span>
              </span>
            </div>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex items-center justify-center">
          <ul class="flex space-x-8 text-white font-medium text-sm">
            <li>
              <a href="#" class="flex items-center hover:underline">
                HOME <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                SERVICES <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                PAGES <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                BLOGS <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4">
          <button aria-label="Search" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-[#181c32] hover:bg-primary-light focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
            <i class="fas fa-search text-lg" data-icon="search"></i>
          </button>
          <button aria-label="Menu" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-[#181c32] hover:bg-primary-light focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
            <i class="fas fa-bars text-lg" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-[#1a5e8e] min-h-[340px] flex items-center" style="background: linear-gradient(120deg, #1a5e8e 60%, #1896f7 100%);">
      <!-- Decorative SVG overlays for geometric shapes -->
      <svg class="absolute left-0 top-0 w-full h-full z-0" viewBox="0 0 1600 400" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <polygon points="0,0 1600,0 1200,400 0,400" fill="#1a5e8e" fill-opacity="0.7"/>
        <polygon points="0,0 1600,0 1600,400 1200,400" fill="#1896f7" fill-opacity="0.3"/>
      </svg>
      <!-- Bubbles (absolute positioned) -->
      <span class="absolute left-[22%] top-[54%] z-10">
        <img src="https://placehold.co/60x60/ffffff/cccccc?text= " alt="Bubble" class="rounded-full opacity-70" style="box-shadow: 0 0 16px 4px #fff8;"></span>
      <span class="absolute left-[32%] top-[62%] z-10">
        <img src="https://placehold.co/40x40/ffffff/cccccc?text= " alt="Bubble" class="rounded-full opacity-60" style="box-shadow: 0 0 12px 2px #fff8;"></span>
      <span class="absolute left-[60%] top-[38%] z-10">
        <img src="https://placehold.co/70x70/ffffff/cccccc?text= " alt="Bubble" class="rounded-full opacity-70" style="box-shadow: 0 0 18px 6px #fff8;"></span>
      <span class="absolute left-[80%] top-[48%] z-10">
        <img src="https://placehold.co/50x50/ffffff/cccccc?text= " alt="Bubble" class="rounded-full opacity-60" style="box-shadow: 0 0 14px 3px #fff8;"></span>
      <span class="absolute left-[90%] top-[70%] z-10">
        <img src="https://placehold.co/40x40/ffffff/cccccc?text= " alt="Bubble" class="rounded-full opacity-60" style="box-shadow: 0 0 10px 2px #fff8;"></span>
      <span class="absolute left-[92%] top-[60%] z-10">
        <img src="https://placehold.co/60x60/ffffff/cccccc?text= " alt="Bubble" class="rounded-full opacity-70" style="box-shadow: 0 0 16px 4px #fff8;"></span>
      <!-- Pool net (bottom right) -->
      <span class="absolute right-0 bottom-0 z-10">
        <img src="https://placehold.co/220x120/1a5e8e/ffffff?text=Pool+Net" alt="Blue pool net partially visible" class="rounded-tl-3xl opacity-90">
      </span>
      <div class="container mx-auto px-4 max-w-6xl relative z-20">
        <div class="pt-20 pb-16">
          <h1 class="text-5xl font-bold text-white mb-4">Wishlist</h1>
          <nav class="flex items-center space-x-2 text-white text-base font-normal">
            <a href="#" class="text-white/80 hover:underline">Home</a>
            <span class="mx-1 text-white/60"><i class="fas fa-arrow-right text-xs" data-icon="arrow-right"></i></span>
            <span class="text-white/90">Wishlist</span>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
