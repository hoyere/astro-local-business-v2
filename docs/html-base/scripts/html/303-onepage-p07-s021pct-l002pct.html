<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen">
    <section class="hero-section relative min-h-[200px] bg-background overflow-hidden">
      <div class="container mx-auto px-4 max-w-6xl relative">
        <!-- Top left abstract blue shape with black line -->
        <div class="absolute left-0 top-[-60px] w-[340px] h-[140px] z-10">
          <svg width="340" height="140" viewBox="0 0 340 140" fill="none" xmlns="http://www.w3.org/2000/svg" class="absolute left-0 top-0">
            <ellipse cx="170" cy="70" rx="120" ry="60" fill="#2196F3"/>
            <path d="M10,80 Q90,60 170,90 Q250,120 330,40" stroke="#0a1833" stroke-width="4" fill="none"/>
          </svg>
        </div>
        <!-- Centered button -->
        <div class="absolute left-1/2 top-0 transform -translate-x-1/2 mt-2 z-20">
          <button class="bg-[#2196F3] text-white px-8 py-4 rounded-lg text-base font-medium shadow focus:outline-none focus:ring-2 focus:ring-[#2196F3] focus:ring-offset-2 transition">
            MORE ABOUT US
          </button>
        </div>
        <!-- Bottom right beach chair and ball -->
        <div class="absolute right-0 bottom-[-30px] w-[340px] h-[160px] z-20 flex items-end">
          <img src="https://placehold.co/320x150/png?text=Deck+Chair+and+Beach+Ball" alt="A striped deck chair and a blue-and-white beach ball on a white background" class="w-[320px] h-[150px] object-contain" draggable="false" />
        </div>
      </div>
      <!-- Spacer to ensure section height matches screenshot -->
      <div class="h-[180px]"></div>
    </section>
  </body>
</html>
