<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--color-background);
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body>
    <section class="hero-section relative h-[120px] overflow-hidden bg-background p-0 m-0">
      <!-- Top curved SVG divider with dark background and white arc lines -->
      <svg
        class="absolute top-0 left-0 w-full h-full"
        viewBox="0 0 1440 140"
        fill="none"
        preserveAspectRatio="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
        focusable="false"
      >
        <path
          d="M0,0 L0,40 Q720,140 1440,40 L1440,0 Z"
          fill="#232b3b"
        />
        <!-- White arc lines on left -->
        <path
          d="M0,0 Q80,60 160,120"
          stroke="#fff"
          stroke-width="4"
          fill="none"
          opacity="0.8"
        />
        <path
          d="M0,0 Q60,40 120,80"
          stroke="#fff"
          stroke-width="3"
          fill="none"
          opacity="0.7"
        />
      </svg>
    </section>
  </body>
</html>
