<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-surface-alt">
    <header class="w-full bg-surface-alt border-b border-border">
      <nav class="flex items-center justify-between h-10 px-2 md:px-8 max-w-full">
        <!-- Logo -->
        <div class="flex items-center h-10">
          <img src="https://placehold.co/80x40" alt="Brand logo with stylized text" class="h-10 w-auto object-contain" />
        </div>
        <!-- Navigation Links -->
        <ul class="hidden md:flex flex-1 justify-center items-center space-x-8 text-[15px] font-medium text-text tracking-tight">
          <li>
            <a href="#" class="flex items-center hover:text-primary transition-colors">
              HOME
              <span class="ml-1 text-xs"><i class="fas fa-plus" data-icon="plus"></i></span>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:text-primary transition-colors">
              ABOUT US
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:text-primary transition-colors">
              SERVICES
              <span class="ml-1 text-xs"><i class="fas fa-plus" data-icon="plus"></i></span>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:text-primary transition-colors">
              PAGES
              <span class="ml-1 text-xs"><i class="fas fa-plus" data-icon="plus"></i></span>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:text-primary transition-colors">
              BLOGS
              <span class="ml-1 text-xs"><i class="fas fa-plus" data-icon="plus"></i></span>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:text-primary transition-colors">
              CONTACT US
            </a>
          </li>
        </ul>
        <!-- Mobile Menu Button -->
        <button aria-label="Open menu" class="md:hidden flex items-center justify-center h-10 w-10 bg-[#0a1a3a] rounded focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <span class="sr-only">Open menu</span>
          <i class="fas fa-bars text-white text-xl" data-icon="bars"></i>
        </button>
      </nav>
    </header>
  </body>
</html>
