<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-6xl">
        <div data-collection="service-images" class="grid grid-cols-4 gap-0 rounded-2xl overflow-hidden">
          <div data-item="service-1" class="bg-surface">
            <img src="https://placehold.co/400x400" alt="Pool vacuum head cleaning the bottom of a swimming pool" class="w-full h-[220px] object-cover object-center"/>
          </div>
          <div data-item="service-2" class="bg-surface">
            <img src="https://placehold.co/400x400" alt="Pool hose connected to a pump at the edge of a swimming pool" class="w-full h-[220px] object-cover object-center"/>
          </div>
          <div data-item="service-3" class="bg-surface">
            <img src="https://placehold.co/400x400" alt="Hand holding a test strip above pool water for chemical testing" class="w-full h-[220px] object-cover object-center"/>
          </div>
          <div data-item="service-4" class="bg-surface">
            <img src="https://placehold.co/400x400" alt="Floating chlorine dispenser in a blue above-ground pool" class="w-full h-[220px] object-cover object-center"/>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
