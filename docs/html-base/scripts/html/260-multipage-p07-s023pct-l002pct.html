<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen">
    <section class="hero-section relative min-h-[220px] bg-background overflow-hidden">
      <div class="container mx-auto px-4 max-w-6xl relative flex items-start justify-between">
        <!-- Top left abstract blue shape with line -->
        <div class="absolute left-0 top-0 z-10" style="width: 420px; height: 170px;">
          <svg width="420" height="170" viewBox="0 0 420 170" fill="none" xmlns="http://www.w3.org/2000/svg" class="block">
            <ellipse cx="170" cy="0" rx="170" ry="80" fill="#2196F3"/>
            <path d="M10 60 Q 120 30 220 60 Q 320 90 410 10" stroke="#0a1931" stroke-width="4" fill="none"/>
            <path d="M40 10 Q 100 100 300 100 Q 400 100 410 60" stroke="#0a1931" stroke-width="4" fill="none"/>
          </svg>
        </div>
        <!-- Centered button -->
        <div class="flex-1 flex justify-center pt-2">
          <button class="bg-[#189CFA] text-white px-8 py-4 rounded-lg font-medium shadow focus:outline-none focus:ring-2 focus:ring-[#189CFA] focus:ring-offset-2 transition-all text-base">
            MORE ABOUT US
          </button>
        </div>
        <!-- Beach chair and ball image, bottom right -->
        <div class="absolute right-0 top-[-40px] z-20 flex items-end h-[220px]">
          <img src="https://placehold.co/260x220/png?text= " alt="A realistic illustration of a striped beach chair and a blue-and-white beach ball, both casting a soft shadow on a white background" class="w-[260px] h-[220px] object-contain select-none pointer-events-none" draggable="false" />
        </div>
      </div>
    </section>
  </body>
</html>
