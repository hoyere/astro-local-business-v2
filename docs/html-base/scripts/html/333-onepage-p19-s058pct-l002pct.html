<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="newsletter-section py-16 bg-[#0597fa]">
      <div class="container mx-auto px-4 max-w-7xl flex flex-col md:flex-row items-center justify-between">
        <h2 class="text-white text-2xl md:text-2xl font-bold mb-6 md:mb-0 md:mr-8 leading-snug">
          Sign Up to get updates & news about us.
        </h2>
        <form class="w-full md:w-auto flex flex-col md:flex-row items-center gap-4 md:gap-4" autocomplete="off">
          <label for="newsletter-email" class="sr-only">Email address</label>
          <input
            id="newsletter-email"
            type="email"
            placeholder="Enter your Email"
            class="w-full md:w-[350px] rounded-xl px-6 py-4 text-base text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
            style="background: #fff;"
            required
          />
          <button
            type="submit"
            class="w-full md:w-auto rounded-xl px-8 py-4 bg-[#00153a] text-white font-semibold text-base transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
          >
            SUBSCRIBE
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
