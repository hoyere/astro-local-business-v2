<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="news-section py-0 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="flex items-center justify-between pt-2">
          <h2 class="text-[2.75rem] leading-[1.1] font-bold text-text -ml-2 tracking-tight" style="font-family: 'Montserrat', Arial, sans-serif;">
            Our Latest News &amp; Updates
          </h2>
          <div class="flex space-x-4">
            <button
              class="w-14 h-14 rounded-full border border-border flex items-center justify-center bg-background text-primary text-2xl transition hover:bg-primary-light hover:text-on-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
              aria-label="Previous"
            >
              <i class="fas fa-arrow-left" data-icon="arrow-left"></i>
            </button>
            <button
              class="w-14 h-14 rounded-full border border-border flex items-center justify-center bg-background text-primary text-2xl transition hover:bg-primary-light hover:text-on-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
              aria-label="Next"
            >
              <i class="fas fa-arrow-right" data-icon="arrow-right"></i>
            </button>
          </div>
        </div>
        <div data-collection="news-cards" class="grid grid-cols-3 gap-8 mt-8">
          <article data-item="news-1" class="rounded-2xl overflow-hidden bg-surface shadow-none">
            <img src="https://placehold.co/400x260" alt="Pool cleaning tool in blue swimming pool" class="w-full h-52 object-cover">
          </article>
          <article data-item="news-2" class="rounded-2xl overflow-hidden bg-surface shadow-none">
            <img src="https://placehold.co/400x260" alt="Swimming pool with ladder and poolside background" class="w-full h-52 object-cover">
          </article>
          <article data-item="news-3" class="rounded-2xl overflow-hidden bg-surface shadow-none">
            <img src="https://placehold.co/400x260" alt="Hand holding pool test kit above blue water" class="w-full h-52 object-cover">
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
