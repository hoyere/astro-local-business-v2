<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom background lines for the effect */
      .bg-lines {
        position: absolute;
        inset: 0;
        width: 100vw;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      .bg-lines svg {
        width: 100vw;
        height: 100%;
        display: block;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen relative overflow-hidden">
    <section class="bg-lines pointer-events-none absolute inset-0 w-full h-full">
      <svg width="100%" height="40" viewBox="0 0 1920 40" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <g opacity="0.12">
          <line x1="0" y1="0" x2="0" y2="40" stroke="#0f1c18" stroke-width="2"/>
          <line x1="320" y1="0" x2="320" y2="40" stroke="#0f1c18" stroke-width="2"/>
          <line x1="640" y1="0" x2="640" y2="40" stroke="#0f1c18" stroke-width="2"/>
          <line x1="960" y1="0" x2="960" y2="40" stroke="#0f1c18" stroke-width="2"/>
          <line x1="1280" y1="0" x2="1280" y2="40" stroke="#0f1c18" stroke-width="2"/>
          <line x1="1600" y1="0" x2="1600" y2="40" stroke="#0f1c18" stroke-width="2"/>
          <line x1="1920" y1="0" x2="1920" y2="40" stroke="#0f1c18" stroke-width="2"/>
        </g>
      </svg>
    </section>
  </body>
</html>
