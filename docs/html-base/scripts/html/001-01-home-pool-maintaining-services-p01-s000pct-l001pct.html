<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      body {
        margin: 0;
        padding: 0;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body>
    <section class="hero-section relative h-[60px] w-full overflow-hidden" style="background: linear-gradient(90deg, #f3f3ef 0%, #e9eef1 100%);">
      <div class="container mx-auto px-4 max-w-6xl h-full flex items-start relative">
        <h1 class="text-[48px] font-bold text-[#0a143a] leading-none pt-2 select-none">De</h1>
        <span class="absolute right-0 top-0">
          <span class="block w-[48px] h-[48px] rounded-full bg-[#0a143a]"></span>
        </span>
      </div>
    </section>
  </body>
</html>
