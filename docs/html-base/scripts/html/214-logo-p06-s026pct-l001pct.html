<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="gallery-row-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-full">
        <div class="flex flex-row gap-8 justify-between items-stretch w-full">
          <!-- Card 1 -->
          <div class="flex-1 max-w-xs rounded-3xl overflow-hidden bg-surface shadow-none">
            <div class="relative w-full h-[140px]">
              <img src="https://placehold.co/400x140?text=Pool+Service+1" alt="Two people working on a pool, partially visible, with a blue overlay" class="w-full h-full object-cover rounded-3xl" style="filter: brightness(0.5);" />
            </div>
          </div>
          <!-- Card 2 -->
          <div class="flex-1 max-w-xs rounded-3xl overflow-hidden bg-surface shadow-none">
            <div class="relative w-full h-[140px]">
              <img src="https://placehold.co/400x140?text=Pool+Service+2" alt="Two people inspecting a pool, partially visible, with a blue overlay" class="w-full h-full object-cover rounded-3xl" style="filter: brightness(0.5);" />
            </div>
          </div>
          <!-- Card 3 -->
          <div class="flex-1 max-w-xs rounded-3xl overflow-hidden bg-surface shadow-none">
            <div class="relative w-full h-[140px]">
              <img src="https://placehold.co/400x140?text=Pool+Service+3" alt="Person cleaning a pool with a net, partially visible, with a blue overlay" class="w-full h-full object-cover rounded-3xl" style="filter: brightness(0.5);" />
            </div>
          </div>
          <!-- Card 4 -->
          <div class="flex-1 max-w-xs rounded-3xl overflow-hidden bg-surface shadow-none">
            <div class="relative w-full h-[140px]">
              <img src="https://placehold.co/400x140?text=Pool+Service+4" alt="Person in blue cap working near a pool, partially visible, with a blue overlay" class="w-full h-full object-cover rounded-3xl" style="filter: brightness(0.5);" />
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
