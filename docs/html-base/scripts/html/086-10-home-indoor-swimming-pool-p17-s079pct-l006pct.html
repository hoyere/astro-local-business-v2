<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <!-- Blog Section -->
    <section class="blog-section relative bg-surface-alt pt-24 pb-16 md:pt-32 md:pb-24" style="border-top-left-radius: 80px; border-top-right-radius: 80px;">
      <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row items-center justify-between">
        <div>
          <span class="block text-base font-semibold text-primary mb-2">
            Blog Posts
            <span class="inline-block align-middle ml-2 w-16 h-1 bg-primary" style="vertical-align: middle; border-radius: 2px;"></span>
          </span>
          <h2 class="text-4xl md:text-5xl font-extrabold text-text mt-2 mb-0 leading-tight">
            Our Latest News & Updates
          </h2>
        </div>
        <div class="mt-8 md:mt-0">
          <a href="#" class="inline-block bg-[#0084ff] text-white text-base font-semibold px-10 py-5 rounded focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors duration-150 shadow-none hover:bg-[#006fd6]">
            VIEW ALL POST
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
