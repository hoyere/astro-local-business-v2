<html>
  <head>
    <title>Testimonials - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1793f9]">
      <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 h-[90px] relative">
        <!-- Logo -->
        <div class="flex items-center z-10">
          <div class="bg-background rounded-bl-[80px] rounded-br-[80px] rounded-tl-none rounded-tr-[80px] h-[110px] -ml-4 flex items-center px-8 shadow-none" style="clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);">
            <a href="#" class="flex items-center">
              <!-- Custom Poolax Logo Recreation -->
              <span class="text-[44px] font-bold text-[#0f1c18] leading-none flex items-center">
                <span class="relative mr-1">
                  <span class="text-[#0f1c18]">P</span>
                  <!-- Pool icon for 'oo' -->
                  <span class="absolute left-5 top-1 flex items-center">
                    <svg width="38" height="32" viewBox="0 0 38 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle" aria-hidden="true">
                      <ellipse cx="9" cy="16" rx="8" ry="8" fill="#1793f9"/>
                      <ellipse cx="29" cy="16" rx="8" ry="8" fill="#1793f9"/>
                      <ellipse cx="9" cy="16" rx="6" ry="6" fill="#fff"/>
                      <ellipse cx="29" cy="16" rx="6" ry="6" fill="#fff"/>
                      <ellipse cx="9" cy="16" rx="4" ry="4" fill="#1793f9"/>
                      <ellipse cx="29" cy="16" rx="4" ry="4" fill="#1793f9"/>
                      <!-- Pool ladder -->
                      <rect x="13" y="6" width="2" height="12" rx="1" fill="#0f1c18"/>
                      <rect x="23" y="6" width="2" height="12" rx="1" fill="#0f1c18"/>
                      <rect x="13" y="8" width="12" height="2" rx="1" fill="#0f1c18"/>
                      <rect x="13" y="12" width="12" height="2" rx="1" fill="#0f1c18"/>
                    </svg>
                  </span>
                </span>
                <span class="ml-[54px]">olax</span>
              </span>
            </a>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex items-center justify-center">
          <ul class="flex space-x-8 text-[15px] font-medium text-white">
            <li>
              <a href="#" class="flex items-center hover:underline">
                HOME <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                SERVICES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                PAGES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                BLOGS <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4">
          <button class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-[#0f1c18] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-[#0f1c18] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-[#1566a0] min-h-[340px] flex items-end pb-16" style="background: linear-gradient(120deg, #1566a0 60%, #1793f9 100%);">
      <!-- Background image with bubbles (placeholder) -->
      <img src="https://placehold.co/1600x600/1566a0/ffffff?text=Pool+background+with+bubbles+and+pool+edge" alt="Blue pool background with bubbles and pool edge" class="absolute inset-0 w-full h-full object-cover opacity-80 pointer-events-none select-none" style="z-index:1;">
      <!-- Overlay for blue tint -->
      <div class="absolute inset-0 bg-[#1566a0]/80" style="z-index:2;"></div>
      <!-- Content -->
      <div class="container mx-auto max-w-7xl relative z-10 px-4">
        <div class="pt-20">
          <h1 class="text-white text-5xl md:text-6xl font-bold mb-8">Testimonials</h1>
          <nav class="flex items-center space-x-2 text-white text-lg font-medium" aria-label="Breadcrumb">
            <span class="text-white/80">Home</span>
            <span class="mx-1 text-white/60"><i class="fas fa-arrow-right text-base" data-icon="arrow-right"></i></span>
            <span class="text-white">Testimonials</span>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
