<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-[#0094ff]">
    <section class="contact-hero-section py-24 bg-[#0094ff] relative overflow-hidden">
      <div class="container mx-auto px-8 max-w-7xl flex flex-row items-start">
        <!-- Left: Title -->
        <div class="w-1/2">
          <div class="flex items-center mb-6">
            <i class="fas fa-caret-right text-accent mr-2 text-lg" data-icon="caret-right" style="color:var(--color-accent)"></i>
            <span class="text-white font-semibold text-lg">Contact Us</span>
          </div>
          <h1 class="text-white text-5xl md:text-6xl font-bold leading-tight mb-0">Feel Free to Contact Us</h1>
        </div>
        <!-- Right: Description -->
        <div class="w-1/2 flex items-center">
          <p class="text-white text-lg leading-relaxed">
            We can contact provides exceptional pool maintenance pool cleaning and pool equipment repair for the Area! We are master Contact provides exceptional pool maintenance pool cleaning and pool equipment.
          </p>
        </div>
      </div>
      <!-- Decorative SVG background pattern -->
      <div class="absolute inset-0 pointer-events-none">
        <svg class="w-full h-full" viewBox="0 0 1440 320" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path fill="none" stroke="#00aaff" stroke-opacity="0.25" stroke-width="2"
            d="M0,320 C480,160 960,480 1440,320" />
          <path fill="none" stroke="#00aaff" stroke-opacity="0.15" stroke-width="2"
            d="M0,240 C480,80 960,400 1440,240" />
          <path fill="none" stroke="#00aaff" stroke-opacity="0.10" stroke-width="2"
            d="M0,160 C480,0 960,320 1440,160" />
        </svg>
      </div>
    </section>
  </body>
</html>
