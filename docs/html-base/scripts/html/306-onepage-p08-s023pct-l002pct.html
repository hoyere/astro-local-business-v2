<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .pool-bg {
        background-color: #f5fbf8;
        background-image: url('data:image/svg+xml;utf8,<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M 0 100 Q 100 0 200 100 T 400 100 T 600 100 T 800 100 V 400 H 0 Z" fill="%23e6f2f0" /><path d="M 0 200 Q 100 300 200 200 T 400 200 T 600 200 T 800 200" fill="none" stroke="%23e6f2f0" stroke-width="20"/><path d="M 0 300 Q 100 200 200 300 T 400 300 T 600 300 T 800 300" fill="none" stroke="%23e6f2f0" stroke-width="20"/></svg>');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section pool-bg py-16 md:py-20">
      <div class="container mx-auto px-4 max-w-5xl text-center">
        <div class="flex items-center justify-center mb-4">
          <span class="hidden sm:inline-block w-20 h-px bg-primary-light mr-4 align-middle"></span>
          <span class="text-base md:text-lg font-medium text-primary" style="color:#2196f3;">Our Best Services</span>
          <span class="hidden sm:inline-block w-20 h-px bg-primary-light ml-4 align-middle"></span>
        </div>
        <h2 class="text-3xl md:text-5xl font-extrabold text-text mt-2" style="font-family: 'Montserrat', sans-serif;">
          Our Best Pool Services For You!
        </h2>
      </div>
    </section>
  </body>
</html>
