<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="py-0 bg-background pool-steps-section">
      <div class="container mx-auto px-0 max-w-6xl">
        <div data-collection="pool-steps" class="flex gap-4 md:gap-6 justify-center">
          <!-- Card 1 -->
          <article data-item="step-1" class="relative bg-surface rounded-2xl overflow-hidden flex-1 min-w-0 shadow-none">
            <img src="https://placehold.co/800x600" alt="Hand installing a pool skimmer in a blue above-ground pool" class="w-full h-[220px] object-cover object-center">
            <span class="absolute bottom-4 right-4 bg-primary text-on-primary text-lg font-bold rounded-xl px-4 py-1 shadow-md select-none" style="font-variant-numeric: tabular-nums;">02</span>
          </article>
          <!-- Card 2 -->
          <article data-item="step-2" class="relative bg-surface rounded-2xl overflow-hidden flex-1 min-w-0 shadow-none">
            <img src="https://placehold.co/800x600" alt="Pool vacuum brush cleaning the tiled floor of a swimming pool" class="w-full h-[220px] object-cover object-center">
            <span class="absolute bottom-4 right-4 bg-primary text-on-primary text-lg font-bold rounded-xl px-4 py-1 shadow-md select-none" style="font-variant-numeric: tabular-nums;">02</span>
          </article>
          <!-- Card 3 -->
          <article data-item="step-3" class="relative bg-surface rounded-2xl overflow-hidden flex-1 min-w-0 shadow-none">
            <img src="https://placehold.co/800x600" alt="Pool hose connected to a pump, filling or draining a swimming pool" class="w-full h-[220px] object-cover object-center">
            <span class="absolute bottom-4 right-4 bg-primary text-on-primary text-lg font-bold rounded-xl px-4 py-1 shadow-md select-none" style="font-variant-numeric: tabular-nums;">02</span>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
