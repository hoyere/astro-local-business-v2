<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .vertical-divider {
        background: repeating-linear-gradient(
          120deg,
          #eaf1f7 0px,
          #eaf1f7 20px,
          #f5fbf8 20px,
          #f5fbf8 40px
        );
        opacity: 0.5;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen">
    <section class="columns-section w-full h-screen flex items-stretch bg-background">
      <!-- Left vertical divider -->
      <div class="vertical-divider w-[32px] h-full"></div>
      <!-- First column -->
      <div class="flex-1 h-full"></div>
      <!-- Middle vertical divider -->
      <div class="vertical-divider w-[32px] h-full"></div>
      <!-- Second column -->
      <div class="flex-1 h-full"></div>
      <!-- Right vertical divider -->
      <div class="vertical-divider w-[32px] h-full"></div>
      <!-- Third column -->
      <div class="flex-1 h-full"></div>
      <!-- Far right vertical divider -->
      <div class="vertical-divider w-[32px] h-full"></div>
    </section>
  </body>
</html>
