<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .pattern-bg {
        background-color: #f5fbf8;
        background-image: url('data:image/svg+xml;utf8,<svg width="800" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 60 Q40 0 80 60 T160 60 T240 60 T320 60 T400 60 T480 60 T560 60 T640 60 T720 60 T800 60" stroke="%23e6f0f5" stroke-width="8" fill="none"/><path d="M0 120 Q40 60 80 120 T160 120 T240 120 T320 120 T400 120 T480 120 T560 120 T640 120 T720 120 T800 120" stroke="%23e6f0f5" stroke-width="8" fill="none"/><path d="M40 0 Q80 60 120 0 T200 0 T280 0 T360 0 T440 0 T520 0 T600 0 T680 0 T760 0 T800 0" stroke="%23e6f0f5" stroke-width="8" fill="none"/></svg>');
        background-repeat: repeat-x;
        background-size: auto 120px;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="pattern-bg h-[120px] w-full"></section>
  </body>
</html>
