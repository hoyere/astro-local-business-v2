<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">
  <section class="services-section py-0 bg-background">
    <div class="container mx-auto px-0 max-w-6xl">
      <div data-collection="services" class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
        <article data-item="service-1" class="bg-surface rounded-lg overflow-hidden shadow-none flex flex-col">
          <img src="https://placehold.co/600x400?text=Person+cleaning+pool+deck+with+water+hose+%7C+green+pants+%7C+outdoor+pool" alt="Person cleaning a pool deck with a water hose, wearing green pants, next to a blue pool" class="w-full h-[260px] object-cover">
        </article>
        <article data-item="service-2" class="bg-surface rounded-lg overflow-hidden shadow-none flex flex-col">
          <img src="https://placehold.co/600x400?text=Person+placing+robotic+pool+cleaner+in+pool+%7C+wood+deck+%7C+blue+water" alt="Person placing a yellow robotic pool cleaner into a pool, standing on a wooden deck with blue water" class="w-full h-[260px] object-cover">
        </article>
        <article data-item="service-3" class="bg-surface rounded-lg overflow-hidden shadow-none flex flex-col">
          <img src="https://placehold.co/600x400?text=Person+skimming+pool+with+net+%7C+tropical+background+%7C+orange+shirt" alt="Person skimming a pool with a net, wearing an orange shirt, with a tropical background" class="w-full h-[260px] object-cover">
        </article>
      </div>
    </div>
  </section>
</body>
</html>
