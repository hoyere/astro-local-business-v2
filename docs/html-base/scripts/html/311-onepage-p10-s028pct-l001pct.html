<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-6xl">
        <div data-collection="services" class="flex flex-row justify-between items-stretch gap-0">
          <!-- Card 1 -->
          <article data-item="service-1" class="flex-1 relative overflow-hidden">
            <img src="https://placehold.co/800x600" alt="Lush green grass, representing lawn care service" class="w-full h-[120px] object-cover object-top block">
          </article>
          <!-- Card 2 -->
          <article data-item="service-2" class="flex-1 relative overflow-hidden">
            <img src="https://placehold.co/800x600" alt="Pool cleaning net on wooden deck by blue swimming pool" class="w-full h-[120px] object-cover object-top block">
          </article>
          <!-- Card 3 -->
          <article data-item="service-3" class="flex-1 relative overflow-hidden">
            <img src="https://placehold.co/800x600" alt="Person cleaning a swimming pool with a net, clear blue water" class="w-full h-[120px] object-cover object-top block">
          </article>
          <!-- Card 4 -->
          <article data-item="service-4" class="flex-1 relative overflow-hidden">
            <img src="https://placehold.co/800x600" alt="Lush green grass, representing lawn care service" class="w-full h-[120px] object-cover object-top block">
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
