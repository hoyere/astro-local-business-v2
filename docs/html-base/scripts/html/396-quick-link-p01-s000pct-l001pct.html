<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="header-bar-section">
      <div class="relative h-[32px] w-full bg-background overflow-hidden">
        <!-- Subtle top gradient shadow -->
        <div class="absolute inset-0 bg-gradient-to-b from-[#f8fafc] via-[#f8fafc]/80 to-transparent pointer-events-none"></div>
        <!-- Left rounded purple tab -->
        <div class="absolute left-0 top-0 h-[32px] w-[220px] rounded-tl-[16px] rounded-tr-[16px] bg-[#5a62c7]"></div>
        <!-- Right rounded white tab (barely visible) -->
        <div class="absolute right-0 top-0 h-[32px] w-[120px] rounded-tl-[16px] rounded-tr-[16px] bg-[#f8fafc] border border-[#e5e7eb]"></div>
      </div>
    </section>
  </body>
</html>
