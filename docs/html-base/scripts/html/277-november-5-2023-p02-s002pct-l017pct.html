<html>
<head>
  <meta charset="UTF-8">
  <title>Day: November 5, 2023</title>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom font for logo */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
    .logo-font {
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      letter-spacing: -1px;
    }
    /* Custom bubble effect for hero */
    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(255,255,255,0.25);
      pointer-events: none;
      animation: bubble-float 8s infinite ease-in-out;
    }
    .bubble1 { width: 40px; height: 40px; left: 12%; top: 70%; animation-delay: 0s;}
    .bubble2 { width: 28px; height: 28px; left: 22%; top: 80%; animation-delay: 2s;}
    .bubble3 { width: 60px; height: 60px; left: 78%; top: 40%; animation-delay: 1s;}
    .bubble4 { width: 32px; height: 32px; left: 85%; top: 60%; animation-delay: 3s;}
    .bubble5 { width: 20px; height: 20px; left: 60%; top: 85%; animation-delay: 4s;}
    @keyframes bubble-float {
      0% { transform: translateY(0) scale(1);}
      50% { transform: translateY(-30px) scale(1.1);}
      100% { transform: translateY(0) scale(1);}
    }
    /* Hide scroll on hero overlay */
    .hero-section {
      overflow: hidden;
    }
    /* Custom menu underline */
    .nav-link {
      position: relative;
      transition: color 0.2s;
    }
    .nav-link:after {
      content: '';
      display: block;
      width: 0;
      height: 2px;
      background: var(--color-primary);
      transition: width .2s;
      position: absolute;
      left: 0;
      bottom: -4px;
    }
    .nav-link:hover:after, .nav-link:focus:after {
      width: 100%;
    }
    .nav-link:focus {
      outline: none;
      color: var(--color-primary);
    }
    /* Dropdown caret */
    .caret {
      font-size: 0.7em;
      margin-left: 0.25em;
      vertical-align: middle;
    }
    /* Responsive logo shape */
    @media (max-width: 768px) {
      .logo-shape {
        border-radius: 0 0 2rem 2rem;
        padding-bottom: 1rem;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text">

  <!-- Header / Navbar -->
  <header class="w-full bg-primary-light">
    <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-2">
      <!-- Logo -->
      <div class="flex items-center">
        <div class="logo-shape bg-background rounded-br-[80px] rounded-bl-[40px] rounded-tr-[80px] rounded-tl-none shadow-sm px-8 py-4 flex items-center" style="min-width:260px;">
          <span class="logo-font text-4xl text-text flex items-center relative select-none">
            <span class="relative">
              P
              <!-- Pool icon: two circles and a wave underline -->
              <span class="absolute left-3 top-[-0.6em] flex items-center">
                <span class="inline-block w-4 h-4 bg-primary rounded-full border-2 border-primary-dark mr-1"></span>
                <span class="inline-block w-4 h-4 bg-primary rounded-full border-2 border-primary-dark"></span>
              </span>
              <span class="absolute left-3 top-2.5 w-8 h-2">
                <svg width="32" height="8" viewBox="0 0 32 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M0 4 Q 8 8 16 4 Q 24 0 32 4" stroke="#02a26a" stroke-width="2" fill="none"/>
                </svg>
              </span>
            </span>
            <span class="ml-2">oolax</span>
          </span>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="hidden lg:flex items-center space-x-8 ml-8">
        <a href="#" class="nav-link text-on-primary text-base font-medium hover:text-background focus:text-background focus:outline-none">HOME <i class="fas fa-caret-down caret"></i></a>
        <a href="#" class="nav-link text-on-primary text-base font-medium hover:text-background focus:text-background focus:outline-none">ABOUT US</a>
        <a href="#" class="nav-link text-on-primary text-base font-medium hover:text-background focus:text-background focus:outline-none">SERVICES <i class="fas fa-caret-down caret"></i></a>
        <a href="#" class="nav-link text-on-primary text-base font-medium hover:text-background focus:text-background focus:outline-none">PAGES <i class="fas fa-caret-down caret"></i></a>
        <a href="#" class="nav-link text-on-primary text-base font-medium hover:text-background focus:text-background focus:outline-none">BLOGS <i class="fas fa-caret-down caret"></i></a>
        <a href="#" class="nav-link text-on-primary text-base font-medium hover:text-background focus:text-background focus:outline-none">CONTACT US</a>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4 ml-4">
        <button class="bg-background rounded-full w-12 h-12 flex items-center justify-center shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
          <i class="fas fa-search text-primary text-xl" data-icon="search"></i>
        </button>
        <button class="bg-background rounded-full w-12 h-12 flex items-center justify-center shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
          <i class="fas fa-bars text-primary text-xl" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section relative bg-primary-light" style="min-height:340px;">
    <div class="absolute inset-0 z-0">
      <!-- Background image with overlay -->
      <img src="https://placehold.co/1200x400/1e3e5c/ffffff?text=Pool+background+with+net+and+bubbles" alt="Pool background with net and bubbles" class="w-full h-full object-cover object-center opacity-60" />
      <!-- Blue geometric overlay -->
      <div class="absolute inset-0 bg-gradient-to-r from-primary-dark/80 via-primary/80 to-primary-light/80"></div>
      <!-- Bubbles -->
      <span class="bubble bubble1"></span>
      <span class="bubble bubble2"></span>
      <span class="bubble bubble3"></span>
      <span class="bubble bubble4"></span>
      <span class="bubble bubble5"></span>
    </div>
    <div class="relative z-10 container mx-auto max-w-6xl px-4 py-20 flex flex-col justify-center" style="min-height:340px;">
      <h1 class="text-5xl md:text-6xl font-bold text-on-primary mb-6">Day: November 5, 2023</h1>
      <nav class="flex items-center text-on-primary text-lg font-medium space-x-2">
        <a href="#" class="hover:underline focus:outline-none focus:underline">Home</a>
        <span class="mx-1 text-on-primary"><i class="fas fa-arrow-right text-on-primary text-xs" data-icon="arrow-right"></i></span>
        <a href="#" class="hover:underline focus:outline-none focus:underline">2023</a>
        <span class="mx-1 text-on-primary"><i class="fas fa-arrow-right text-on-primary text-xs" data-icon="arrow-right"></i></span>
        <a href="#" class="hover:underline focus:outline-none focus:underline">November</a>
        <span class="mx-1 text-on-primary"><i class="fas fa-arrow-right text-on-primary text-xs" data-icon="arrow-right"></i></span>
        <span class="text-on-primary">05</span>
      </nav>
    </div>
  </section>

</body>
</html>
