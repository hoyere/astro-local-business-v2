<html>
<head>
  <title>Swimming Class - Poolax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom styles for logo shape */
    .logo-bg {
      border-bottom-right-radius: 64px;
      border-bottom-left-radius: 0;
      border-top-right-radius: 64px;
      border-top-left-radius: 0;
    }
    @media (max-width: 1024px) {
      .logo-bg {
        border-bottom-right-radius: 40px;
        border-top-right-radius: 40px;
      }
    }
    /* Custom styles for hero overlay */
    .hero-bg {
      background: linear-gradient(120deg, rgba(0, 74, 173, 0.85) 0%, rgba(0, 74, 173, 0.7) 100%);
      position: relative;
      overflow: hidden;
    }
    .hero-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80') center center/cover no-repeat;
      opacity: 0.35;
      z-index: 0;
    }
    .hero-bg > * {
      position: relative;
      z-index: 1;
    }
    /* Bubble styles */
    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(255,255,255,0.35);
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
      pointer-events: none;
      animation: float 8s infinite ease-in-out;
    }
    .bubble1 { width: 48px; height: 48px; left: 12%; top: 60%; animation-delay: 0s;}
    .bubble2 { width: 32px; height: 32px; left: 30%; top: 80%; animation-delay: 2s;}
    .bubble3 { width: 40px; height: 40px; left: 70%; top: 30%; animation-delay: 1s;}
    .bubble4 { width: 28px; height: 28px; left: 85%; top: 60%; animation-delay: 3s;}
    .bubble5 { width: 20px; height: 20px; left: 60%; top: 85%; animation-delay: 4s;}
    .bubble6 { width: 24px; height: 24px; left: 50%; top: 50%; animation-delay: 5s;}
    @keyframes float {
      0% { transform: translateY(0);}
      50% { transform: translateY(-30px);}
      100% { transform: translateY(0);}
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text font-sans">

  <!-- Header/Navbar -->
  <header class="w-full bg-[#1792f5]">
    <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 min-h-[90px]">
      <!-- Logo -->
      <div class="logo-bg bg-background flex items-center px-8 py-4 shadow-sm" style="border-bottom-right-radius:64px; border-top-right-radius:64px;">
        <a href="#" class="flex items-center space-x-2">
          <!-- Custom Poolax logo recreation -->
          <span class="text-[2.5rem] font-bold text-[#0f1c18] leading-none flex items-center">
            P
            <span class="relative inline-block mx-0.5">
              <span class="inline-block text-[#1792f5] font-bold" style="letter-spacing:-0.1em;">oo</span>
              <!-- Pool goggles icon recreation -->
              <span class="absolute left-0 top-0 flex space-x-1">
                <svg data-icon="goggles" width="32" height="18" viewBox="0 0 32 18" fill="none" class="inline-block" aria-hidden="true">
                  <ellipse cx="8" cy="9" rx="7" ry="7" stroke="#0f1c18" stroke-width="2" fill="none"/>
                  <ellipse cx="24" cy="9" rx="7" ry="7" stroke="#0f1c18" stroke-width="2" fill="none"/>
                  <ellipse cx="8" cy="9" rx="4" ry="4" fill="#1792f5"/>
                  <ellipse cx="24" cy="9" rx="4" ry="4" fill="#1792f5"/>
                  <rect x="7" y="2" width="18" height="2" rx="1" fill="#0f1c18"/>
                </svg>
              </span>
            </span>
            lax
          </span>
        </a>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 flex items-center justify-center">
        <ul class="flex space-x-8 text-[1rem] font-medium text-white">
          <li>
            <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
              HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:text-accent transition-colors">ABOUT US</a>
          </li>
          <li>
            <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
              SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
              PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
              BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:text-accent transition-colors">CONTACT US</a>
          </li>
        </ul>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4">
        <button aria-label="Search" class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-[#1792f5] text-xl shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button aria-label="Menu" class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-[#1792f5] text-xl shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section hero-bg relative min-h-[340px] md:min-h-[380px] flex items-center">
    <!-- Decorative bubbles -->
    <span class="bubble bubble1"></span>
    <span class="bubble bubble2"></span>
    <span class="bubble bubble3"></span>
    <span class="bubble bubble4"></span>
    <span class="bubble bubble5"></span>
    <span class="bubble bubble6"></span>
    <div class="container mx-auto max-w-7xl px-4 py-16 md:py-20">
      <h1 class="text-white text-4xl md:text-5xl font-bold mb-6">Swimming Class</h1>
      <nav class="flex items-center space-x-2 text-white text-lg font-medium" aria-label="Breadcrumb">
        <span class="text-white/80 text-base">Home</span>
        <span class="mx-1 text-white/60 text-base"><i class="fas fa-arrow-right text-xs" data-icon="arrow-right"></i></span>
        <span class="text-white text-base">Swimming Class</span>
      </nav>
    </div>
  </section>

</body>
</html>
