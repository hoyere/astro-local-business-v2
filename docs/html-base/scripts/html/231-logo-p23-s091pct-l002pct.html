<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-background min-h-screen m-0 p-0">
    <section class="shadow-divider-section relative bg-background">
      <div class="w-full h-[40px] relative">
        <!-- Four subtle shadow dips evenly spaced across the top -->
        <div class="absolute top-0 left-0 w-1/4 h-full flex justify-center pointer-events-none">
          <div class="w-3/4 h-3 mx-auto rounded-b-full shadow-[0_8px_16px_0_rgba(0,0,0,0.07)]"></div>
        </div>
        <div class="absolute top-0 left-1/4 w-1/4 h-full flex justify-center pointer-events-none">
          <div class="w-3/4 h-3 mx-auto rounded-b-full shadow-[0_8px_16px_0_rgba(0,0,0,0.07)]"></div>
        </div>
        <div class="absolute top-0 left-2/4 w-1/4 h-full flex justify-center pointer-events-none">
          <div class="w-3/4 h-3 mx-auto rounded-b-full shadow-[0_8px_16px_0_rgba(0,0,0,0.07)]"></div>
        </div>
        <div class="absolute top-0 left-3/4 w-1/4 h-full flex justify-center pointer-events-none">
          <div class="w-3/4 h-3 mx-auto rounded-b-full shadow-[0_8px_16px_0_rgba(0,0,0,0.07)]"></div>
        </div>
      </div>
      <div class="w-full h-[180px] bg-background"></div>
    </section>
  </body>
</html>
