<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background m-0 p-0">
    <section class="hero-section relative h-[120px] min-h-[120px] overflow-hidden p-0 m-0">
      <!-- Curved SVG divider with dark overlay and white curve -->
      <svg
        class="absolute top-0 left-0 w-full h-full"
        viewBox="0 0 1280 120"
        fill="none"
        preserveAspectRatio="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
        focusable="false"
      >
        <path
          d="M0 0L80 60C160 120 320 120 640 60C960 0 1120 0 1280 60L1280 0L0 0Z"
          fill="#232b3b"
          fill-opacity="0.92"
        />
        <!-- White curve for accent -->
        <path
          d="M0 0 Q40 40 80 60 Q160 120 640 60 Q1120 0 1280 60"
          stroke="#fff"
          stroke-width="3"
          fill="none"
        />
        <!-- Decorative white circle (left) -->
        <circle cx="80" cy="80" r="60" stroke="#fff" stroke-width="3" fill="none" />
        <!-- Faint bubbles (right, center) -->
        <circle cx="400" cy="60" r="24" fill="#fff" fill-opacity="0.07"/>
        <circle cx="700" cy="40" r="14" fill="#fff" fill-opacity="0.07"/>
        <circle cx="900" cy="80" r="18" fill="#fff" fill-opacity="0.04"/>
      </svg>
    </section>
  </body>
</html>
