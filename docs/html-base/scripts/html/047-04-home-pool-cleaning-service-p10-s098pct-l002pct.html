<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="relative h-[190px] overflow-hidden hero-section">
      <!-- Background image -->
      <img src="https://placehold.co/1600x600" alt="Man cleaning a pool with trees and umbrellas in the background" class="absolute inset-0 w-full h-full object-cover z-0">

      <!-- Blue geometric overlay (top right) -->
      <div class="absolute top-0 right-0 w-[40vw] h-full z-10" style="clip-path: polygon(40% 0,100% 0,100% 100%,0 100%); background: #0d8bfa;">
        <div class="absolute inset-0 opacity-20" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');"></div>
      </div>

      <!-- Card overlay -->
      <div class="absolute left-1/2 top-[90px] -translate-x-1/2 z-20 w-[900px] max-w-[95vw]">
        <div class="bg-[#061a3a] rounded-xl shadow-lg px-10 py-6">
          <span class="block text-[#2196f3] text-xl font-medium leading-tight">
            Why Choose Us <span class="inline-block align-middle ml-2 w-24 h-0.5 bg-[#2196f3]"></span>
          </span>
        </div>
      </div>
    </section>
  </body>
</html>
