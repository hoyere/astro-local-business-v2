<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section py-8 bg-surface-alt">
      <div class="container mx-auto px-4 max-w-7xl">
        <div data-collection="services" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
          <!-- Card 1 -->
          <article data-item="service-1" class="bg-surface-alt rounded-lg flex flex-col items-center py-12 px-4 border border-border">
            <div class="flex items-center justify-center w-24 h-24 rounded-full border border-border mb-6">
              <!-- Pool Icon -->
              <svg data-icon="pool" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-primary" fill="none" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="23" stroke="#dcebe4" stroke-width="2" fill="none"/>
                <g stroke="#02a26a" stroke-width="2" fill="none">
                  <rect x="12" y="14" width="24" height="12" rx="3"/>
                  <path d="M16 26v-8a4 4 0 1 1 8 0v8"/>
                  <path d="M32 26v-8a4 4 0 1 0-8 0v8"/>
                  <path d="M14 30c2 2 6 2 8 0s6-2 8 0"/>
                </g>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-text text-center">Renovations Pool</h3>
          </article>
          <!-- Card 2 -->
          <article data-item="service-2" class="bg-surface-alt rounded-lg flex flex-col items-center py-12 px-4 border border-border">
            <div class="flex items-center justify-center w-24 h-24 rounded-full border border-border mb-6">
              <!-- Automatic Cleaners Icon -->
              <svg data-icon="cleaner" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-primary" fill="none" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="23" stroke="#dcebe4" stroke-width="2" fill="none"/>
                <g stroke="#02a26a" stroke-width="2" fill="none">
                  <path d="M18 34l12-2-2-8-12 2z"/>
                  <path d="M28 24l2-6"/>
                  <circle cx="30" cy="18" r="2" fill="#02a26a"/>
                  <path d="M20 32l-2 4"/>
                  <path d="M32 32l2 4"/>
                </g>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-text text-center">Automatic Cleaners</h3>
          </article>
          <!-- Card 3 -->
          <article data-item="service-3" class="bg-surface-alt rounded-lg flex flex-col items-center py-12 px-4 border border-border">
            <div class="flex items-center justify-center w-24 h-24 rounded-full border border-border mb-6">
              <!-- Services Specialty Icon -->
              <svg data-icon="specialty" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-primary" fill="none" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="23" stroke="#dcebe4" stroke-width="2" fill="none"/>
                <g stroke="#02a26a" stroke-width="2" fill="none">
                  <path d="M24 32c-4-2-8-6-8-10a8 8 0 1 1 16 0c0 4-4 8-8 10z"/>
                  <circle cx="24" cy="22" r="2"/>
                  <path d="M24 24v2"/>
                </g>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-text text-center">Services Specialty</h3>
          </article>
          <!-- Card 4 -->
          <article data-item="service-4" class="bg-surface-alt rounded-lg flex flex-col items-center py-12 px-4 border border-border">
            <div class="flex items-center justify-center w-24 h-24 rounded-full border border-border mb-6">
              <!-- Pool Cleaning Bliss Icon -->
              <svg data-icon="cleaning" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-primary" fill="none" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="23" stroke="#dcebe4" stroke-width="2" fill="none"/>
                <g stroke="#02a26a" stroke-width="2" fill="none">
                  <rect x="18" y="18" width="12" height="8" rx="2"/>
                  <path d="M24 26v8"/>
                  <path d="M20 34h8"/>
                  <path d="M22 30l-2 4"/>
                  <path d="M26 30l2 4"/>
                  <path d="M28 20l2-2"/>
                  <path d="M20 20l-2-2"/>
                </g>
                <g stroke="#3ad69e" stroke-width="2" fill="none">
                  <path d="M32 16l2 2"/>
                  <path d="M16 16l-2 2"/>
                </g>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-text text-center">Pool Cleaning Bliss</h3>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
