<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="gallery-section py-16 md:py-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
          <!-- Left column (2/5 width) -->
          <div class="flex flex-col gap-4 col-span-2">
            <img src="https://placehold.co/800x400" alt="Children jumping into a clean swimming pool with clear blue water" class="w-full h-[200px] md:h-[220px] object-cover rounded-lg">
            <img src="https://placehold.co/800x600" alt="Automatic pool vacuum cleaner with blue hose in a backyard pool" class="w-full h-[300px] md:h-[320px] object-cover rounded-lg">
            <img src="https://placehold.co/800x400" alt="Two kids playing and running near a swimming pool on a sunny day" class="w-full h-[160px] md:h-[140px] object-cover rounded-lg">
          </div>
          <!-- Right column (3/5 width) -->
          <div class="flex flex-col gap-4 col-span-2 md:col-span-3">
            <div class="flex flex-row gap-4 h-[200px] md:h-[220px]">
              <img src="https://placehold.co/600x400" alt="Manual pool vacuum with blue hose cleaning the bottom of a pool" class="w-1/2 h-full object-cover rounded-lg">
              <img src="https://placehold.co/600x400" alt="Close-up of a sparkling clean pool edge with blue water" class="w-1/2 h-full object-cover rounded-lg">
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
