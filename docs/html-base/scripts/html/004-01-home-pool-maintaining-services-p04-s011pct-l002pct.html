<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="logo-cloud-section py-8 bg-background">
      <div class="container mx-auto px-4 max-w-7xl">

          <div data-item="logo-1" class="flex items-center justify-center h-40">
            <img src="https://placehold.co/180x60?text=Capital+Power+Logo" alt="Capital Power logo in grayscale" class="h-12 object-contain grayscale opacity-70" />
          </div>
          <div data-item="logo-2" class="flex items-center justify-center h-40">
            <img src="https://placehold.co/180x60?text=Editas+Medicine+Logo" alt="Editas Medicine logo in grayscale" class="h-12 object-contain grayscale opacity-70" />
          </div>
          <div data-item="logo-3" class="flex items-center justify-center h-40">
            <img src="https://placehold.co/180x60?text=Variant+Logo" alt="Variant logo in grayscale" class="h-12 object-contain grayscale opacity-70" />
          </div>
          <div data-item="logo-4" class="flex items-center justify-center h-40">
            <img src="https://placehold.co/180x60?text=Capital+Power+Logo" alt="Capital Power logo in grayscale" class="h-12 object-contain grayscale opacity-70" />
          </div>
          <div data-item="logo-5" class="flex items-center justify-center h-40">
            <img src="https://placehold.co/180x60?text=Synchrony+Engineers+Logo" alt="Synchrony Engineers logo in grayscale" class="h-12 object-contain grayscale opacity-70" />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
