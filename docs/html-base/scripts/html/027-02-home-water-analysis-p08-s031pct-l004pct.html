<html>
  <head>
    <title>Pool Cleaning Services Gallery</title>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="gallery-section py-0 bg-background">
      <div class="w-full flex flex-row items-stretch justify-center gap-0 max-w-none">
        <!-- Image 1 -->
        <div class="flex-1 min-w-0 relative">
          <img src="https://placehold.co/800x600?text=Pool+skimmer+basket+in+blue+pool+water" alt="Close-up of a blue pool skimmer basket floating in clear blue pool water next to a stone edge" class="w-full h-[420px] object-cover block" />
        </div>
        <!-- Divider -->
        <div class="w-[28px] bg-[#181c20] hidden md:block"></div>
        <!-- Image 2 -->
        <div class="flex-1 min-w-0 relative">
          <img src="https://placehold.co/800x600?text=Person+using+pool+vacuum+in+spa" alt="Person's hands operating a blue pool vacuum cleaner in a spa or hot tub with water jets" class="w-full h-[420px] object-cover block" />
        </div>
        <!-- Divider -->
        <div class="w-[28px] bg-[#181c20] hidden md:block"></div>
        <!-- Image 3 -->
        <div class="flex-1 min-w-0 relative">
          <img src="https://placehold.co/800x600?text=Clean+pool+with+steps+and+hose" alt="Clean swimming pool with visible steps, pool hose, and pool deck" class="w-full h-[420px] object-cover block" />
        </div>
        <!-- Divider -->
        <div class="w-[28px] bg-[#181c20] hidden md:block"></div>
        <!-- Image 4 -->
        <div class="flex-1 min-w-0 relative">
          <img src="https://placehold.co/800x600?text=Pool+net+skimmer+in+water" alt="Blue pool net skimmer on a pole being used to clean debris from a swimming pool" class="w-full h-[420px] object-cover block" />
        </div>
      </div>
      <!-- White bottom border accent -->
      <div class="w-full flex flex-row items-stretch justify-center gap-0 max-w-none">
        <div class="flex-1 min-w-0 h-8 bg-white"></div>
        <div class="w-[28px] h-8 bg-white hidden md:block"></div>
        <div class="flex-1 min-w-0 h-8 bg-white"></div>
        <div class="w-[28px] h-8 bg-white hidden md:block"></div>
        <div class="flex-1 min-w-0 h-8 bg-white"></div>
        <div class="w-[28px] h-8 bg-white hidden md:block"></div>
        <div class="flex-1 min-w-0 h-8 bg-white"></div>
      </div>
    </section>
  </body>
</html>
