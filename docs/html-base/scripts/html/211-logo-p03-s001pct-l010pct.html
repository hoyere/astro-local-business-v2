<html>
  <head>
    <title>Hero Scroll Section</title>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom background for hero */
      .hero-bg {
        background: radial-gradient(ellipse at 20% 30%, #f8fafc 60%, #e0f2fe 100%);
        /* Subtle water ripple pattern overlay */
        position: relative;
        overflow: hidden;
      }
      .hero-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background: url('https://www.transparenttextures.com/patterns/connected.png');
        opacity: 0.13;
        pointer-events: none;
      }
      .hero-content {
        position: relative;
        z-index: 1;
      }
      /* Curved bottom for hero */
      .hero-curve {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        width: 100%;
        height: 180px;
        pointer-events: none;
        z-index: 2;
      }
      @media (min-width: 768px) {
        .hero-curve {
          height: 260px;
        }
      }
      /* Scroll badge */
      .scroll-badge {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: -48px;
        z-index: 3;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Hero Section -->
    <section class="hero-section relative min-h-[70vh] md:min-h-[75vh] flex flex-col justify-end hero-bg">
      <div class="hero-content w-full">
        <!-- Empty for now, as the screenshot shows only background -->
      </div>
      <!-- Curved bottom divider -->
      <div class="hero-curve">
        <svg viewBox="0 0 1440 180" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full block">
          <path d="M0 0C360 180 1080 180 1440 0V180H0V0Z" fill="#fff"/>
        </svg>
      </div>
      <!-- Scroll badge -->
      <div class="scroll-badge">
        <div class="w-16 h-16 rounded-full bg-[#0f1c18] flex items-center justify-center shadow-lg border-4 border-white">
          <span class="text-xs text-white tracking-widest font-semibold flex flex-col items-center justify-center">
            <span class="block" style="letter-spacing:0.2em;">SCROLL</span>
            <i class="fas fa-arrow-down mt-1" data-icon="arrow-down"></i>
          </span>
        </div>
      </div>
    </section>

    <!-- Trusted Partner Section -->
    <section class="trusted-partner-section bg-surface relative z-10 pt-24 pb-8 md:pt-32 md:pb-12">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="flex items-center justify-center">
          <hr class="flex-1 border-t border-border mr-4" />
          <span class="text-[20px] md:text-[22px] font-semibold text-center">
            <span class="text-[#1d7ed6] font-bold">10K+</span>
            <span class="text-text ml-1">Our Trusted Partner</span>
          </span>
          <hr class="flex-1 border-t border-border ml-4" />
        </div>
      </div>
    </section>
  </body>
</html>
