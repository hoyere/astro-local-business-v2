<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom for topbar background */
    .bg-topbar {
      background-color: #06143b;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">

  <section class="topbar-section">
    <div class="bg-topbar">
      <div class="container mx-auto max-w-7xl px-4">
        <div class="flex items-center justify-between h-12">
          <!-- Left: Contact Info -->
          <div class="flex items-center space-x-6 text-sm">
            <div class="flex items-center space-x-1 text-text-inverse">
              <i class="fas fa-phone-alt text-text-inverse text-xs" data-icon="phone"></i>
              <span class="ml-1">(+468) 254 762 443</span>
            </div>
            <span class="text-text-inverse opacity-40">|</span>
            <div class="flex items-center space-x-1 text-text-inverse">
              <i class="fas fa-comments text-text-inverse text-xs" data-icon="comments"></i>
              <span class="ml-1">info@poolax.com</span>
            </div>
            <span class="text-text-inverse opacity-40">|</span>
            <div class="flex items-center space-x-1 text-text-inverse">
              <i class="far fa-clock text-text-inverse text-xs" data-icon="clock"></i>
              <span class="ml-1">Work Time: Mon – Fri 09AM – 6PM</span>
            </div>
          </div>
          <!-- Right: Social Links -->
          <div class="flex items-center space-x-2">
            <span class="text-text-inverse text-sm mr-1">Follow Us On:</span>
            <a href="#" class="text-text-inverse opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Facebook">
              <i class="fab fa-facebook-f text-text-inverse" data-icon="facebook"></i>
            </a>
            <a href="#" class="text-text-inverse opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Twitter">
              <i class="fab fa-twitter text-text-inverse" data-icon="twitter"></i>
            </a>
            <a href="#" class="text-text-inverse opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="LinkedIn">
              <i class="fab fa-linkedin-in text-text-inverse" data-icon="linkedin"></i>
            </a>
            <a href="#" class="text-text-inverse opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Skype">
              <i class="fab fa-skype text-text-inverse" data-icon="skype"></i>
            </a>
            <a href="#" class="text-text-inverse opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="YouTube">
              <i class="fab fa-youtube text-text-inverse" data-icon="youtube"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
