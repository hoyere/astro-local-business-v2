<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-surface-alt">
    <section class="blog-meta-row py-6 bg-surface-alt">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="flex justify-between">
          <!-- Blog Meta 1 (left, faded/cutoff) -->
          <div class="flex items-center space-x-4 opacity-40 pointer-events-none select-none">
            <div class="flex items-center space-x-1">
              <i class="far fa-comments text-primary" data-icon="comments"></i>
              <span class="text-text-muted text-sm">Comments (3)</span>
            </div>
          </div>
          <!-- Blog Meta 2 (center) -->
          <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-1">
              <i class="fas fa-user text-primary text-sm" data-icon="user"></i>
              <span class="text-text-muted text-sm">By Poolax</span>
            </div>
            <div class="flex items-center space-x-1">
              <i class="far fa-calendar-alt text-primary text-sm" data-icon="calendar"></i>
              <span class="text-text-muted text-sm">January 2, 2024</span>
            </div>
            <div class="flex items-center space-x-1">
              <i class="far fa-comments text-primary text-sm" data-icon="comments"></i>
              <span class="text-text-muted text-sm">Comments (3)</span>
            </div>
          </div>
          <!-- Blog Meta 3 (right) -->
          <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-1">
              <i class="fas fa-user text-primary text-sm" data-icon="user"></i>
              <span class="text-text-muted text-sm">By Poolax</span>
            </div>
            <div class="flex items-center space-x-1">
              <i class="far fa-calendar-alt text-primary text-sm" data-icon="calendar"></i>
              <span class="text-text-muted text-sm">November 5, 2023</span>
            </div>
            <div class="flex items-center space-x-1">
              <i class="far fa-comments text-primary text-sm" data-icon="comments"></i>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
