<html>
<head>
  <title>Automated Pool Cleaner | Poolax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom styles for logo shape */
    .logo-bg {
      border-bottom-right-radius: 4rem;
    }
    @media (max-width: 1024px) {
      .logo-bg {
        border-bottom-right-radius: 2rem;
      }
    }
    /* Custom overlay for hero */
    .hero-overlay {
      background: linear-gradient(120deg, rgba(0, 60, 150, 0.85) 60%, rgba(0, 60, 150, 0.6) 100%);
    }
    /* Bubble styles */
    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(255,255,255,0.35);
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5);
      pointer-events: none;
      animation: float 8s infinite ease-in-out;
    }
    .bubble1 { width: 48px; height: 48px; left: 12%; top: 68%; animation-delay: 0s;}
    .bubble2 { width: 36px; height: 36px; left: 80%; top: 38%; animation-delay: 2s;}
    .bubble3 { width: 24px; height: 24px; left: 60%; top: 80%; animation-delay: 4s;}
    .bubble4 { width: 20px; height: 20px; left: 30%; top: 60%; animation-delay: 1.5s;}
    .bubble5 { width: 16px; height: 16px; left: 70%; top: 70%; animation-delay: 3s;}
    @keyframes float {
      0% { transform: translateY(0);}
      50% { transform: translateY(-20px);}
      100% { transform: translateY(0);}
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text font-sans">

  <!-- Header/Navbar -->
  <header class="w-full bg-[#1793e8]">
    <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 h-24 relative">
      <!-- Logo -->
      <div class="flex items-center z-10">
        <div class="logo-bg bg-background px-8 py-6 flex items-center shadow-sm" style="border-bottom-right-radius: 4rem 4rem;">
          <span class="text-4xl font-bold text-text flex items-center select-none" style="font-family: 'Montserrat', sans-serif;">
            <span class="relative mr-1">
              P
              <span class="absolute left-2 top-0 flex items-center">
                <svg width="32" height="18" viewBox="0 0 32 18" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block" style="margin-top:-10px;">
                  <ellipse cx="7" cy="9" rx="7" ry="9" fill="#1793e8"/>
                  <ellipse cx="25" cy="9" rx="7" ry="9" fill="#1793e8"/>
                </svg>
                <span class="absolute left-2 top-1 w-2 h-2 bg-text rounded-full"></span>
                <span class="absolute left-10 top-1 w-2 h-2 bg-text rounded-full"></span>
              </span>
            </span>
            <span class="ml-2">oolax</span>
          </span>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 flex items-center justify-center">
        <ul class="flex space-x-8 text-on-primary text-sm font-medium">
          <li>
            <a href="#" class="flex items-center gap-1 hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              HOME <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">ABOUT US</a>
          </li>
          <li>
            <a href="#" class="flex items-center gap-1 hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              SERVICES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center gap-1 hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              PAGES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center gap-1 hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              BLOGS <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">CONTACT US</a>
          </li>
        </ul>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4">
        <button aria-label="Search" class="w-11 h-11 rounded-full bg-background flex items-center justify-center text-[#1793e8] text-xl shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button aria-label="Menu" class="w-11 h-11 rounded-full bg-background flex items-center justify-center text-[#1793e8] text-xl shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section relative min-h-[340px] md:min-h-[400px] flex items-end pb-16 md:pb-24 overflow-hidden">
    <!-- Background image -->
    <img src="https://placehold.co/1600x600/3a6e8c/ffffff?text=Pool+background+with+net+and+bubbles" alt="Pool water background with a pool net and floating bubbles" class="absolute inset-0 w-full h-full object-cover object-center z-0 pointer-events-none" />
    <!-- Overlay -->
    <div class="hero-overlay absolute inset-0 z-10"></div>
    <!-- Bubbles -->
    <span class="bubble bubble1"></span>
    <span class="bubble bubble2"></span>
    <span class="bubble bubble3"></span>
    <span class="bubble bubble4"></span>
    <span class="bubble bubble5"></span>
    <!-- Content -->
    <div class="container mx-auto max-w-6xl relative z-20 px-4">
      <h1 class="text-4xl md:text-6xl font-extrabold text-on-primary mb-6">Automated Pool Cleaner</h1>
      <!-- Breadcrumbs -->
      <nav class="flex items-center text-on-primary text-base font-normal space-x-2" aria-label="Breadcrumb">
        <span>Home</span>
        <i class="fas fa-arrow-right text-on-primary text-xs mx-1" data-icon="arrow-right"></i>
        <span>Pool Cleaner</span>
        <i class="fas fa-arrow-right text-on-primary text-xs mx-1" data-icon="arrow-right"></i>
        <span class="text-on-primary opacity-80">Automated Pool Cleaner</span>
      </nav>
    </div>
  </section>

</body>
</html>
