<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="testimonials-section py-0 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div data-collection="testimonials" class="grid grid-cols-4 gap-8">
          <article data-item="testimonial-1" class="flex justify-center">
            <img src="https://placehold.co/220x220" alt="Portrait of a person in a blue shirt, left edge, with rounded top corners" class="w-40 h-40 object-cover rounded-t-3xl rounded-b-none" />
          </article>
          <article data-item="testimonial-2" class="flex justify-center">
            <img src="https://placehold.co/220x220" alt="Portrait of a person in a dark cap, centered, with rounded top corners" class="w-40 h-40 object-cover rounded-t-3xl rounded-b-none" />
          </article>
          <article data-item="testimonial-3" class="flex justify-center">
            <img src="https://placehold.co/220x220" alt="Portrait of a person in a blue cap, centered, with rounded top corners" class="w-40 h-40 object-cover rounded-t-3xl rounded-b-none" />
          </article>
          <article data-item="testimonial-4" class="flex justify-center">
            <img src="https://placehold.co/220x220" alt="Portrait of a person in a blue shirt, right edge, with rounded top corners" class="w-40 h-40 object-cover rounded-t-3xl rounded-b-none" />
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
