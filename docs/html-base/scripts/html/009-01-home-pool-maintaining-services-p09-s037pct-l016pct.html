<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section py-0">
      <div class="container mx-auto px-0 max-w-none">
        <div class="flex flex-wrap">
          <!-- Left column (2 rows) -->
          <div class="w-1/2 flex flex-col">
            <div class="w-full">
              <img src="https://placehold.co/600x400" alt="Technician in red cap and gloves checking water quality in a hot tub" class="w-full h-[300px] object-cover object-center block">
            </div>
            <div class="w-full flex">
              <div class="w-1/2">
                <img src="https://placehold.co/300x200" alt="Pool cleaner in blue overalls cleaning a pool with a pole, lake and lounge chairs in background" class="w-full h-[200px] object-cover object-center block">
              </div>
              <div class="w-1/2">
                <img src="https://placehold.co/300x200" alt="Man in swim cap and goggles sitting on pool edge cleaning the pool with a brush" class="w-full h-[200px] object-cover object-center block">
              </div>
            </div>
          </div>
          <!-- Right column (tall image) -->
          <div class="w-1/2">
            <img src="https://placehold.co/600x600" alt="Man in blue shirt and khaki shorts cleaning a pool with a long pole, surrounded by greenery" class="w-full h-[500px] object-cover object-center block">
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
