<html>
<head>
  <title>Trust Our Pool Water Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom styles for glassmorphism and play button */
    .glass-box {
      background: rgba(0, 82, 204, 0.55);
      border: 4px solid #a3c7f7;
      border-radius: 2.5rem;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
    }
    .play-circle {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-circle .outer {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 3px solid #fff;
      border-radius: 50%;
      opacity: 0.7;
    }
    .play-circle .middle {
      position: absolute;
      width: 90px;
      height: 90px;
      border: 2px solid #fff;
      border-radius: 50%;
      opacity: 0.5;
    }
    .play-circle .inner {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-circle .fa-play {
      color: #fff;
      font-size: 2rem;
      margin-left: 6px;
    }
    /* Social icons hover */
    .social-icon:hover {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: var(--color-primary);
    }
    /* Responsive adjustments */
    @media (max-width: 900px) {
      .glass-box {
        padding: 2rem 1.5rem;
      }
      .play-circle {
        width: 90px;
        height: 90px;
      }
      .play-circle .outer {
        width: 90px;
        height: 90px;
      }
      .play-circle .middle {
        width: 65px;
        height: 65px;
      }
      .play-circle .inner {
        width: 40px;
        height: 40px;
      }
      .play-circle .fa-play {
        font-size: 1.2rem;
        margin-left: 3px;
      }
    }
    @media (max-width: 700px) {
      .glass-box {
        padding: 1.5rem 0.5rem;
      }
      .play-circle {
        width: 60px;
        height: 60px;
      }
      .play-circle .outer {
        width: 60px;
        height: 60px;
      }
      .play-circle .middle {
        width: 40px;
        height: 40px;
      }
      .play-circle .inner {
        width: 25px;
        height: 25px;
      }
      .play-circle .fa-play {
        font-size: 0.9rem;
        margin-left: 1px;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background min-h-screen overflow-x-hidden">
  <section class="hero-section relative min-h-screen flex flex-col justify-between bg-background">
    <!-- Background image and overlays -->
    <div class="absolute inset-0 w-full h-full z-0">
      <img src="https://placehold.co/1920x1080/0074d9/ffffff?text=Pool+Water+Background" alt="Close-up of clear blue pool water with gentle ripples" class="w-full h-full object-cover object-center" />
      <!-- Blue overlays for geometric shapes -->
      <div class="absolute inset-0 bg-blue-900 opacity-40" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);"></div>
      <div class="absolute inset-0 bg-blue-700 opacity-30" style="clip-path: polygon(100% 0, 100% 100%, 60% 100%, 80% 0);"></div>
    </div>
    <!-- Main content -->
    <div class="relative z-10 flex flex-col flex-1 justify-center items-center min-h-[80vh]">
      <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row items-center justify-between">
        <!-- Glassmorphism box -->
        <div class="glass-box md:w-[60%] w-full p-12 md:p-16 flex flex-col justify-center" style="box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);">
          <header>
            <div class="flex items-center mb-2">
              <span class="uppercase tracking-wide text-white text-base font-semibold">Clean Water, Clear Choice</span>
              <span class="ml-3 flex-1 border-t border-white opacity-60"></span>
            </div>
            <h1 class="text-white text-4xl md:text-6xl font-extrabold leading-tight mb-4">Trust Our Pool<br>Water Analysis</h1>
            <p class="text-white text-base md:text-lg font-normal mb-8 max-w-xl">Regular pool cleaning is recommended at least once a week to maintain water clarity and hygiene.</p>
            <button class="bg-black bg-opacity-80 text-white text-base font-semibold px-8 py-3 rounded-md shadow-md focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition hover:bg-opacity-100" type="button">
              DISCOVER MORE
            </button>
          </header>
        </div>
        <!-- Play button -->
        <div class="flex flex-col items-center justify-center md:w-[40%] w-full mt-10 md:mt-0">
          <div class="play-circle mx-auto" aria-label="Play video">
            <span class="outer"></span>
            <span class="middle"></span>
            <span class="inner flex items-center justify-center">
              <i class="fas fa-play" data-icon="play" aria-hidden="true"></i>
            </span>
          </div>
        </div>
      </div>
    </div>
    <!-- Social icons -->
    <footer class="relative z-20 flex justify-center items-center pb-8">
      <nav class="flex space-x-3">
        <a href="#" class="social-icon w-9 h-9 flex items-center justify-center rounded-md border border-white text-white text-lg transition hover:bg-primary hover:text-on-primary hover:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Facebook">
          <i class="fab fa-facebook-f" data-icon="facebook"></i>
        </a>
        <a href="#" class="social-icon w-9 h-9 flex items-center justify-center rounded-md border border-white text-white text-lg transition hover:bg-primary hover:text-on-primary hover:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="X">
          <i class="fab fa-x-twitter" data-icon="x"></i>
        </a>
        <a href="#" class="social-icon w-9 h-9 flex items-center justify-center rounded-md border border-white text-white text-lg transition hover:bg-primary hover:text-on-primary hover:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="LinkedIn">
          <i class="fab fa-linkedin-in" data-icon="linkedin"></i>
        </a>
        <a href="#" class="social-icon w-9 h-9 flex items-center justify-center rounded-md border border-white text-white text-lg transition hover:bg-primary hover:text-on-primary hover:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Instagram">
          <i class="fab fa-instagram" data-icon="instagram"></i>
        </a>
      </nav>
    </footer>
  </section>
</body>
</html>
