<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }

        background-image: url('data:image/svg+xml;utf8,<svg width="800" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 60C40 20 80 0 120 0C160 0 200 40 240 60C280 80 320 40 360 20C400 0 440 40 480 60C520 80 560 40 600 20C640 0 680 40 720 60C760 80 800 40 800 40V120H0V60Z" fill="%23eaf4f8" fill-opacity="0.7"/><path d="M0 100C40 80 80 60 120 60C160 60 200 100 240 120C280 140 320 100 360 80C400 60 440 100 480 120C520 140 560 100 600 80C640 60 680 100 720 120C760 140 800 100 800 100V120H0V100Z" fill="%23eaf4f8" fill-opacity="0.7"/></svg>');
        background-repeat: repeat-x;
        background-size: cover;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-background m-0 p-0">
    <section class="pattern-bg w-full h-[120px]"></section>
  </body>
</html>
