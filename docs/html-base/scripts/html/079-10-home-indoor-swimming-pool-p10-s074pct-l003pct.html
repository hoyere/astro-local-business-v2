<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="testimonials-section py-16 md:py-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl text-center">
        <header>
          <div class="flex flex-col items-center mb-4">
            <div class="flex items-center w-full justify-center mb-2">
              <span class="block h-0.5 w-24 bg-primary mr-4"></span>
              <span class="text-primary font-semibold text-lg" style="margin-top:2px;">Testimonials</span>
              <span class="block h-0.5 w-24 bg-primary ml-4"></span>
            </div>
          </div>
          <h2 class="text-4xl md:text-5xl font-extrabold text-text mt-2 mb-0">Our Trusted Clients Feedback</h2>
        </header>
      </div>
    </section>
  </body>
</html>
