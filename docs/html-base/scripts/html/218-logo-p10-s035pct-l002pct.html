<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="gallery-header-section py-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl text-center">
        <div class="flex justify-center items-center mb-4">
          <span class="inline-block text-primary text-lg font-medium relative">
            <span class="inline-block align-middle mr-2">
              <svg width="16" height="16" viewBox="0 0 16 16" class="inline-block" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path d="M8 2L4 8L8 14" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            Our Gallery
            <span class="inline-block align-middle ml-2">
              <svg width="16" height="16" viewBox="0 0 16 16" class="inline-block" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path d="M8 2L12 8L8 14" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </span>
        </div>
        <h1 class="text-[2.75rem] md:text-5xl font-extrabold text-[#0a1633] leading-tight">Latest Projects Gallery</h1>
      </div>
    </section>
  </body>
</html>
