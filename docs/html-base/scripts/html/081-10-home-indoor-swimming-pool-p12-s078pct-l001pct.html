<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom background lines for the effect */
      .bg-lines {
        position: absolute;
        inset: 0;
        width: 100vw;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      .bg-lines svg {
        width: 100vw;
        height: 100%;
        display: block;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen overflow-x-hidden relative">
    <section class="bg-lines pointer-events-none absolute inset-0 w-full h-12" aria-hidden="true">
      <svg viewBox="0 0 1920 60" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
        <path d="M0 40 Q320 0 640 40 T1280 40 T1920 40" stroke="#dcebe4" stroke-width="2" fill="none" opacity="0.15"/>
        <path d="M0 50 Q320 10 640 50 T1280 50 T1920 50" stroke="#dcebe4" stroke-width="1" fill="none" opacity="0.10"/>
        <path d="M0 30 Q320 20 640 30 T1280 30 T1920 30" stroke="#dcebe4" stroke-width="1" fill="none" opacity="0.08"/>
      </svg>
    </section>
  </body>
</html>
