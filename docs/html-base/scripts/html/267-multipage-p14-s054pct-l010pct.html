<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <section class="hero-section py-16 md:py-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl flex flex-col lg:flex-row items-center gap-12">
        <!-- Left: Text and FAQ -->
        <div class="flex-1 w-full">
          <div class="mb-4">
            <span class="text-primary font-semibold text-base inline-block mb-2">More About Us Our Company</span>
            <span class="block w-16 h-1 bg-primary rounded-full mt-1"></span>
          </div>
          <h1 class="text-4xl md:text-5xl font-extrabold leading-tight mb-8 mt-2 text-text" style="font-family: 'Montserrat', sans-serif;">
            Quality Service, Crystal<br>Clear Results
          </h1>
          <!-- FAQ Accordion -->
          <div class="space-y-4 mt-2">
            <div class="bg-surface rounded-xl shadow-sm border border-border">
              <button class="w-full flex items-center justify-between px-6 py-5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-expanded="true">
                <span class="text-lg font-semibold text-text text-left">What Services Do You Offer?</span>
                <i class="fas fa-eye-slash text-text-muted text-xl" data-icon="eye-slash"></i>
              </button>
              <div class="px-6 pb-5 pt-0">
                <p class="text-text-muted text-base leading-relaxed">
                  We specialize in providing top-notch pool service and maintenance to ensure your pool remains a safe, clean, and inviting space for relaxation and recreation.
                </p>
              </div>
            </div>
            <div class="bg-surface rounded-xl shadow-sm border border-border">
              <button class="w-full flex items-center justify-between px-6 py-5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-expanded="false">
                <span class="text-lg font-semibold text-text text-left">Do You Have Certified Technicians?</span>
                <i class="fas fa-eye-slash text-text-muted text-xl" data-icon="eye-slash"></i>
              </button>
            </div>
            <div class="bg-surface rounded-xl shadow-sm border border-border">
              <button class="w-full flex items-center justify-between px-6 py-5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-expanded="false">
                <span class="text-lg font-semibold text-text text-left">Can You Provide a Customized Service Plan?</span>
                <i class="fas fa-eye-slash text-text-muted text-xl" data-icon="eye-slash"></i>
              </button>
            </div>
            <div class="bg-surface rounded-xl shadow-sm border border-border">
              <button class="w-full flex items-center justify-between px-6 py-5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-expanded="false">
                <span class="text-lg font-semibold text-text text-left">What is Your Pricing Structure?</span>
                <i class="fas fa-eye-slash text-text-muted text-xl" data-icon="eye-slash"></i>
              </button>
            </div>
          </div>
        </div>
        <!-- Right: Image and Experience Badge -->
        <div class="flex-1 w-full flex justify-center relative">
          <div class="relative flex items-center justify-center">
            <!-- Decorative blue circle lines -->
            <svg class="absolute -top-8 -left-8 w-[120%] h-[120%] pointer-events-none select-none" viewBox="0 0 400 400" fill="none">
              <circle cx="200" cy="200" r="190" stroke="#0090FF" stroke-width="4" stroke-dasharray="120 60 80 100" />
            </svg>
            <!-- Main image -->
            <img src="https://placehold.co/400x400" alt="Pool technician kneeling by a pool, testing water with a test kit, surrounded by lush greenery" class="rounded-full object-cover w-80 h-80 md:w-[22rem] md:h-[22rem] border-4 border-white shadow-lg z-10">
            <!-- Experience badge -->
            <div class="absolute bottom-4 right-0 md:bottom-8 md:right-4 bg-[#0090FF] text-white rounded-full flex flex-col items-center justify-center w-40 h-40 shadow-lg z-20">
              <span class="text-5xl font-extrabold leading-none mb-2">25+</span>
              <span class="text-lg font-medium text-center leading-tight">Years Experience In<br>Pool Service.</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
