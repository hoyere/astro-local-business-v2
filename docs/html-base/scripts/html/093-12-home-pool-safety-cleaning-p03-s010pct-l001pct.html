<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom shape for the top wave */
      .custom-top-wave {
        position: relative;
        width: 100vw;
        height: 40px;
        overflow: hidden;
        background: transparent;
      }
      .custom-top-wave svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="hero-section p-0 m-0">
      <div class="custom-top-wave">
        <svg viewBox="0 0 1280 40" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M0,0 Q640,60 1280,0 L1280,40 L0,40 Z" fill="#23304a"/>
          <path d="M0,0 Q640,50 1280,0" stroke="#fff" stroke-width="3" fill="none"/>
        </svg>
      </div>
    </section>
  </body>
</html>
