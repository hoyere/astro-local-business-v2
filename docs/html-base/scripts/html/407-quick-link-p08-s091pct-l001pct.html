<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <title>Office Workspace Illustration Banner</title>
  </head>
  <body class="bg-background">
    <section class="hero-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-full">
        <img 
          src="https://placehold.co/2400x250?text=Office+workspace+illustration+banner+with+diverse+people+collaborating%2C+coding%2C+presenting%2C+and+working+in+modern+open+space+with+plants%2C+computers%2C+and+creative+tools"
          alt="Office workspace illustration banner with diverse people collaborating, coding, presenting, and working in modern open space with plants, computers, and creative tools"
          class="w-full h-[250px] object-cover object-center rounded-none border-0 shadow-none"
          draggable="false"
        >
      </div>
    </section>
  </body>
</html>
