<html>
<head>
  <title>Drain & Clean - Poolax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom styles for logo shape */
    .logo-bg {
      border-bottom-right-radius: 64px;
      border-bottom-left-radius: 0;
      border-top-right-radius: 64px;
      border-top-left-radius: 0;
    }
    @media (max-width: 1023px) {
      .logo-bg {
        border-bottom-right-radius: 40px;
        border-top-right-radius: 40px;
      }
    }
    /* Hide scroll on body for clean screenshot look */
    body {
      overflow-x: hidden;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text font-sans">

  <!-- Header/Navbar -->
  <header class="w-full bg-[#1796f7]">
    <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 lg:px-0 py-0 h-24 relative">
      <!-- Logo -->
      <div class="absolute left-0 top-0 h-28 flex items-center z-20">
        <div class="logo-bg bg-background shadow-none px-8 py-4 flex items-center" style="height:112px; min-width:290px;">
          <a href="#" class="flex items-center space-x-2">
            <!-- Custom Poolax Logo -->
            <span class="text-[44px] font-bold text-[#0f1c18] leading-none tracking-tight relative" style="font-family: 'Montserrat', sans-serif;">
              <span class="relative">
                P
                <!-- Pool icon for 'oo' -->
                <span class="inline-block align-middle relative -mx-1">
                  <span class="relative">
                    <span class="inline-block relative">
                      <svg width="38" height="32" viewBox="0 0 38 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle" style="vertical-align:middle;">
                        <ellipse cx="10" cy="16" rx="10" ry="12" fill="#1796f7"/>
                        <ellipse cx="28" cy="16" rx="10" ry="12" fill="#1796f7"/>
                        <ellipse cx="10" cy="16" rx="7" ry="8" fill="#fff" fill-opacity="0.7"/>
                        <ellipse cx="28" cy="16" rx="7" ry="8" fill="#fff" fill-opacity="0.7"/>
                        <ellipse cx="10" cy="16" rx="5" ry="6" fill="#1796f7" fill-opacity="0.7"/>
                        <ellipse cx="28" cy="16" rx="5" ry="6" fill="#1796f7" fill-opacity="0.7"/>
                        <!-- Pool ladder -->
                        <rect x="8" y="4" width="2" height="12" rx="1" fill="#0f1c18"/>
                        <rect x="26" y="4" width="2" height="12" rx="1" fill="#0f1c18"/>
                        <rect x="8" y="8" width="20" height="2" rx="1" fill="#0f1c18"/>
                        <rect x="8" y="12" width="20" height="2" rx="1" fill="#0f1c18"/>
                      </svg>
                    </span>
                  </span>
                </span>
                lax
              </span>
            </span>
          </a>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 flex justify-center items-center">
        <ul class="flex space-x-8 ml-[320px]">
          <li>
            <a href="#" class="text-white text-sm font-medium hover:underline flex items-center gap-1">
              HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white text-sm font-medium hover:underline">ABOUT US</a>
          </li>
          <li>
            <a href="#" class="text-white text-sm font-medium hover:underline flex items-center gap-1">
              SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white text-sm font-medium hover:underline flex items-center gap-1">
              PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white text-sm font-medium hover:underline flex items-center gap-1">
              BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white text-sm font-medium hover:underline">CONTACT US</a>
          </li>
        </ul>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4 ml-4">
        <button class="w-12 h-12 flex items-center justify-center rounded-full bg-white bg-opacity-100 text-[#0f1c18] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button class="w-12 h-12 flex items-center justify-center rounded-full bg-white bg-opacity-100 text-[#0f1c18] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section relative bg-[#155e8c] min-h-[340px] flex items-end pb-16" style="background: linear-gradient(120deg, #155e8c 60%, #1796f7 100%);">
    <!-- Background image with bubbles and pool net -->
    <img src="https://placehold.co/1600x600/155e8c/ffffff?text=Pool+background+with+bubbles+and+pool+net" alt="Pool water background with bubbles and a pool net" class="absolute inset-0 w-full h-full object-cover opacity-60 pointer-events-none select-none" style="z-index:1;">
    <!-- Overlay for blue geometric shapes -->
    <div class="absolute inset-0 z-10 pointer-events-none select-none">
      <svg width="100%" height="100%" viewBox="0 0 1600 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
        <polygon points="0,0 900,0 400,400 0,400" fill="#1796f7" fill-opacity="0.18"/>
        <polygon points="1600,0 1600,400 1200,400 900,0" fill="#1796f7" fill-opacity="0.12"/>
      </svg>
    </div>
    <!-- Bubbles (floating) -->
    <div class="absolute left-32 top-40 z-20">
      <span class="block w-10 h-10 rounded-full bg-white bg-opacity-40 blur-sm"></span>
    </div>
    <div class="absolute left-80 top-80 z-20">
      <span class="block w-6 h-6 rounded-full bg-white bg-opacity-40 blur-sm"></span>
    </div>
    <div class="absolute right-40 top-44 z-20">
      <span class="block w-12 h-12 rounded-full bg-white bg-opacity-40 blur-sm"></span>
    </div>
    <div class="absolute right-24 bottom-24 z-20">
      <span class="block w-8 h-8 rounded-full bg-white bg-opacity-40 blur-sm"></span>
    </div>
    <!-- Hero Content -->
    <div class="container mx-auto max-w-7xl relative z-30 px-4">
      <h1 class="text-5xl md:text-6xl font-bold text-white mb-6 mt-24">Drain &amp; Clean</h1>
      <nav class="flex items-center space-x-2 text-white text-lg font-medium" aria-label="Breadcrumb">
        <span class="text-white text-base font-normal">Home</span>
        <span class="mx-1 text-white text-base"><i class="fas fa-arrow-right text-white text-xs" data-icon="arrow-right"></i></span>
        <span class="text-white text-base font-normal">Drain &amp; Clean</span>
      </nav>
    </div>
  </section>

</body>
</html>
