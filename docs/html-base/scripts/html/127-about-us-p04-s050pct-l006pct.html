<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .bg-dark {
        background-color: #13161e;
      }
      .bg-wave {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-dark min-h-screen relative overflow-hidden">
    <section class="stats-section py-24 bg-dark relative">
      <!-- SVG Wave Background -->
      <div class="bg-wave">
        <svg width="100%" height="100%" viewBox="0 0 1440 320" fill="none" xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 w-full h-full">

          <path opacity="0.08" d="M0,160L80,154.7C160,149,320,139,480,154.7C640,171,800,213,960,197.3C1120,181,1280,107,1360,69.3L1440,32L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z" fill="#fff"/>
        </svg>
      </div>
      <div class="container mx-auto px-4 max-w-6xl relative z-10">
        <div data-collection="stats" class="grid grid-cols-4 gap-16">
          <div data-item="stat-1" class="flex items-center justify-center">
            <span class="text-6xl font-bold text-white">2 564</span>
          </div>
          <div data-item="stat-2" class="flex items-center justify-center">
            <span class="text-6xl font-bold text-white">164</span>
          </div>
          <div data-item="stat-3" class="flex items-center justify-center">
            <span class="text-6xl font-bold text-white">2 985</span>
          </div>
          <div data-item="stat-4" class="flex items-center justify-center">
            <span class="text-6xl font-bold text-white">85</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
