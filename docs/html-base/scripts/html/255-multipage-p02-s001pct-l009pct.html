<html>
<head>
  <title>Poolax - Making Waves in Pool Excellence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #f3f7fa;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom shape for hero diagonal */
    @media (min-width: 1024px) {
      .hero-diagonal {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 40% 100%);
      }
      .hero-image-diagonal {
        clip-path: polygon(40% 0, 100% 0, 100% 100%, 0 100%);
      }
    }
    @media (max-width: 1023px) {
      .hero-diagonal, .hero-image-diagonal {
        clip-path: none !important;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text font-sans">

  <!-- HEADER / NAVIGATION -->
  <header class="w-full bg-primary relative z-20">
    <div class="flex items-center justify-between px-8 lg:px-20 py-4">
      <!-- Logo -->
      <div class="flex items-center">
        <div class="relative z-30">
          <div class="flex items-center">
            <span class="block bg-background rounded-bl-[80px] rounded-br-[40px] rounded-tl-[0px] rounded-tr-[80px] -ml-8 -mt-8 w-[300px] h-[110px] absolute left-[-60px] top-[-40px]"></span>
            <span class="relative z-10 flex items-center pl-8">
              <span class="text-[48px] font-bold text-text tracking-tight leading-none" style="font-family: 'Montserrat', sans-serif;">
                P
                <span class="relative">
                  <span class="inline-block align-middle text-[32px] text-primary" style="margin-left:-6px;margin-right:-6px;">
                    <svg width="38" height="28" viewBox="0 0 38 28" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle" style="vertical-align:middle;">
                      <ellipse cx="9" cy="14" rx="9" ry="14" fill="#02a26a"/>
                      <ellipse cx="29" cy="14" rx="9" ry="14" fill="#3ad69e"/>
                    </svg>
                  </span>
                  <span class="absolute left-0 top-2 w-full flex justify-between px-1">
                    <span class="w-2 h-2 bg-primary rounded-full"></span>
                    <span class="w-2 h-2 bg-primary rounded-full"></span>
                  </span>
                </span>
                olax
              </span>
            </span>
          </div>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="hidden lg:flex items-center space-x-8 ml-8">
        <a href="#" class="text-on-primary text-base font-medium hover:underline flex items-center gap-1">HOME <i class="fas fa-plus text-xs" data-icon="plus"></i></a>
        <a href="#" class="text-on-primary text-base font-medium hover:underline">ABOUT US</a>
        <a href="#" class="text-on-primary text-base font-medium hover:underline flex items-center gap-1">SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i></a>
        <a href="#" class="text-on-primary text-base font-medium hover:underline flex items-center gap-1">PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i></a>
        <a href="#" class="text-on-primary text-base font-medium hover:underline flex items-center gap-1">BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i></a>
        <a href="#" class="text-on-primary text-base font-medium hover:underline">CONTACT US</a>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4 ml-4">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-background text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-background text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 lg:hidden" aria-label="Open menu">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero-section relative bg-background pt-0 pb-0 min-h-[700px] flex items-stretch overflow-hidden">
    <div class="w-full flex flex-col lg:flex-row items-stretch relative z-10">
      <!-- Left: Text Content -->
      <div class="w-full lg:w-1/2 flex flex-col justify-center px-6 md:px-16 lg:pl-24 lg:pr-0 py-16 lg:py-0 hero-diagonal bg-background relative z-20">
        <div class="max-w-xl">
          <span class="block text-primary-light text-lg font-semibold tracking-wide mb-2 uppercase" style="letter-spacing:0.04em;">
            POOL DECK RESURFACING
            <span class="inline-block align-middle ml-2 w-12 h-1 bg-primary-light rounded"></span>
          </span>
          <h1 class="text-[2.7rem] md:text-5xl lg:text-6xl font-extrabold text-text leading-tight mb-4" style="font-family: 'Montserrat', sans-serif;">
            Making Waves in<br>Pool Excellence
          </h1>
          <p class="text-text-muted text-base md:text-lg mb-8">
            Regular pool cleaning is recommended at least once a week to maintain water clarity and hygiene.
          </p>
          <div class="flex flex-col sm:flex-row gap-4">
            <a href="#" class="inline-block px-8 py-4 rounded-lg bg-primary text-on-primary font-semibold text-base shadow-sm hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
              DISCOVER MORE
            </a>
            <a href="#" class="inline-block px-8 py-4 rounded-lg border border-border bg-background text-text font-semibold text-base hover:bg-surface-alt focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
              CONTACT US
            </a>
          </div>
        </div>
      </div>
      <!-- Right: Hero Image -->
      <div class="hidden lg:block w-1/2 relative hero-image-diagonal z-10">
        <img src="https://placehold.co/800x900" alt="Smiling pool cleaner in blue shirt cleaning a luxury pool with a long pole, wooden benches and villa in background" class="w-full h-full object-cover object-center min-h-[700px]">
        <!-- Overlay for blue diagonal shape -->
        <div class="absolute inset-0 pointer-events-none" style="clip-path: polygon(0 0, 100% 0, 100% 100%, 40% 100%);">
          <div class="absolute inset-0 bg-[#0d8af7] opacity-90" style="mix-blend-mode: multiply;"></div>
          <div class="absolute inset-0 bg-gradient-to-br from-[#0d8af7] via-[#0d8af7]/80 to-transparent opacity-80"></div>
        </div>
      </div>
    </div>
    <!-- Diagonal blue overlay for desktop -->
    <div class="hidden lg:block absolute top-0 right-0 w-3/5 h-full z-0 pointer-events-none" style="clip-path: polygon(40% 0, 100% 0, 100% 100%, 0 100%);">
      <div class="w-full h-full bg-[#0d8af7]"></div>
      <div class="absolute inset-0 bg-gradient-to-br from-[#0d8af7] via-[#0d8af7]/80 to-transparent"></div>
    </div>
  </section>
</body>
</html>
