<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom background pattern for the blue area */
    .bg-pattern {
      background-color: #189eff;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath opacity='0.08' d='M20 0L20.7071 0.707107L20 1.41421L19.2929 0.707107L20 0ZM20 40L19.2929 39.2929L20 38.5858L20.7071 39.2929L20 40ZM0.707107 19.2929L20.7071 39.2929L19.2929 40.7071L-0.707107 20.7071L0.707107 19.2929ZM19.2929 1.41421L39.2929 21.4142L38.5858 22.1213L18.5858 2.12132L19.2929 1.41421ZM20.7071 1.41421L40.7071 21.4142L39.2929 22.8284L19.2929 2.82843L20.7071 1.41421ZM1.41421 20.7071L21.4142 40.7071L20.7071 41.4142L0.707107 21.4142L1.41421 20.7071ZM20 1.41421L20 38.5858L19 38.5858L19 1.41421L20 1.41421Z' fill='white'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }
    @media (max-width: 1023px) {
      .custom-cta-flex {
        flex-direction: column !important;
        border-radius: 0 !important;
      }
      .custom-cta-left, .custom-cta-right {
        width: 100% !important;
        border-radius: 0 !important;
      }
      .custom-cta-center {
        margin: 2rem 0 !important;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">
  <section class="cta-section py-0">
    <div class="container mx-auto px-4 max-w-6xl">
      <div class="flex custom-cta-flex flex-row items-stretch rounded-3xl overflow-hidden min-h-[220px]">
        <!-- Left: Blue background with text -->
        <div class="custom-cta-left bg-pattern flex-1 flex flex-col justify-center pl-12 pr-8 py-12 lg:py-0">
          <h2 class="text-on-primary text-2xl md:text-3xl font-semibold mb-4">Do You need help with Cleaning?</h2>
          <p class="text-on-primary text-lg font-medium">Call Us +(088) 456 888 (24/7)</p>
        </div>
        <!-- Center: Circle with phone icon -->
        <div class="custom-cta-center flex items-center justify-center -mx-8">
          <div class="bg-surface w-20 h-20 rounded-full flex items-center justify-center shadow-lg relative z-10 mt-8 lg:mt-0">
            <i class="fas fa-phone-alt text-primary text-3xl" data-icon="phone"></i>
          </div>
        </div>
        <!-- Right: Image -->
        <div class="custom-cta-right flex-1 relative min-w-[260px] max-w-[420px]">
          <img src="https://placehold.co/800x600" alt="A professional cleaner in uniform using a pool vacuum machine in a modern indoor facility" class="w-full h-full object-cover object-center" style="min-height:220px;">
          <div class="absolute inset-0 bg-black/20 rounded-tr-3xl rounded-br-3xl"></div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
