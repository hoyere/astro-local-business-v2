<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="hero-section relative h-[60px] bg-gradient-to-r from-[#f3f3ef] via-[#f3f3ef] to-[#e9eef1] overflow-hidden">
      <div class="container mx-auto px-4 max-w-6xl h-full flex items-start">
        <h1 class="mt-2 text-[44px] font-bold text-[#0a1534] leading-none tracking-tight">De</h1>
      </div>
      <span class="absolute top-0 right-0 translate-x-1/2 -translate-y-1/2 w-[48px] h-[48px] bg-[#0a1534] rounded-full"></span>
    </section>
  </body>
</html>
