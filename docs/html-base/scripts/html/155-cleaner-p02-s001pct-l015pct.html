<html>
<head>
  <title>Water Analysis - Poolax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom font for logo */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
    .logo-font {
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      letter-spacing: -1px;
    }
    /* Custom logo icon styling */
    .poolax-logo-icon {
      position: relative;
      top: 2px;
      margin: 0 2px;
      font-size: 1.3em;
      color: #02a26a;
      text-shadow: 0 2px 0 #3ad69e;
    }
    /* Bubble effect for hero */
    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(255,255,255,0.25);
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
      pointer-events: none;
      animation: bubbleFloat 8s infinite linear;
    }
    @keyframes bubbleFloat {
      0% { transform: translateY(0) scale(1);}
      100% { transform: translateY(-120px) scale(1.1);}
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text">

  <!-- Header/Navbar -->
  <header class="w-full bg-[#1795f0]">
    <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24">
      <!-- Logo -->
      <div class="flex items-center">
        <div class="bg-background rounded-bl-[80px] rounded-br-[48px] rounded-tl-none rounded-tr-[80px] shadow-none px-8 py-4 flex items-center" style="min-width:260px; min-height:96px;">
          <span class="logo-font text-4xl text-[#0f1c18] flex items-center select-none">
            P
            <span class="relative flex items-center">
              <span class="poolax-logo-icon">
                <i class="fas fa-swimming-pool" data-icon="swimming-pool"></i>
              </span>
              <span class="absolute left-0 top-0 w-full h-full flex items-center justify-center" style="pointer-events:none;">
                <span class="w-2 h-2 bg-[#1795f0] rounded-full absolute left-0 top-1"></span>
                <span class="w-2 h-2 bg-[#1795f0] rounded-full absolute right-0 top-1"></span>
              </span>
            </span>
            olax
          </span>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 flex items-center justify-center">
        <ul class="flex space-x-8 text-base font-medium text-on-primary">
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              HOME <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              ABOUT US
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              SERVICES <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              PAGES <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              BLOGS <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              CONTACT US
            </a>
          </li>
        </ul>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4">
        <button aria-label="Search" class="w-12 h-12 rounded-full bg-background flex items-center justify-center text-[#1795f0] text-xl shadow-none hover:bg-surface focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button aria-label="Menu" class="w-12 h-12 rounded-full bg-background flex items-center justify-center text-[#1795f0] text-xl shadow-none hover:bg-surface focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section relative bg-[#156bbd] overflow-hidden" style="background: linear-gradient(120deg, #156bbd 60%, #1795f0 100%);">
    <div class="absolute inset-0 z-0">
      <!-- Simulated pool background with overlay -->
      <img src="https://placehold.co/1600x600/156bbd/ffffff?text=Pool+Background" alt="Background image of a swimming pool with water and pool net" class="w-full h-full object-cover opacity-60" />
      <!-- Diagonal overlay -->
      <div class="absolute inset-0 bg-gradient-to-tr from-[#156bbd]/90 via-[#1795f0]/70 to-[#1795f0]/40" style="mix-blend-mode: multiply;"></div>
      <!-- Bubbles -->
      <span class="bubble" style="left:12%; bottom:60px; width:38px; height:38px; animation-delay:0s;"></span>
      <span class="bubble" style="left:22%; bottom:30px; width:22px; height:22px; animation-delay:1.2s;"></span>
      <span class="bubble" style="left:40%; bottom:80px; width:18px; height:18px; animation-delay:2.1s;"></span>
      <span class="bubble" style="left:68%; bottom:40px; width:44px; height:44px; animation-delay:0.7s;"></span>
      <span class="bubble" style="left:80%; bottom:90px; width:32px; height:32px; animation-delay:1.7s;"></span>
      <span class="bubble" style="left:90%; bottom:20px; width:28px; height:28px; animation-delay:2.7s;"></span>
    </div>
    <div class="relative z-10 container mx-auto px-4 max-w-6xl py-24 md:py-32">
      <nav class="mb-6 flex items-center space-x-2 text-lg text-on-primary">
        <span class="text-on-primary opacity-90">Home</span>
        <i class="fas fa-arrow-right text-on-primary text-xs mx-1" data-icon="arrow-right"></i>
        <span class="text-on-primary opacity-90">Water Analysis</span>
      </nav>
      <h1 class="text-5xl md:text-6xl font-bold text-on-primary mb-4">Water Analysis</h1>
    </div>
  </section>

</body>
</html>
