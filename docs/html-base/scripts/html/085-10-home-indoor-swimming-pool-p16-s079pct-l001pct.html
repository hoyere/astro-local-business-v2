<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="testimonials-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-full">
        <div data-collection="testimonials" class="flex flex-row items-start justify-between gap-0 w-full">
          <!-- Testimonial 1 -->
          <article data-item="testimonial-1" class="flex flex-col items-center w-1/4">
            <span class="block text-[32px] font-extrabold leading-none text-text -mb-2 ml-2 tracking-tight">Michel</span>
          </article>
          <!-- Testimonial 2 -->
          <article data-item="testimonial-2" class="flex flex-col items-center w-1/4">
            <img src="https://placehold.co/48x48" alt="Portrait of Dionne Russell" class="rounded-full w-12 h-12 mb-1">
            <span class="block text-[32px] font-extrabold leading-none text-text ml-2 tracking-tight">Dionne Russell</span>
          </article>
          <!-- Testimonial 3 -->
          <article data-item="testimonial-3" class="flex flex-col items-center w-1/4">
            <img src="https://placehold.co/48x48" alt="Portrait of Woge Warren" class="rounded-full w-12 h-12 mb-1">
            <span class="block text-[32px] font-extrabold leading-none text-text ml-2 tracking-tight">Woge Warren</span>
          </article>
          <!-- Testimonial 4 -->
          <article data-item="testimonial-4" class="flex flex-col items-center w-1/4">
            <img src="https://placehold.co/48x48" alt="Portrait of Alex M" class="rounded-full w-12 h-12 mb-1">
            <span class="block text-[32px] font-extrabold leading-none text-text ml-2 tracking-tight">Alex M</span>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
