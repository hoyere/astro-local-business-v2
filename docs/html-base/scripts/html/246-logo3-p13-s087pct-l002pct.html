<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">
  <section class="pool-services-gallery py-0 bg-background">
    <div class="container mx-auto px-0 max-w-6xl">
      <div class="flex justify-center gap-6 md:gap-8 py-4">
        <div class="flex-1 max-w-[33.333%]">
          <div class="rounded-3xl overflow-hidden bg-surface shadow-none">
            <img src="https://placehold.co/800x600?text=Pool+brush+cleaning+tile+surface" alt="Close-up of a pool brush cleaning the tile surface of a swimming pool" class="w-full h-[220px] object-cover object-center">
          </div>
        </div>
        <div class="flex-1 max-w-[33.333%]">
          <div class="rounded-3xl overflow-hidden bg-surface shadow-none">
            <img src="https://placehold.co/800x600?text=Pool+vacuum+hose+in+water" alt="Swimming pool vacuum hose connected and submerged in pool water" class="w-full h-[220px] object-cover object-center">
          </div>
        </div>
        <div class="flex-1 max-w-[33.333%]">
          <div class="rounded-3xl overflow-hidden bg-surface shadow-none">
            <img src="https://placehold.co/800x600?text=Hand+testing+pool+water+with+strip" alt="Hand holding a test strip above pool water to check chemical levels" class="w-full h-[220px] object-cover object-center">
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
