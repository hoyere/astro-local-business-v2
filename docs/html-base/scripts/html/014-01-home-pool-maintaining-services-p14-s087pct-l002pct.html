<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="pool-steps-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-6xl">
        <div data-collection="pool-steps" class="flex flex-row gap-6 justify-center items-stretch">
          <article data-item="step-1" class="flex-1 bg-surface rounded-[2rem] overflow-hidden shadow-none p-0 flex items-stretch">
            <img src="https://placehold.co/400x300" alt="Filling a swimming pool with a hose" class="w-full h-full object-cover aspect-[4/3]" />
          </article>
          <article data-item="step-2" class="flex-1 bg-surface rounded-[2rem] overflow-hidden shadow-none p-0 flex items-stretch">
            <img src="https://placehold.co/400x300" alt="Hand holding a test strip over pool water" class="w-full h-full object-cover aspect-[4/3]" />
          </article>
          <article data-item="step-3" class="flex-1 bg-surface rounded-[2rem] overflow-hidden shadow-none p-0 flex items-stretch">
            <img src="https://placehold.co/400x300" alt="Person assembling a pool skimmer in a blue above-ground pool" class="w-full h-full object-cover aspect-[4/3]" />
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
