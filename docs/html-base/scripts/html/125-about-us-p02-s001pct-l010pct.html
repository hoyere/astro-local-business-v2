<html>
  <head>
    <title>Poolax - About</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom logo font and style */
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
      .logo-font {
        font-family: 'Montserrat', Arial, sans-serif;
        font-weight: 700;
        letter-spacing: -1px;
      }
      .bubble {
        position: absolute;
        border-radius: 9999px;
        background: rgba(255,255,255,0.35);
        box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
        pointer-events: none;
        animation: float 8s infinite ease-in-out;
      }
      @keyframes float {
        0% { transform: translateY(0) scale(1);}
        50% { transform: translateY(-30px) scale(1.1);}
        100% { transform: translateY(0) scale(1);}
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1796f7]">
      <nav class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24 relative z-20">
        <!-- Logo -->
        <div class="flex items-center">
          <div class="bg-background rounded-br-[80px] rounded-bl-[40px] rounded-tl-none rounded-tr-none shadow-none px-0 py-0 h-[100px] -ml-4 flex items-center" style="width:290px;">
            <a href="#" class="flex items-center pl-8 pt-2 pb-2">
              <span class="logo-font text-[48px] text-[#0f1c18] relative leading-none select-none">
                P
                <span class="inline-block relative -mx-1">
                  <!-- Pool icon: two circles and a wave -->
                  <span class="absolute left-0 top-1.5 flex space-x-1">
                    <span class="inline-block w-3 h-3 bg-[#1796f7] rounded-full border-2 border-[#0f1c18]"></span>
                    <span class="inline-block w-3 h-3 bg-[#1796f7] rounded-full border-2 border-[#0f1c18]"></span>
                  </span>
                  <span class="inline-block text-[#1796f7] font-bold text-[32px] leading-none" style="margin-left: 0.2em; margin-right: 0.2em; margin-top: 0.2em;">oo</span>
                </span>
                lax
              </span>
            </a>
          </div>
        </div>
        <!-- Nav Links -->
        <ul class="hidden lg:flex items-center space-x-8 text-[15px] font-medium">
          <li>
            <a href="#" class="text-on-primary hover:text-accent transition-colors flex items-center gap-1">
              HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-on-primary hover:text-accent transition-colors flex items-center gap-1">
              ABOUT US
            </a>
          </li>
          <li>
            <a href="#" class="text-on-primary hover:text-accent transition-colors flex items-center gap-1">
              SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-on-primary hover:text-accent transition-colors flex items-center gap-1">
              PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-on-primary hover:text-accent transition-colors flex items-center gap-1">
              BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-on-primary hover:text-accent transition-colors flex items-center gap-1">
              CONTACT US
            </a>
          </li>
        </ul>
        <!-- Right icons -->
        <div class="flex items-center space-x-4">
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-background text-[#0f1c18] hover:bg-primary-light focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search text-xl" data-icon="search"></i>
          </button>
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-background text-[#0f1c18] hover:bg-primary-light focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars text-xl" data-icon="bars"></i>
          </button>
        </div>
      </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-[#174e7c] min-h-[320px] flex items-end pb-16" style="background: linear-gradient(120deg, #174e7c 60%, #1e6a9c 100%);">
      <!-- Decorative overlay shapes -->
      <div class="absolute inset-0 z-0">
        <svg width="100%" height="100%" viewBox="0 0 1600 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full absolute inset-0">
          <polygon points="0,0 900,0 1600,400 0,400" fill="#1e6a9c" fill-opacity="0.45"/>
          <polygon points="0,0 600,0 1200,400 0,400" fill="#174e7c" fill-opacity="0.35"/>
        </svg>
        <!-- Pool edge image (right) -->
        <img src="https://placehold.co/400x300/1e6a9c/ffffff?text=Pool+Edge" alt="Swimming pool edge on the right" class="absolute right-0 bottom-0 w-[340px] h-[220px] object-cover rounded-tl-3xl opacity-80 pointer-events-none select-none" draggable="false" />
        <!-- Bubbles -->
        <span class="bubble" style="left:22%; top:62%; width:38px; height:38px; animation-delay:0s;"></span>
        <span class="bubble" style="left:31%; top:78%; width:22px; height:22px; animation-delay:1.2s;"></span>
        <span class="bubble" style="left:65%; top:54%; width:44px; height:44px; animation-delay:0.7s;"></span>
        <span class="bubble" style="left:74%; top:38%; width:36px; height:36px; animation-delay:2.1s;"></span>
        <span class="bubble" style="left:85%; top:60%; width:32px; height:32px; animation-delay:1.7s;"></span>
        <span class="bubble" style="left:91%; top:72%; width:28px; height:28px; animation-delay:2.7s;"></span>
      </div>
      <div class="container mx-auto px-4 max-w-7xl relative z-10">
        <div class="pt-24">
          <h1 class="text-[56px] font-bold text-on-primary logo-font mb-4">About</h1>
          <nav class="flex items-center space-x-2 text-lg text-on-primary" aria-label="Breadcrumb">
            <a href="#" class="hover:underline text-on-primary">Home</a>
            <span class="flex items-center text-on-primary">
              <i class="fas fa-arrow-right text-base mx-2" data-icon="arrow-right"></i>
            </span>
            <span class="text-on-primary">About</span>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
