<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="services-section py-0 bg-background">
      <div class="container mx-auto px-0 max-w-7xl">
        <div data-collection="service-cards" class="grid grid-cols-4 gap-0">
          <!-- Card 1 -->
          <article data-item="service-1" class="relative flex flex-col items-center justify-end bg-surface border border-border min-h-[260px] h-[260px]">

              <svg width="120" height="120" viewBox="0 0 120 120" fill="none" class="absolute bottom-0 right-0" style="z-index:0;">
                <circle cx="90" cy="40" r="30" fill="#EAF3FA" />
                <circle cx="110" cy="60" r="8" fill="#D1E3F6" />
                <ellipse cx="30" cy="110" rx="20" ry="10" fill="#E3F6F1" />
              </svg>
            </div>
            <div class="z-10 pb-8 w-full flex justify-center">
              <button class="border border-border rounded-lg px-8 py-3 bg-white text-text-secondary font-semibold text-base transition focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 hover:bg-surface-alt">
                READ MORE
