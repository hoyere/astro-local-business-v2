<html>
<head>
  <title>Equipment Install - Poolax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom logo shape */
    .logo-bg {
      border-top-left-radius: 0;
      border-top-right-radius: 96px;
      border-bottom-right-radius: 96px;
      border-bottom-left-radius: 0;
    }
    @media (max-width: 1023px) {
      .logo-bg {
        border-top-right-radius: 56px;
        border-bottom-right-radius: 56px;
      }
    }
    /* Hide scrollbars for hero overlay image */
    .hero-bg {
      background: linear-gradient(120deg, rgba(0, 80, 180, 0.7) 0%, rgba(0, 80, 180, 0.5) 100%), url('https://placehold.co/1600x600/1e3c5c/ffffff?text=Pool+Equipment+Background');
      background-size: cover;
      background-position: center;
      position: relative;
      min-height: 340px;
    }
    @media (max-width: 768px) {
      .hero-bg {
        min-height: 220px;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text font-sans">

  <!-- Header / Navbar -->
  <header class="w-full bg-[#1792f5]">
    <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 h-[90px] relative">
      <!-- Logo -->
      <div class="logo-bg bg-background h-[90px] flex items-center px-8 pr-16 shadow-none z-10" style="min-width:270px;">
        <a href="#" class="flex items-center space-x-2">
          <!-- Custom Poolax Logo -->
          <span class="text-[44px] font-bold text-[#0f1c18] leading-none tracking-tight relative" style="font-family: 'Montserrat', sans-serif;">
            <span class="relative">
              P
              <!-- Pool icon for 'oo' -->
              <span class="inline-block align-middle relative -mx-1">
                <span class="relative">
                  <span class="inline-block relative">
                    <svg width="38" height="32" viewBox="0 0 38 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle" style="vertical-align:middle;">
                      <ellipse cx="10" cy="16" rx="8" ry="8" fill="#1792f5"/>
                      <ellipse cx="28" cy="16" rx="8" ry="8" fill="#1792f5"/>
                      <ellipse cx="10" cy="16" rx="6" ry="6" fill="#fff"/>
                      <ellipse cx="28" cy="16" rx="6" ry="6" fill="#fff"/>
                      <ellipse cx="10" cy="16" rx="4" ry="4" fill="#1792f5"/>
                      <ellipse cx="28" cy="16" rx="4" ry="4" fill="#1792f5"/>
                      <!-- Pool ladder -->
                      <rect x="8.5" y="4" width="2" height="10" rx="1" fill="#0f1c18"/>
                      <rect x="26.5" y="4" width="2" height="10" rx="1" fill="#0f1c18"/>
                      <rect x="8.5" y="7" width="20" height="2" rx="1" fill="#0f1c18"/>
                      <rect x="8.5" y="10" width="20" height="2" rx="1" fill="#0f1c18"/>
                    </svg>
                  </span>
                </span>
              </span>
              lax
            </span>
          </span>
        </a>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 flex items-center justify-center">
        <ul class="flex space-x-8 text-[15px] font-medium text-on-primary">
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              HOME <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              ABOUT US
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              SERVICES <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              PAGES <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="flex items-center hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              BLOGS <i class="fas fa-plus ml-1 text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              CONTACT US
            </a>
          </li>
        </ul>
      </nav>
      <!-- Header Icons -->
      <div class="flex items-center space-x-4 ml-4">
        <button aria-label="Search" class="w-11 h-11 rounded-full bg-background flex items-center justify-center text-[#0f1c18] text-xl shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button aria-label="Menu" class="w-11 h-11 rounded-full bg-background flex items-center justify-center text-[#0f1c18] text-xl shadow focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section hero-bg flex items-center relative">
    <div class="container mx-auto max-w-7xl px-4 py-20 md:py-24 flex flex-col justify-center">
      <h1 class="text-[56px] md:text-[64px] font-bold text-on-primary mb-8 leading-tight">Equipment Install</h1>
      <nav class="flex items-center space-x-2 text-on-primary text-lg" aria-label="Breadcrumb">
        <a href="#" class="text-on-primary text-[18px] hover:underline focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">Home</a>
        <span class="mx-1 text-on-primary text-[18px]"><i class="fas fa-arrow-right text-base" data-icon="arrow-right"></i></span>
        <span class="text-on-primary text-[18px]">Equipment Install</span>
      </nav>
    </div>
    <!-- Decorative bubbles (absolute, for visual match) -->
    <img src="https://placehold.co/60x60/ffffff/ffffff?text= " alt="Bubble floating in hero background" class="absolute left-[22%] top-[38%] w-14 h-14 opacity-80 pointer-events-none" style="border-radius:50%;">
    <img src="https://placehold.co/44x44/ffffff/ffffff?text= " alt="Bubble floating in hero background" class="absolute left-[80%] top-[38%] w-11 h-11 opacity-80 pointer-events-none" style="border-radius:50%;">
    <img src="https://placehold.co/36x36/ffffff/ffffff?text= " alt="Bubble floating in hero background" class="absolute left-[90%] top-[65%] w-9 h-9 opacity-80 pointer-events-none" style="border-radius:50%;">
    <img src="https://placehold.co/28x28/ffffff/ffffff?text= " alt="Bubble floating in hero background" class="absolute left-[15%] top-[85%] w-7 h-7 opacity-80 pointer-events-none" style="border-radius:50%;">
    <img src="https://placehold.co/36x36/ffffff/ffffff?text= " alt="Bubble floating in hero background" class="absolute left-[70%] top-[70%] w-9 h-9 opacity-80 pointer-events-none" style="border-radius:50%;">
  </section>

</body>
</html>
