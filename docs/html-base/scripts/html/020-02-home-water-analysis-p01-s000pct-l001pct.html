<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom logo styling */
    .poolax-logo {
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      font-size: 3rem;
      letter-spacing: -0.05em;
      display: flex;
      align-items: center;
      color: #fff;
    }
    .poolax-logo .logo-p {
      position: relative;
      margin-right: 0.05em;
    }
    .poolax-logo .logo-pools {
      position: absolute;
      left: 0.18em;
      top: 0.7em;
      width: 1.1em;
      height: 0.5em;
      background: linear-gradient(180deg, #00bfff 60%, #0077be 100%);
      border-radius: 0 0 0.6em 0.6em;
      border-bottom: 3px solid #fff;
      z-index: 1;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .poolax-logo .logo-pools::before,
    .poolax-logo .logo-pools::after {
      content: '';
      display: block;
      position: absolute;
      width: 0.22em;
      height: 0.22em;
      border-radius: 50%;
      border: 3px solid #fff;
      background: #0a2236;
      top: -0.18em;
    }
    .poolax-logo .logo-pools::before {
      left: 0.18em;
    }
    .poolax-logo .logo-pools::after {
      right: 0.18em;
    }
    .poolax-logo .logo-o {
      margin-left: -0.08em;
      margin-right: 0.02em;
    }
    .poolax-logo .logo-lax {
      margin-left: 0.02em;
    }
    /* End logo styling */
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-[#13151d]">
  <header class="relative z-10">
    <nav class="flex items-center justify-between px-8 py-6 bg-[#13151d]">
      <!-- Logo -->
      <div class="flex items-center">
        <a href="#" class="poolax-logo relative" aria-label="Poolax Home">
          <span class="logo-p relative" style="display:inline-block;">
            P
            <span class="logo-pools"></span>
          </span>
          <span class="logo-o">o</span>
          <span class="logo-lax">olax</span>
        </a>
      </div>
      <!-- Navigation Links -->
      <ul class="flex items-center space-x-8 ml-16">
        <li>
          <a href="#" class="text-white text-sm font-medium tracking-wide hover:text-primary transition-colors flex items-center">
            HOME <span class="ml-1 text-xs">+</span>
          </a>
        </li>
        <li>
          <a href="#" class="text-white text-sm font-medium tracking-wide hover:text-primary transition-colors">
            ABOUT US
          </a>
        </li>
        <li>
          <a href="#" class="text-white text-sm font-medium tracking-wide hover:text-primary transition-colors flex items-center">
            SERVICES <span class="ml-1 text-xs">+</span>
          </a>
        </li>
        <li>
          <a href="#" class="text-white text-sm font-medium tracking-wide hover:text-primary transition-colors flex items-center">
            PAGES <span class="ml-1 text-xs">+</span>
          </a>
        </li>
        <li>
          <a href="#" class="text-white text-sm font-medium tracking-wide hover:text-primary transition-colors flex items-center">
            BLOGS <span class="ml-1 text-xs">+</span>
          </a>
        </li>
        <li>
          <a href="#" class="text-white text-sm font-medium tracking-wide hover:text-primary transition-colors">
            CONTACT US
          </a>
        </li>
      </ul>
      <!-- Right Side Icons -->
      <div class="flex items-center space-x-8 ml-16">
        <button class="w-14 h-14 rounded-full bg-[#0a1636] flex items-center justify-center text-white text-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button class="w-14 h-14 rounded-full bg-[#0a1636] flex items-center justify-center text-white text-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Open Menu">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
      <!-- Diagonal background overlay -->
      <div class="absolute right-0 top-0 h-full w-[340px] bg-[#1a2236] -z-10" style="clip-path: polygon(20% 0,100% 0,100% 100%,0 100%);"></div>
    </nav>
  </header>
</body>
</html>
