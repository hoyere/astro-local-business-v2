<html>
  <head>
    <title>Faq - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text font-sans">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#2196f3]">
      <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 h-[90px]">
        <!-- Logo -->
        <div class="flex items-center">
          <div class="bg-background rounded-bl-[80px] rounded-br-[60px] rounded-tl-none rounded-tr-[80px] shadow-none px-0 py-0 h-[110px] -ml-4 flex items-center">
            <a href="#" class="flex items-center pl-6 pr-10 py-0 h-[110px]">
              <!-- Custom Poolax Logo -->
              <span class="text-[48px] font-bold text-[#0f1c18] leading-none relative select-none" style="font-family: 'Montserrat', Arial, sans-serif;">
                <span class="relative">
                  P
                  <!-- Pool icon for 'oo' -->
                  <span class="inline-block align-middle relative -mx-1">
                    <span class="relative">
                      <span class="inline-block relative">
                        <span class="inline-block text-[#2196f3] text-[38px] font-bold" style="letter-spacing:-0.1em;">
                          o
                        </span>
                        <span class="absolute left-0 top-0 w-full flex justify-between px-[2px]">
                          <svg width="18" height="12" viewBox="0 0 18 12" fill="none" class="inline-block" style="vertical-align:top;">
                            <ellipse cx="4" cy="6" rx="4" ry="6" fill="#2196f3"/>
                          </svg>
                          <svg width="18" height="12" viewBox="0 0 18 12" fill="none" class="inline-block" style="vertical-align:top;">
                            <ellipse cx="4" cy="6" rx="4" ry="6" fill="#2196f3"/>
                          </svg>
                        </span>
                        <!-- Pool ladder -->
                        <span class="absolute left-[2px] top-[-10px]">
                          <svg width="28" height="18" viewBox="0 0 28 18" fill="none">
                            <rect x="2" y="2" width="2" height="14" rx="1" fill="#0f1c18"/>
                            <rect x="10" y="2" width="2" height="14" rx="1" fill="#0f1c18"/>
                            <rect x="2" y="5" width="10" height="2" rx="1" fill="#0f1c18"/>
                            <rect x="2" y="10" width="10" height="2" rx="1" fill="#0f1c18"/>
                          </svg>
                        </span>
                      </span>
                    </span>
                  </span>
                  <span class="inline-block text-[#2196f3] text-[38px] font-bold -ml-2" style="letter-spacing:-0.1em;">o</span>

            </a>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex items-center justify-center">
          <ul class="flex space-x-7 text-[15px] font-medium text-white">
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4">
          <button class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-[#0f1c18] text-xl shadow-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-[#0f1c18] text-xl shadow-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->

      <!-- Bubbles (decorative) -->
      <img src="https://placehold.co/80x80/ffffff/ffffff?text= " alt="Bubble floating in water" class="absolute left-[28%] top-[38%] w-16 h-16 opacity-80 rounded-full pointer-events-none select-none" style="mix-blend-mode: screen;">
      <img src="https://placehold.co/60x60/ffffff/ffffff?text= " alt="Bubble floating in water" class="absolute left-[70%] top-[30%] w-12 h-12 opacity-80 rounded-full pointer-events-none select-none" style="mix-blend-mode: screen;">
      <img src="https://placehold.co/40x40/ffffff/ffffff?text= " alt="Bubble floating in water" class="absolute left-[90%] top-[60%] w-8 h-8 opacity-80 rounded-full pointer-events-none select-none" style="mix-blend-mode: screen;">
      <img src="https://placehold.co/32x32/ffffff/ffffff?text= " alt="Bubble floating in water" class="absolute left-[12%] top-[80%] w-6 h-6 opacity-80 rounded-full pointer-events-none select-none" style="mix-blend-mode: screen;">

      <div class="container mx-auto max-w-7xl px-4 relative z-10">
        <div class="pt-24">
          <h1 class="text-white text-5xl md:text-6xl font-bold mb-6">Faq</h1>
          <nav class="flex items-center space-x-2 text-white text-lg font-medium">
            <a href="#" class="hover:underline text-white">Home</a>
            <span class="flex items-center text-white">
              <i class="fas fa-arrow-right mx-2 text-base" data-icon="arrow-right"></i>
