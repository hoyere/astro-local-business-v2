<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #f3f8fb;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">
  <section class="team-section py-16 md:py-24 bg-background">
    <div class="container mx-auto px-4 max-w-7xl">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-12">
        <div>
          <div class="flex items-center mb-3">
            <span class="inline-block w-2 h-2 bg-primary rounded-sm mr-2"></span>
            <span class="text-primary font-semibold tracking-wide uppercase text-base">Our Exper</span>
            <span class="inline-block w-2 h-2 bg-primary rounded-sm ml-2"></span>
          </div>
          <h2 class="text-4xl md:text-5xl font-bold text-text leading-tight mb-0">
            Meet Our Professional<br>
            Team Members
          </h2>
        </div>
        <div class="mt-8 md:mt-0">
          <button class="bg-primary text-on-primary font-medium rounded-lg px-8 py-3 text-base shadow-sm transition hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
            VIEW ALL MEMBER
          </button>
        </div>
      </div>
      <div data-collection="team-members" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Team Member 1 -->
        <article data-item="team-member-1" class="bg-surface rounded-2xl shadow-sm relative overflow-hidden pt-8 pb-6 px-4 flex flex-col items-center">
          <div class="absolute top-0 right-0 w-16 h-16 bg-[#e6f0fa] rounded-bl-2xl"></div>
          <img src="https://placehold.co/240x260?text=Emanuel+Maclin" alt="Portrait of Emanuel Maclin, pool technician, arms crossed, wearing blue overalls" class="w-40 h-44 object-cover rounded-xl z-10 mb-4">
          <div class="absolute left-4 bottom-20">
            <span class="bg-primary text-on-primary rounded-full w-8 h-8 flex items-center justify-center shadow" tabindex="0" aria-label="Share profile">
              <i class="fas fa-share-alt text-lg" data-icon="share-alt"></i>
            </span>
          </div>
          <div class="mt-2 text-center">
            <h3 class="font-bold text-lg text-text mb-1">Emanuel Maclin</h3>
            <p class="text-text-muted text-base">Pool Technicia</p>
          </div>
        </article>
        <!-- Team Member 2 -->
        <article data-item="team-member-2" class="bg-surface rounded-2xl shadow-sm relative overflow-hidden pt-8 pb-6 px-4 flex flex-col items-center">
          <div class="absolute top-0 right-0 w-16 h-16 bg-[#e6f0fa] rounded-bl-2xl"></div>
          <img src="https://placehold.co/240x260?text=Jonson+Anderson" alt="Portrait of Jonson Anderson, pool technician, smiling, wearing blue cap and plaid shirt" class="w-40 h-44 object-cover rounded-xl z-10 mb-4">
          <div class="absolute left-4 bottom-20">
            <span class="bg-primary text-on-primary rounded-full w-8 h-8 flex items-center justify-center shadow" tabindex="0" aria-label="Share profile">
              <i class="fas fa-share-alt text-lg" data-icon="share-alt"></i>
            </span>
          </div>
          <div class="mt-2 text-center">
            <h3 class="font-bold text-lg text-text mb-1">Jonson Anderson</h3>
            <p class="text-text-muted text-base">Pool Technicia</p>
          </div>
        </article>
        <!-- Team Member 3 -->
        <article data-item="team-member-3" class="bg-surface rounded-2xl shadow-sm relative overflow-hidden pt-8 pb-6 px-4 flex flex-col items-center">
          <div class="absolute top-0 right-0 w-16 h-16 bg-[#e6f0fa] rounded-bl-2xl"></div>
          <img src="https://placehold.co/240x260?text=Charlie+William" alt="Portrait of Charlie William, pool technician, arms crossed, wearing apron and blue shirt" class="w-40 h-44 object-cover rounded-xl z-10 mb-4">
          <div class="absolute left-4 bottom-20">
            <span class="bg-primary text-on-primary rounded-full w-8 h-8 flex items-center justify-center shadow" tabindex="0" aria-label="Share profile">
              <i class="fas fa-share-alt text-lg" data-icon="share-alt"></i>
            </span>
          </div>
          <div class="mt-2 text-center">
            <h3 class="font-bold text-lg text-text mb-1">Charlie William</h3>
            <p class="text-text-muted text-base">Pool Technicia</p>
          </div>
        </article>
        <!-- Team Member 4 -->
        <article data-item="team-member-4" class="bg-surface rounded-2xl shadow-sm relative overflow-hidden pt-8 pb-6 px-4 flex flex-col items-center">
          <div class="absolute top-0 right-0 w-16 h-16 bg-[#e6f0fa] rounded-bl-2xl"></div>
          <img src="https://placehold.co/240x260?text=Daniel+Thomas" alt="Portrait of Daniel Thomas, pool technician, holding tablet, wearing cap and overalls" class="w-40 h-44 object-cover rounded-xl z-10 mb-4">
          <div class="absolute left-4 bottom-20">
            <span class="bg-primary text-on-primary rounded-full w-8 h-8 flex items-center justify-center shadow" tabindex="0" aria-label="Share profile">
              <i class="fas fa-share-alt text-lg" data-icon="share-alt"></i>
            </span>
          </div>
          <div class="mt-2 text-center">
            <h3 class="font-bold text-lg text-text mb-1">Daniel Thomas</h3>
            <p class="text-text-muted text-base">Pool Technicia</p>
          </div>
        </article>
      </div>
    </div>
  </section>
</body>
</html>
