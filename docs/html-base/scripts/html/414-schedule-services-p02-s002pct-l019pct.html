<html>
  <head>
    <title>Contact - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom styles for logo shape */
      .logo-bg {
        border-bottom-right-radius: 80px;
        border-top-left-radius: 0;
        border-top-right-radius: 80px;
        border-bottom-left-radius: 0;
      }
      @media (max-width: 1024px) {
        .logo-bg {
          border-bottom-right-radius: 48px;
          border-top-right-radius: 48px;
        }
      }
      /* Custom styles for hero overlay */
      .contact-hero-bg {
        background: linear-gradient(120deg, rgba(0, 60, 130, 0.92) 60%, rgba(0, 60, 130, 0.7) 100%), url('https://placehold.co/1600x600/1e4e7e/ffffff?text=Pool+Background');
        background-size: cover;
        background-position: center;
        position: relative;
        overflow: hidden;
      }
      /* Bubble styles */
      .bubble {
        position: absolute;
        border-radius: 9999px;
        background: rgba(255,255,255,0.35);
        box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
        pointer-events: none;
        animation: float 8s infinite ease-in-out;
      }
      .bubble1 { width: 48px; height: 48px; left: 12%; top: 72%; animation-delay: 0s;}
      .bubble2 { width: 32px; height: 32px; left: 80%; top: 60%; animation-delay: 2s;}
      .bubble3 { width: 24px; height: 24px; left: 90%; top: 78%; animation-delay: 1s;}
      .bubble4 { width: 20px; height: 20px; left: 30%; top: 90%; animation-delay: 3s;}
      .bubble5 { width: 36px; height: 36px; left: 70%; top: 30%; animation-delay: 4s;}
      @keyframes float {
        0% { transform: translateY(0) scale(1);}
        50% { transform: translateY(-20px) scale(1.1);}
        100% { transform: translateY(0) scale(1);}
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1796f7]">
      <div class="container mx-auto max-w-7xl flex items-center justify-between px-4 py-0 h-[90px] relative">
        <!-- Logo -->
        <div class="absolute left-0 top-0 h-[110px] flex items-center z-10">
          <div class="logo-bg bg-background h-[110px] pl-8 pr-16 flex items-center shadow-sm" style="border-bottom-right-radius:80px;border-top-right-radius:80px;">
            <a href="#" class="flex items-center space-x-2">
              <!-- Custom Poolax Logo -->
              <span class="text-[44px] font-bold text-[#1e4e7e] leading-none flex items-center">
                P
                <span class="relative inline-block mx-0.5">
                  <span class="inline-block relative">
                    <span class="text-[#02a26a]">o</span>
                    <!-- Pool icon: two circles and ladder -->
                    <span class="absolute left-0 top-0 w-full h-full flex items-center justify-center">
                      <svg width="32" height="32" viewBox="0 0 32 32" class="inline-block" aria-hidden="true">
                        <ellipse cx="16" cy="16" rx="13" ry="13" fill="none" stroke="#02a26a" stroke-width="2"/>
                        <rect x="13" y="7" width="2" height="12" fill="#02a26a"/>
                        <rect x="17" y="7" width="2" height="12" fill="#02a26a"/>
                        <rect x="13" y="11" width="6" height="2" fill="#02a26a"/>
                        <rect x="13" y="15" width="6" height="2" fill="#02a26a"/>
                      </svg>
                    </span>
                  </span>
                </span>
                <span class="text-[#1e4e7e]">olax</span>
              </span>
            </a>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex items-center justify-center ml-[260px]">
          <ul class="flex space-x-8 text-[15px] font-medium text-white">
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors flex items-center gap-1">
                BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:text-accent transition-colors">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-6 ml-4">
          <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-[#1796f7] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-[#1796f7] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Contact Hero Section -->
    <section class="contact-hero-section relative">
      <div class="contact-hero-bg min-h-[320px] md:min-h-[340px] flex items-center">
        <div class="container mx-auto max-w-7xl px-4 py-16 md:py-20 relative z-10">
          <h1 class="text-5xl md:text-6xl font-bold text-white mb-6">Contact</h1>
          <nav class="flex items-center space-x-2 text-lg text-white/90">
            <a href="#" class="hover:underline text-white/80">Home</a>
            <span>
              <i class="fas fa-arrow-right text-white/70 text-base mx-1" data-icon="arrow-right"></i>
            </span>
            <span class="text-white/90">Contact</span>
          </nav>
        </div>
        <!-- Bubbles -->
        <span class="bubble bubble1"></span>
        <span class="bubble bubble2"></span>
        <span class="bubble bubble3"></span>
        <span class="bubble bubble4"></span>
        <span class="bubble bubble5"></span>
      </div>
    </section>
  </body>
</html>
