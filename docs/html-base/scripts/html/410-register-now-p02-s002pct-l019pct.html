<html>
  <head>
    <title>Contact - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1896f7]">
      <nav class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24 relative z-20">
        <!-- Logo -->
        <div class="flex items-center">
          <div class="relative">
            <div class="absolute left-0 top-0 w-[290px] h-[100px] bg-background rounded-br-[60px] z-10"></div>
            <a href="#" class="relative z-20 flex items-center h-[100px] pl-2">
              <!-- Poolax Logo Recreation -->
              <span class="text-[48px] font-bold leading-none flex items-center">
                <span class="relative mr-1">
                  <span class="text-[#1896f7] font-bold">P</span>
                  <!-- Pool icon for 'oo' -->
                  <span class="inline-block align-middle relative -top-2">
                    <svg width="38" height="32" viewBox="0 0 38 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block">
                      <ellipse cx="10" cy="18" rx="8" ry="8" fill="#1896f7"/>
                      <ellipse cx="28" cy="18" rx="8" ry="8" fill="#1896f7"/>
                      <ellipse cx="10" cy="18" rx="6" ry="6" fill="#fff"/>
                      <ellipse cx="28" cy="18" rx="6" ry="6" fill="#fff"/>
                      <ellipse cx="10" cy="18" rx="4" ry="4" fill="#1896f7"/>
                      <ellipse cx="28" cy="18" rx="4" ry="4" fill="#1896f7"/>
                      <!-- Pool ladder -->
                      <rect x="7" y="6" width="2" height="8" rx="1" fill="#222"/>
                      <rect x="11" y="6" width="2" height="8" rx="1" fill="#222"/>
                      <rect x="25" y="6" width="2" height="8" rx="1" fill="#222"/>
                      <rect x="29" y="6" width="2" height="8" rx="1" fill="#222"/>
                      <rect x="7" y="8" width="6" height="2" rx="1" fill="#222"/>
                      <rect x="25" y="8" width="6" height="2" rx="1" fill="#222"/>
                    </svg>
                  </span>
                  <span class="sr-only">Poolax</span>
                </span>
                <span class="text-[#222]">lax</span>
              </span>
            </a>
          </div>
        </div>
        <!-- Navigation Links -->
        <ul class="hidden lg:flex items-center space-x-8 ml-8">
          <li>
            <a href="#" class="text-white font-medium text-sm hover:underline flex items-center gap-1">
              HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white font-medium text-sm hover:underline">ABOUT US</a>
          </li>
          <li>
            <a href="#" class="text-white font-medium text-sm hover:underline flex items-center gap-1">
              SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white font-medium text-sm hover:underline flex items-center gap-1">
              PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white font-medium text-sm hover:underline flex items-center gap-1">
              BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="text-white font-medium text-sm hover:underline">CONTACT US</a>
          </li>
        </ul>
        <!-- Right Icons -->
        <div class="flex items-center space-x-4 ml-4">
          <button class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-[#1896f7] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-[#1896f7] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative min-h-[300px] flex items-end pb-16 md:pb-24" style="background: linear-gradient(120deg, #1e5e8e 60%, #2e7bbf 100%);">
      <!-- Overlayed pool image with bubbles (placeholder) -->
      <img src="https://placehold.co/1600x600/1e5e8e/ffffff?text=Pool+background+with+bubbles+and+pool+edge" alt="Blue pool water with bubbles and pool edge" class="absolute inset-0 w-full h-full object-cover opacity-70 pointer-events-none select-none" style="z-index:1;">
      <div class="container mx-auto px-4 max-w-7xl relative z-10">
        <div class="pt-24">
          <h1 class="text-white text-5xl md:text-6xl font-bold mb-6">Contact</h1>
          <nav class="flex items-center space-x-2 text-white text-lg font-medium" aria-label="Breadcrumb">
            <a href="#" class="hover:underline text-white/80">Home</a>
            <span class="mx-1 text-white/60"><i class="fas fa-arrow-right text-base" data-icon="arrow-right"></i></span>
            <span class="text-white">Contact</span>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
