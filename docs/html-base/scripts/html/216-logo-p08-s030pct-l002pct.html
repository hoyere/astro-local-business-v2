<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-surface-alt min-h-screen">
    <section class="carousel-nav-section py-32 bg-surface-alt">
      <div class="container mx-auto px-4 flex justify-center">
        <div class="flex space-x-8">
          <button
            type="button"
            aria-label="Previous"
            class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center text-white text-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition"
          >
            <i class="fas fa-arrow-left" data-icon="arrow-left"></i>
          </button>
          <button
            type="button"
            aria-label="Next"
            class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center text-white text-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition"
          >
            <i class="fas fa-arrow-right" data-icon="arrow-right"></i>
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
