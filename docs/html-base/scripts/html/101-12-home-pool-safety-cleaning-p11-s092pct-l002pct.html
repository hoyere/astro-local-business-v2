<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="newsletter-section relative py-0 bg-[#0597fa] overflow-hidden">
      <div class="container mx-auto px-0 max-w-full">
        <div class="relative flex items-center justify-between w-full min-h-[120px]">
          <!-- Left Illustration -->
          <div class="hidden md:block absolute left-0 top-0 h-full z-10">
            <img src="https://placehold.co/100x200?text=Person+with+Oar" alt="Illustration of a person standing with an oar" class="h-full w-auto object-contain" />
          </div>
          <!-- Right Illustration -->
          <div class="hidden md:block absolute right-0 top-0 h-full z-10">
            <img src="https://placehold.co/160x120?text=Swimming+Pool" alt="Illustration of a person swimming in a pool" class="h-full w-auto object-contain" />
          </div>
          <!-- Content -->
          <div class="flex-1 flex flex-col md:flex-row items-center justify-center md:justify-start gap-8 md:gap-12 px-4 md:pl-[140px] md:pr-[180px] py-8">
            <div class="text-left">
              <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">
                Subscribe For Our Latest<br class="hidden md:block" />
                Updates And News!
              </h2>
            </div>
            <form class="flex w-full max-w-xl md:max-w-2xl" autocomplete="off" aria-label="Subscribe for updates">
              <label for="newsletter-email" class="sr-only">Email address</label>
              <input
                id="newsletter-email"
                type="email"
                placeholder="Enter your Email"
                class="flex-1 rounded-l-xl rounded-r-none px-6 py-4 text-base text-text bg-white border-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
                required
              />
              <button
                type="submit"
                class="rounded-r-xl rounded-l-none px-8 py-4 bg-[#0a1c3c] text-white font-semibold text-base focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors"
              >
                SUBSCRIBE
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
