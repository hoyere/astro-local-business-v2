<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen">
    <section class="job-categories-section py-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="flex flex-col md:flex-row items-start md:items-center">
          <div class="w-full md:w-1/2 mb-10 md:mb-0">
            <h1 class="text-4xl md:text-5xl font-normal text-text leading-tight">
              Find the right job or<br>internship for you
            </h1>
          </div>
          <div class="w-full md:w-1/2 flex justify-center md:justify-start">
            <div data-collection="job-categories" class="flex flex-col gap-3">
              <div class="flex flex-row gap-4">
                <button data-item="engineering" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Engineering
                </button>
                <button data-item="business-development" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Business Development
                </button>
                <button data-item="finance" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Finance
                </button>
              </div>
              <div class="flex flex-row gap-4">
                <button data-item="administrative-assistant" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Administrative Assistant
                </button>
                <button data-item="retail-associate" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Retail Associate
                </button>
              </div>
              <div class="flex flex-row gap-4">
                <button data-item="customer-service" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Customer Service
                </button>
                <button data-item="operations" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Operations
                </button>
              </div>
              <div class="flex flex-row gap-4">
                <button data-item="information-technology" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Information Technology
                </button>
                <button data-item="marketing" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Marketing
                </button>
              </div>
              <div class="flex flex-row gap-4">
                <button data-item="human-resources" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Human Resources
                </button>
              </div>
              <div class="flex flex-row gap-4">
                <button data-item="show-more" class="px-6 py-2 rounded-full border border-border bg-surface text-text font-semibold text-lg flex items-center gap-2 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition">
                  Show more
                  <i class="fas fa-chevron-down text-base" data-icon="chevron-down"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
