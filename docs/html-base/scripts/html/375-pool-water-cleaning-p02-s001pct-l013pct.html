<html>
  <head>
    <title>Commercial Pool - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-primary-light">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24 relative">
        <!-- Logo -->
        <div class="absolute left-0 top-0 h-24 flex items-center z-10">
          <div class="bg-background rounded-br-[80px] rounded-bl-none rounded-tl-none rounded-tr-none shadow-none h-24 flex items-center pl-8 pr-12" style="clip-path: ellipse(180px 70px at left top);">
            <a href="#" class="flex items-center space-x-2">
              <!-- Custom Poolax Logo -->
              <span class="text-[44px] font-bold text-text leading-none tracking-tight flex items-center">
                <span class="relative mr-1">
                  <span class="inline-block relative">
                    <span class="text-[44px] font-bold text-text" style="font-family:sans-serif;">P</span>
                    <!-- Pool goggles icon -->
                    <span class="absolute left-2 top-3">
                      <svg width="32" height="18" viewBox="0 0 32 18" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle" style="vertical-align:middle;">
                        <ellipse cx="7" cy="9" rx="7" ry="7" fill="#02a26a"/>
                        <ellipse cx="25" cy="9" rx="7" ry="7" fill="#02a26a"/>
                        <rect x="7" y="7" width="18" height="4" rx="2" fill="#0f1c18"/>
                        <circle cx="7" cy="9" r="3" fill="#fff"/>
                        <circle cx="25" cy="9" r="3" fill="#fff"/>
                      </svg>
                    </span>
                  </span>
                </span>
                <span class="ml-2">oolax</span>
              </span>
            </a>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex justify-center items-center">
          <ul class="flex space-x-8 ml-64">
            <li>
              <a href="#" class="text-on-primary text-sm font-medium hover:underline flex items-center">
                HOME <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-on-primary text-sm font-medium hover:underline">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="text-on-primary text-sm font-medium hover:underline flex items-center">
                SERVICES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-on-primary text-sm font-medium hover:underline flex items-center">
                PAGES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-on-primary text-sm font-medium hover:underline flex items-center">
                BLOGS <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="text-on-primary text-sm font-medium hover:underline">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4 ml-4">
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-background text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-background text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-surface-alt" style="background: linear-gradient(120deg, #1a5fa8 0%, #1a5fa8 40%, #1a5fa8cc 100%);">
      <div class="absolute inset-0 z-0">
        <!-- Pool background image with overlay -->
        <img src="https://placehold.co/1600x600/1a5fa8/ffffff?text=Pool+background+with+net+and+bubbles" alt="Pool water background with net and bubbles" class="w-full h-full object-cover opacity-60">
        <!-- Overlay shapes -->
        <svg class="absolute left-0 top-0 w-full h-full" viewBox="0 0 1600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,0 900,0 1600,600 0,600" fill="#1a5fa8" fill-opacity="0.35"/>
        </svg>
        <!-- Bubbles (decorative) -->
        <span class="absolute left-[12%] top-[70%] w-12 h-12 bg-white bg-opacity-30 rounded-full blur-[2px]"></span>
        <span class="absolute left-[23%] top-[85%] w-6 h-6 bg-white bg-opacity-40 rounded-full blur-[1px]"></span>
        <span class="absolute left-[80%] top-[40%] w-16 h-16 bg-white bg-opacity-30 rounded-full blur-[2px]"></span>
        <span class="absolute left-[88%] top-[60%] w-10 h-10 bg-white bg-opacity-40 rounded-full blur-[1px]"></span>
        <span class="absolute left-[90%] top-[80%] w-8 h-8 bg-white bg-opacity-30 rounded-full blur-[1px]"></span>
      </div>
      <div class="relative z-10 py-24 md:py-36">
        <div class="container mx-auto px-4 max-w-6xl">
          <h1 class="text-5xl md:text-6xl font-bold text-on-primary mb-8">Commercial Pool</h1>
          <nav class="flex items-center space-x-2 text-on-primary text-lg" aria-label="Breadcrumb">
            <a href="#" class="text-on-primary text-base hover:underline">Home</a>
            <span class="mx-1 text-on-primary text-base"><i class="fas fa-arrow-right text-base" data-icon="arrow-right"></i></span>
            <span class="text-on-primary text-base">Commercial Pool</span>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
