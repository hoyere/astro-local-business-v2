<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="topbar-section">
      <div class="w-full flex h-12">
        <!-- Left angled blue area -->
        <div class="relative flex items-center" style="width: 52%;">
          <div class="absolute inset-0 h-full w-full" style="clip-path: polygon(0 0, 100% 0, 92% 100%, 0% 100%); background: #0096fa;"></div>
          <div class="relative flex items-center justify-center w-full h-full">
            <span class="text-white text-base font-normal tracking-tight" style="font-family: 'Montserrat', Arial, sans-serif;">
              Welcome to Our Poolax Pool Cleaning &amp; Services Company
            </span>
          </div>
        </div>
        <!-- Right light gray area -->
        <div class="flex-1 flex items-center justify-end bg-[#ecf3f8] h-full pr-8">
          <nav class="flex items-center space-x-4 text-text-secondary text-base" aria-label="Topbar navigation">
            <span class="mr-2">Language</span>
            <i class="fas fa-caret-down text-xs text-text-muted" data-icon="caret-down"></i>
            <span class="mx-3 text-[#bfc9d1]">|</span>
            <span class="mr-2">Follow Us On:</span>
            <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Facebook">
              <i class="fab fa-facebook-f" data-icon="facebook"></i>
            </a>
            <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Twitter">
              <i class="fab fa-twitter" data-icon="twitter"></i>
            </a>
            <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Instagram">
              <i class="fab fa-instagram" data-icon="instagram"></i>
            </a>
            <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="LinkedIn">
              <i class="fab fa-linkedin-in" data-icon="linkedin"></i>
            </a>
            <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Behance">
              <i class="fab fa-behance" data-icon="behance"></i>
            </a>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
