<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="newsletter-section py-0" style="background: #0094ff;">
      <div class="relative flex items-stretch min-h-[120px] w-full overflow-hidden" style="background: #0094ff;">
        <!-- Left angled dark blue shape with illustration -->
        <div class="absolute left-0 top-0 h-full w-[180px] md:w-[220px] z-10" style="clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%); background: #06143b;">
          <img src="https://placehold.co/120x220/png?text=Person+with+snorkel" alt="Illustration of a person with a snorkel and rope" class="absolute left-6 bottom-0 w-[90px] md:w-[110px] h-auto">
        </div>
        <!-- Right angled dark blue shape with illustration -->
        <div class="absolute right-0 top-0 h-full w-[180px] md:w-[220px] z-10" style="clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); background: #06143b;">
          <img src="https://placehold.co/120x80/png?text=Swimmer" alt="Illustration of a swimmer in a pool" class="absolute right-6 bottom-4 w-[90px] md:w-[110px] h-auto rounded-md">
        </div>
        <!-- Main content -->
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between px-4 md:px-8 py-8 relative z-20 max-w-7xl w-full">
          <div class="flex-1 min-w-[260px] md:min-w-[340px] pl-[110px] md:pl-[140px]">
            <h2 class="text-2xl md:text-4xl font-semibold text-on-primary leading-tight">
              Subscribe For Our Latest<br class="hidden md:block"> Updates And News!
            </h2>
          </div>
          <form class="flex-1 flex items-center justify-end gap-4 md:gap-6 w-full max-w-xl pr-[110px] md:pr-[140px] mt-6 md:mt-0">
            <label for="newsletter-email" class="sr-only">Email address</label>
            <input
              id="newsletter-email"
              type="email"
              placeholder="Enter your Email"
              class="flex-1 rounded-lg bg-surface px-6 py-3 text-text text-base outline-none border-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
              required
            >
            <button
              type="submit"
              class="bg-[#06143b] hover:bg-primary-dark text-on-primary font-medium px-8 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
            >
              SUBSCRIBE
            </button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
