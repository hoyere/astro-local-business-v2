<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }

    /* Pool pattern background */
    .pool-bg {
      background-color: #06143a;
      background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M60 10Q70 20 80 10T90 30Q80 40 90 50T80 70Q70 80 60 70T50 90Q40 80 30 90T10 80Q20 70 10 60T30 50Q40 60 50 50T60 30Q50 20 60 10Z" fill="%230b1e44" fill-opacity="0.7"/><path d="M10 10Q20 20 30 10T50 30Q40 40 50 50T30 70Q20 80 10 70T10 50Q20 40 10 30T10 10Z" fill="%230b1e44" fill-opacity="0.7"/></svg>');
      background-size: 400px 400px;
      background-repeat: repeat;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">

  <section class="stats-gallery-section pool-bg py-20 md:py-32">
    <div class="container mx-auto px-4 max-w-6xl">
      <!-- Stats Row -->
      <div class="flex flex-col md:flex-row justify-between items-center md:items-start gap-12 md:gap-0 mb-20">
        <div data-collection="stats" class="w-full flex flex-col md:flex-row justify-between items-center md:items-start gap-12 md:gap-0">
          <!-- Stat 1 -->
          <div data-item="stat-1" class="flex flex-col items-center md:items-start w-full md:w-1/4">
            <span class="text-4xl md:text-5xl font-bold text-white">
              2,564<span class="text-primary">+</span>
            </span>
            <span class="mt-2 text-base text-white opacity-80 text-center md:text-left">Successfully Projects Complete</span>
          </div>
          <!-- Divider -->
          <div class="hidden md:block h-16 border-l border-white/20 mx-8"></div>
          <!-- Stat 2 -->
          <div data-item="stat-2" class="flex flex-col items-center md:items-start w-full md:w-1/4">
            <span class="text-4xl md:text-5xl font-bold text-white">
              164<span class="text-primary">+</span>
            </span>
            <span class="mt-2 text-base text-white opacity-80 text-center md:text-left">Expert Team Members</span>
          </div>
          <!-- Divider -->
          <div class="hidden md:block h-16 border-l border-white/20 mx-8"></div>
          <!-- Stat 3 -->
          <div data-item="stat-3" class="flex flex-col items-center md:items-start w-full md:w-1/4">
            <span class="text-4xl md:text-5xl font-bold text-white">
              2,985<span class="text-primary">+</span>
            </span>
            <span class="mt-2 text-base text-white opacity-80 text-center md:text-left">Our Satisfied Customers</span>
          </div>
          <!-- Divider -->
          <div class="hidden md:block h-16 border-l border-white/20 mx-8"></div>
          <!-- Stat 4 -->
          <div data-item="stat-4" class="flex flex-col items-center md:items-start w-full md:w-1/4">
            <span class="text-4xl md:text-5xl font-bold text-white">
              85<span class="text-primary">+</span>
            </span>
            <span class="mt-2 text-base text-white opacity-80 text-center md:text-left">Best Company Awards</span>
          </div>
        </div>
      </div>
      <!-- Gallery Heading -->
      <div class="flex flex-col items-center justify-center text-center">
        <div class="flex items-center justify-center mb-2">
          <span class="inline-block w-16 h-0.5 bg-primary mr-4"></span>
          <span class="text-primary text-lg font-medium">Our Work Gallery</span>
          <span class="inline-block w-16 h-0.5 bg-primary ml-4"></span>
        </div>
        <h2 class="text-3xl md:text-5xl font-extrabold text-white mt-2">Recent Pool Maintenance Work</h2>
      </div>
    </div>
  </section>

</body>
</html>
