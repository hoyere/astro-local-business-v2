<html>
<head>
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom shape for left blue area */
    .topbar-left {
      clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background">
  <section class="topbar-section">
    <div class="w-full flex items-stretch h-10">
      <!-- Left blue area with welcome text -->
      <div class="topbar-left bg-[#0096fa] flex items-center px-6 min-w-[420px] h-full" style="min-width:420px;">
        <span class="text-white text-base font-normal tracking-tight">
          Welcome to Our Poolax Pool Cleaning &amp; Services Company
        </span>
      </div>
      <!-- Right area with language and social icons -->
      <div class="flex-1 flex items-center justify-end bg-[#ecf3f8] h-full">
        <div class="flex items-center h-full pr-6 space-x-4 text-[15px]">
          <span class="text-text-secondary">Language <span class="align-super text-xs">&#9660;</span></span>
          <span class="text-[#bfc9d1]">|</span>
          <span class="text-text-secondary">Follow Us On:</span>
          <a href="#" class="ml-1 text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Facebook">
            <i class="fab fa-facebook-f" data-icon="facebook"></i>
          </a>
          <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Twitter">
            <i class="fab fa-twitter" data-icon="twitter"></i>
          </a>
          <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Instagram">
            <i class="fab fa-instagram" data-icon="instagram"></i>
          </a>
          <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in" data-icon="linkedin"></i>
          </a>
          <a href="#" class="text-[#0f1c18] hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Behance">
            <i class="fab fa-behance" data-icon="behance"></i>
          </a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
