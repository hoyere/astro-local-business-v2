<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen">
    <section class="py-0 bg-background">
      <div class="container mx-auto px-0 max-w-none">
        <div class="flex flex-wrap">
          <!-- Left column (top left, bottom left) -->
          <div class="flex flex-col" style="width: 50%;">
            <!-- Top left image -->
            <div class="w-full">
              <img src="https://placehold.co/500x340" alt="Technician in red cap and gloves checking water quality in a hot tub" class="w-full h-[340px] object-cover block">
            </div>
            <!-- Bottom left image -->
            <div class="w-full mt-2">
              <img src="https://placehold.co/500x260" alt="Man in blue swim cap and goggles sitting on pool edge cleaning the pool with a brush" class="w-full h-[260px] object-cover block">
            </div>
          </div>
          <!-- Right column (top right, middle right, bottom right) -->
          <div class="flex flex-col" style="width: 50%;">
            <!-- Top right image -->
            <div class="w-full">
              <img src="https://placehold.co/500x340" alt="Man in blue shirt and khaki shorts cleaning a pool with a telescopic pole in a tropical garden" class="w-full h-[340px] object-cover block">
            </div>
            <!-- Middle right image -->
            <div class="w-full mt-2">
              <img src="https://placehold.co/500x130" alt="Pool maintenance worker in blue overalls cleaning a pool with a net, with lounge chairs and water in the background" class="w-full h-[130px] object-cover block">
            </div>
            <!-- Bottom right empty space to match screenshot -->
            <div class="w-full mt-2" style="height: 130px;"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
