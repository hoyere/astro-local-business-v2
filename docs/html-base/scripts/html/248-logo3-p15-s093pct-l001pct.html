<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="newsletter-section py-0" style="background: linear-gradient(105deg, #061a3a 0 13%, #0ea5ff 13% 87%, #061a3a 87% 100%);">
      <div class="container mx-auto px-0 max-w-full">
        <div class="flex items-center justify-between w-full min-h-[120px]">
          <!-- Left Illustration -->
          <div class="flex-shrink-0 h-full flex items-center pl-8 md:pl-16" style="min-width:120px;">
            <img src="https://placehold.co/80x180/061a3a/fff?text=%20" alt="Illustration of a person holding a rope, standing on a pool deck" class="h-36 w-auto object-contain" style="margin-left:-16px;">
          </div>
          <!-- Center Content -->
          <div class="flex-1 flex flex-col md:flex-row items-center justify-between py-8">
            <h2 class="text-3xl font-bold text-on-primary md:text-left text-center leading-tight md:pl-4" style="color: #fff;">
              Subscribe For Our Latest<br class="hidden md:block"> Updates And News!
            </h2>
            <form class="flex flex-col md:flex-row items-center gap-4 md:gap-0 md:ml-8 w-full md:w-auto mt-6 md:mt-0" autocomplete="off" role="form">
              <label for="newsletter-email" class="sr-only">Email address</label>
              <input
                id="newsletter-email"
                type="email"
                required
                placeholder="Enter your Email"
                class="w-full md:w-[350px] h-12 rounded-l-full rounded-r-full md:rounded-r-none px-6 text-text bg-surface border border-border focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
                style="min-width:220px;"
              >
              <button
                type="submit"
                class="h-12 px-8 rounded-full md:rounded-l-none md:rounded-r-full bg-[#061a3a] text-on-primary font-semibold text-base focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
              >
                SUBSCRIBE
              </button>
            </form>
          </div>
          <!-- Right Illustration -->
          <div class="flex-shrink-0 h-full flex items-center pr-8 md:pr-16" style="min-width:120px;">
            <img src="https://placehold.co/120x80/0ea5ff/fff?text=%20" alt="Illustration of a swimmer in a pool" class="h-20 w-auto object-contain" style="margin-right:-16px;">
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
