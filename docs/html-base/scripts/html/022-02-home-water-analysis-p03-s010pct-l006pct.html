<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>

          <polygon points="0,0 1440,0 1200,80 240,80 0,0" fill="#2196f3" opacity="0.85"/>
          <polygon points="0,0 240,80 1200,80 1440,0 1440,40 1200,160 240,160 0,40" fill="#1976d2" opacity="0.7"/>
        </svg>
      </div>
      <div class="relative z-10 flex flex-col items-center justify-center min-h-[420px] pt-24">
        <div class="text-center">
          <div class="flex items-center justify-center mb-4">
            <span class="inline-flex items-center text-base font-semibold text-[#2196f3] tracking-wide">
              <span class="text-[#2196f3] text-xl font-bold mr-2">❰</span>
              <span class="text-[#2196f3]">What We D</span>

          <h1 class="text-4xl md:text-5xl font-extrabold text-[#0f1c18] tracking-tight">
            Pool Water Analysis at Your Service

      </div>
    </section>

    <!-- Cards Row Placeholder -->
    <section class="services-section bg-surface-alt pb-16">
      <div class="container mx-auto px-4 max-w-6xl">
        <div data-collection="services" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mt-0">
          <article data-item="service-1" class="bg-surface rounded-2xl shadow-none h-56 flex items-center justify-center transition">
            <!-- Placeholder for card content -->
          </article>
          <article data-item="service-2" class="bg-surface rounded-2xl shadow-none h-56 flex items-center justify-center transition">
          </article>
          <article data-item="service-3" class="bg-surface rounded-2xl shadow-none h-56 flex items-center justify-center transition">
          </article>
          <article data-item="service-4" class="bg-surface rounded-2xl shadow-none h-56 flex items-center justify-center transition">
          </article>
          <article data-item="service-5" class="bg-surface rounded-2xl shadow-none h-56 flex items-center justify-center transition">
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
