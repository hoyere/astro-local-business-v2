<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="team-section py-12 md:py-20 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div data-collection="team" class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-0">
          <article data-item="team-1" class="relative flex flex-col items-center">
            <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden">
              <img src="https://placehold.co/400x533?text=Team+Member+1" alt="Smiling male worker in blue uniform and cap, standing indoors" class="w-full h-full object-cover" />
            </div>
            <button type="button" aria-label="Share profile" class="absolute bottom-4 left-4 bg-accent text-on-accent rounded-full w-10 h-10 flex items-center justify-center shadow-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 border-4 border-background">
              <i class="fas fa-share-alt" data-icon="share-alt"></i>
            </button>
          </article>
          <article data-item="team-2" class="relative flex flex-col items-center">
            <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden">
              <img src="https://placehold.co/400x533?text=Team+Member+2" alt="Smiling male worker in white uniform and cap, giving thumbs up" class="w-full h-full object-cover" />
            </div>
            <button type="button" aria-label="Share profile" class="absolute bottom-4 left-4 bg-accent text-on-accent rounded-full w-10 h-10 flex items-center justify-center shadow-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 border-4 border-background">
              <i class="fas fa-share-alt" data-icon="share-alt"></i>
            </button>
          </article>
          <article data-item="team-3" class="relative flex flex-col items-center">
            <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden">
              <img src="https://placehold.co/400x533?text=Team+Member+3" alt="Serious male worker in blue uniform and cap, holding clipboard" class="w-full h-full object-cover" />
            </div>
            <button type="button" aria-label="Share profile" class="absolute bottom-4 left-4 bg-accent text-on-accent rounded-full w-10 h-10 flex items-center justify-center shadow-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 border-4 border-background">
              <i class="fas fa-share-alt" data-icon="share-alt"></i>
            </button>
          </article>
          <article data-item="team-4" class="relative flex flex-col items-center">
            <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden">
              <img src="https://placehold.co/400x533?text=Team+Member+4" alt="Smiling male worker in blue uniform and cap, standing indoors" class="w-full h-full object-cover" />
            </div>
            <button type="button" aria-label="Share profile" class="absolute bottom-4 left-4 bg-accent text-on-accent rounded-full w-10 h-10 flex items-center justify-center shadow-lg focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 border-4 border-background">
              <i class="fas fa-share-alt" data-icon="share-alt"></i>
            </button>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
