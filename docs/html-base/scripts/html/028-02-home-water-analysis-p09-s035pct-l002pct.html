<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="faq-hero-section py-16 md:py-24 bg-background relative overflow-hidden">
      <div class="container mx-auto px-4 max-w-6xl flex items-start relative z-10">
        <div class="flex-1 pt-8">
          <div class="flex items-center mb-4">
            <span class="inline-block w-3 h-3 bg-primary rounded-sm mr-2"></span>
            <span class="text-sm font-semibold text-primary">FAQs</span>
          </div>
          <h1 class="text-4xl md:text-5xl font-extrabold text-text leading-tight mb-0">
            Frequently Asked Have
          </h1>
        </div>
        <div class="flex-1 flex justify-end items-start relative">
          <div class="relative">
            <img src="https://placehold.co/160x220/png?text=Person+with+net" alt="Illustration of a person holding a pool net" class="w-40 h-56 object-contain relative z-20" style="margin-top: 1.5rem;">
            <img src="https://placehold.co/320x220/png?text=Swimming+pool+background" alt="Swimming pool background with rounded edge" class="absolute top-0 right-0 w-80 h-56 object-cover rounded-l-[120px] z-10" style="margin-left: -3rem;"/>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
