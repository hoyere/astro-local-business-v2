<html>
  <head>
    <meta charset="UTF-8">
    <title>Poolax - Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1796f7]">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-[90px]">
        <!-- Logo -->
        <div class="flex items-center">
          <div class="bg-background rounded-bl-[80px] rounded-br-[60px] rounded-tl-none rounded-tr-[60px] px-8 py-2 flex items-center shadow-none h-[90px] -ml-4">
            <a href="#" class="flex items-center space-x-2">
              <!-- Custom Poolax Logo Recreation -->
              <span class="relative font-bold text-[44px] leading-none text-[#0f1c18] font-sans tracking-tight" style="font-family: 'Montserrat', Arial, sans-serif;">
                <span class="relative">
                  P
                  <!-- Pool icon on top of 'o' -->
                  <span class="absolute left-[22px] top-[-10px]">
                    <svg width="38" height="28" viewBox="0 0 38 28" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle">
                      <ellipse cx="14" cy="18" rx="13" ry="8" fill="#1796f7"/>
                      <ellipse cx="28" cy="18" rx="9" ry="6" fill="#1796f7"/>
                      <ellipse cx="14" cy="18" rx="11" ry="6" fill="#fff" fill-opacity="0.3"/>
                      <ellipse cx="28" cy="18" rx="7" ry="4" fill="#fff" fill-opacity="0.3"/>
                      <!-- Pool ladder -->
                      <rect x="10" y="4" width="2" height="12" rx="1" fill="#0f1c18"/>
                      <rect x="20" y="4" width="2" height="12" rx="1" fill="#0f1c18"/>
                      <rect x="10" y="7" width="12" height="2" rx="1" fill="#0f1c18"/>
                      <rect x="10" y="11" width="12" height="2" rx="1" fill="#0f1c18"/>
                    </svg>
                  </span>
                </span>
                <span class="ml-[30px]">oolax</span>
              </span>
            </a>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex items-center justify-center">
          <ul class="flex space-x-8 text-[15px] font-medium text-on-primary">
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                HOME <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                SERVICES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                PAGES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline flex items-center gap-1">
                BLOGS <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4">
          <button aria-label="Search" class="w-12 h-12 rounded-full bg-background flex items-center justify-center text-[#1796f7] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 border border-border">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button aria-label="Menu" class="w-12 h-12 rounded-full bg-background flex items-center justify-center text-[#1796f7] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 border border-border">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-[#155e8c] min-h-[340px] flex items-end pb-16" style="background: linear-gradient(120deg, #155e8c 60%, #1796f7 100%);">
      <!-- Water background image with bubbles (simulated with SVG and absolute positioned bubbles) -->
      <div class="absolute inset-0 w-full h-full z-0 overflow-hidden">
        <img src="https://placehold.co/1600x500/155e8c/1796f7?text=Pool+Background" alt="Abstract pool water background with blue tones" class="w-full h-full object-cover opacity-70" />
        <!-- Bubbles SVGs -->
        <svg class="absolute left-[12%] top-[60%]" width="48" height="48" fill="none">
          <circle cx="24" cy="24" r="18" fill="#fff" fill-opacity="0.25"/>
          <circle cx="24" cy="24" r="14" fill="#fff" fill-opacity="0.15"/>
        </svg>
        <svg class="absolute left-[30%] top-[80%]" width="28" height="28" fill="none">
          <circle cx="14" cy="14" r="12" fill="#fff" fill-opacity="0.18"/>
        </svg>
        <svg class="absolute left-[60%] top-[70%]" width="24" height="24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#fff" fill-opacity="0.22"/>
        </svg>
        <svg class="absolute left-[80%] top-[40%]" width="40" height="40" fill="none">
          <circle cx="20" cy="20" r="16" fill="#fff" fill-opacity="0.18"/>
        </svg>
        <svg class="absolute left-[90%] top-[65%]" width="32" height="32" fill="none">
          <circle cx="16" cy="16" r="13" fill="#fff" fill-opacity="0.22"/>
        </svg>
        <svg class="absolute left-[70%] top-[85%]" width="16" height="16" fill="none">
          <circle cx="8" cy="8" r="7" fill="#fff" fill-opacity="0.18"/>
        </svg>
      </div>
      <div class="container mx-auto px-4 max-w-7xl relative z-10">
        <div class="pt-24">
          <h1 class="text-[56px] font-bold text-on-primary mb-6">Services</h1>
          <nav class="flex items-center space-x-2 text-lg text-on-primary" aria-label="Breadcrumb">
            <span>Home</span>
            <span class="mx-2 text-on-primary"><i class="fas fa-arrow-right text-base" data-icon="arrow-right"></i></span>
            <span class="text-on-primary">Services</span>
          </nav>
        </div>
      </div>
    </section>
  </body>
</html>
