<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <header class="header-section bg-background">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24">
        <!-- Logo -->
        <a href="#" class="flex items-center space-x-2">
          <!-- Custom Poolax Logo SVG -->
          <span class="block">
            <svg width="90" height="48" viewBox="0 0 90 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-10 w-auto" aria-hidden="true">
              <text x="0" y="38" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="48" fill="#0f1c18">P</text>
              <ellipse cx="32" cy="32" rx="13" ry="8" fill="#3ad6ff"/>
              <ellipse cx="58" cy="32" rx="13" ry="8" fill="#3ad6ff"/>
              <ellipse cx="32" cy="32" rx="13" ry="4" fill="#00bfff"/>
              <ellipse cx="58" cy="32" rx="13" ry="4" fill="#00bfff"/>
              <rect x="19" y="12" width="26" height="26" fill="none"/>
              <rect x="45" y="12" width="26" height="26" fill="none"/>
              <text x="32" y="38" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="48" fill="#0f1c18">olax</text>
              <!-- Pool handles -->
              <path d="M28 18 Q28 10 32 10 Q36 10 36 18" stroke="#0f1c18" stroke-width="2" fill="none"/>
              <path d="M54 18 Q54 10 58 10 Q62 10 62 18" stroke="#0f1c18" stroke-width="2" fill="none"/>
            </svg>
          </span>
        </a>
        <!-- Navigation -->
        <nav class="hidden lg:flex items-center space-x-8 ml-8">
          <a href="#" class="text-text font-medium text-sm tracking-wide flex items-center hover:text-primary transition-colors">
            HOME <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
          </a>
          <a href="#" class="text-text font-medium text-sm tracking-wide hover:text-primary transition-colors">
            ABOUT US
          </a>
          <a href="#" class="text-text font-medium text-sm tracking-wide flex items-center hover:text-primary transition-colors">
            SERVICES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
          </a>
          <a href="#" class="text-text font-medium text-sm tracking-wide flex items-center hover:text-primary transition-colors">
            PAGES <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
          </a>
          <a href="#" class="text-text font-medium text-sm tracking-wide flex items-center hover:text-primary transition-colors">
            BLOGS <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
          </a>
          <a href="#" class="text-text font-medium text-sm tracking-wide hover:text-primary transition-colors">
            CONTACT US
          </a>
        </nav>
        <!-- CTA Button & Hamburger -->
        <div class="flex items-center space-x-4 ml-8">
          <a href="#" class="bg-[#1693f7] hover:bg-[#0d7fd3] text-white text-sm font-semibold rounded-xl px-8 py-4 shadow-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors">
            REQUEST A QUOTE
          </a>
          <button aria-label="Open menu" class="ml-2 w-10 h-10 rounded-full bg-surface border border-border flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
            <i class="fas fa-bars text-text text-xl" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>
  </body>
</html>
