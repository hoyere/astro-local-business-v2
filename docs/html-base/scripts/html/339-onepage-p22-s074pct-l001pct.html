<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="news-header-section bg-background">
      <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex items-center justify-between pt-2 pb-4">
          <h2 class="text-[3rem] leading-none font-bold text-text -mb-2" style="font-family: 'Inter', sans-serif;">
            Our Latest News &amp; Updates
          </h2>
          <div class="flex gap-4">
            <button
              class="w-14 h-14 flex items-center justify-center rounded-full border border-[#2196f3] bg-transparent text-[#2196f3] text-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
              aria-label="Previous"
            >
              <i class="fas fa-arrow-left" data-icon="arrow-left"></i>
            </button>
            <button
              class="w-14 h-14 flex items-center justify-center rounded-full border border-[#2196f3] bg-transparent text-[#2196f3] text-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
              aria-label="Next"
            >
              <i class="fas fa-arrow-right" data-icon="arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
