<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .contact-bg {
        background: #0094ff;
        position: relative;
        overflow: hidden;
      }
      .contact-bg::after {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        width: 70%;
        height: 100%;
        background: url('https://www.transparenttextures.com/patterns/cubes.png');
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="contact-hero-section contact-bg py-20 md:py-32 w-full min-h-[320px]">
      <div class="container mx-auto px-4 max-w-7xl relative z-10">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between">
          <div class="md:w-1/2">
            <div class="flex items-center mb-4">
              <i class="fas fa-caret-right text-accent mr-2 text-lg" data-icon="caret-right"></i>
              <span class="text-on-primary font-semibold text-lg">Contact Us</span>
            </div>
            <h1 class="text-on-primary text-4xl md:text-6xl font-bold leading-tight mb-2">
              Feel Free to Contact Us
            </h1>
          </div>
          <div class="md:w-1/2 mt-8 md:mt-0">
            <p class="text-on-primary text-lg md:text-xl leading-relaxed">
              We can contact provides exceptional pool maintenance pool cleaning and pool equipment repair for the Area! We are master Contact provides exceptional pool maintenance pool cleaning and pool equipment.
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
