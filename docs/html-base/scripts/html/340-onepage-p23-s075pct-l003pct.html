<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">

            <div class="h-[220px] w-full rounded-xl overflow-hidden">
              <img src="https://placehold.co/400x220?text=Pool+vacuum+head+cleaning+tile+surface" alt="Pool vacuum head cleaning tile surface" class="object-cover w-full h-full"/>
            </div>
          </article>
          <!-- Divider -->
          <div class="flex flex-col justify-center">
            <div class="h-[160px] w-[2.5rem] flex items-center">
              <div class="mx-auto h-[120px] w-[2px] rounded bg-border"></div>
            </div>
          </div>
          <!-- Card 2 -->
          <article data-item="service-2" class="flex-1 flex flex-col justify-center">
            <div class="h-[220px] w-full rounded-xl overflow-hidden">
              <img src="https://placehold.co/400x220?text=Pool+vacuum+hose+connected+to+filter" alt="Pool vacuum hose connected to filter at poolside" class="object-cover w-full h-full"/>
            </div>
          </article>
          <!-- Divider -->
          <div class="flex flex-col justify-center">
            <div class="h-[160px] w-[2.5rem] flex items-center">
              <div class="mx-auto h-[120px] w-[2px] rounded bg-border"></div>
            </div>
          </div>
          <!-- Card 3 -->
          <article data-item="service-3" class="flex-1 flex flex-col justify-center">
            <div class="h-[220px] w-full rounded-xl overflow-hidden">
              <img src="https://placehold.co/400x220?text=Hand+using+test+strip+in+pool+water" alt="Hand using a test strip to check pool water quality" class="object-cover w-full h-full"/>
            </div>
          </article>
          <!-- Divider -->
          <div class="flex flex-col justify-center">
            <div class="h-[160px] w-[2.5rem] flex items-center">
              <div class="mx-auto h-[120px] w-[2px] rounded bg-border"></div>
            </div>
          </div>
          <!-- Card 4 -->
          <article data-item="service-4" class="flex-1 flex flex-col justify-center">
            <div class="h-[220px] w-full rounded-xl overflow-hidden">
              <img src="https://placehold.co/400x220?text=Pool+skimmer+and+stone+wall" alt="Pool skimmer net near stone wall and pool edge" class="object-cover w-full h-full"/>
            </div>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
