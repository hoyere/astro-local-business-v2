<html>
  <head>
    <title>Our Professional Expert Section</title>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background min-h-screen flex flex-col">
    <!-- Empty space to match screenshot -->
    <div class="flex-1"></div>

    <!-- Carousel Dots Section -->
    <section class="w-full flex flex-col items-center justify-center mb-8">
      <div class="w-full flex flex-col items-center">
        <div class="flex items-center justify-center w-full">
          <hr class="w-32 border-t border-border mx-2" />
          <div class="flex items-center space-x-2">
            <span class="w-3 h-3 rounded-full border border-border bg-surface"></span>
            <span class="w-3 h-3 rounded-full border-2 border-primary bg-surface"></span>
            <span class="w-3 h-3 rounded-full border border-border bg-surface"></span>
          </div>
          <hr class="w-32 border-t border-border mx-2" />
        </div>
      </div>
    </section>

    <!-- Team Members Section -->
    <section class="team-section py-0 pb-16 bg-background">
      <div class="container mx-auto px-4 max-w-6xl">
        <div class="flex flex-col items-center mb-8">
          <span class="text-sm text-primary font-medium mb-2 flex items-center">
            <span class="inline-block w-12 h-px bg-primary mr-2"></span>
            Team Members
            <span class="inline-block w-12 h-px bg-primary ml-2"></span>
          </span>
          <h2 class="text-2xl md:text-3xl font-bold text-text text-center leading-tight">
            Our Professional Expert
          </h2>
        </div>
        <div data-collection="team-members" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
          <article data-item="team-1" class="bg-surface rounded-lg overflow-hidden shadow-none flex flex-col items-center">
            <img src="https://placehold.co/400x400" alt="Smiling young man in a cap and lanyard standing in a modern indoor setting" class="w-full h-72 object-cover" />
          </article>
          <article data-item="team-2" class="bg-surface rounded-lg overflow-hidden shadow-none flex flex-col items-center">
            <img src="https://placehold.co/400x400" alt="Young man in a blue shirt standing outdoors with greenery in the background" class="w-full h-72 object-cover" />
          </article>
          <article data-item="team-3" class="bg-surface rounded-lg overflow-hidden shadow-none flex flex-col items-center">
            <img src="https://placehold.co/400x400" alt="Smiling man in a striped shirt holding an orange lifebuoy indoors" class="w-full h-72 object-cover" />
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
