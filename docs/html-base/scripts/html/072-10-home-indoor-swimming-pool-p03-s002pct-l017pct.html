<html>
  <head>
    <title>Year-Round Relaxation, Indoor Pool Satisfaction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      /* Custom pool pattern background */
      .pool-pattern {
        background: #4db2ff;
        position: relative;
        overflow: hidden;
      }
      .pool-pattern::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url('data:image/svg+xml;utf8,<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg"><g opacity="0.15"><path d="M100 100 Q120 120 140 100 T180 100 T220 100 T260 100 T300 100 T340 100 T380 100 T420 100 T460 100 T500 100 T540 100 T580 100 T620 100 T660 100 T700 100" stroke="white" stroke-width="8"/><ellipse cx="200" cy="200" rx="60" ry="40" fill="white" fill-opacity="0.2"/><ellipse cx="400" cy="300" rx="80" ry="50" fill="white" fill-opacity="0.2"/><ellipse cx="600" cy="180" rx="50" ry="30" fill="white" fill-opacity="0.2"/><ellipse cx="300" cy="400" rx="70" ry="40" fill="white" fill-opacity="0.2"/><ellipse cx="500" cy="500" rx="60" ry="30" fill="white" fill-opacity="0.2"/></g></svg>');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        z-index: 1;
      }
      .pool-clip {
        clip-path: polygon(0 0, 100% 0, 100% 85%, 92% 100%, 8% 100%, 0 85%);
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Hero Pool Pattern Section -->
    <section class="hero-section relative h-[420px] md:h-[480px] pool-pattern pool-clip">
      <!-- Decorative pool pattern background, handled by CSS -->
    </section>

    <!-- About Section -->
    <section class="about-section pt-0 pb-16 md:pb-24 bg-background">
      <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row items-end md:items-end relative">
        <div class="w-full md:w-1/2 pt-12 md:pt-24">
          <span class="block text-sm font-semibold text-primary mb-2" style="color: var(--color-primary);">
            About Us
            <span class="inline-block align-middle ml-2 w-10 h-[2px] bg-primary" style="background-color: var(--color-primary);"></span>
          </span>
          <h1 class="text-3xl md:text-4xl font-extrabold text-text mb-4 leading-tight">
            Year-Round Relaxation,<br>
            Indoor Pool Satisfaction
          </h1>
          <p class="text-text-muted text-base md:text-lg max-w-md">
            Opening in spring and closing in fall are ideal. However, it depends on local climate conditions; a professional service can guide you based on your location, regular chlorination, proper water cleaning.
          </p>
        </div>
        <div class="w-full md:w-1/2 flex justify-end mt-10 md:mt-0">
          <img src="https://placehold.co/420x320?text=Poolside+chairs+and+palms+3d+illustration" alt="3D illustration of a relaxing indoor pool area with lounge chairs, palm plants, and a striped umbrella" class="w-[340px] md:w-[420px] h-auto object-contain drop-shadow-xl select-none pointer-events-none" draggable="false">
        </div>
      </div>
    </section>
  </body>
</html>
