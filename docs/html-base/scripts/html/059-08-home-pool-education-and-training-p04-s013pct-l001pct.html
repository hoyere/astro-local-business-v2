<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="empty-grid-section py-0 min-h-screen bg-background">
      <div class="flex h-screen">
        <!-- Left gutter -->
        <div class="bg-surface-alt w-[40px] min-w-[40px] border-r border-border"></div>
        <!-- 4 columns -->
        <div class="flex-1 flex">
          <div class="flex-1 border-r border-border"></div>
          <div class="flex-1 border-r border-border"></div>
          <div class="flex-1 border-r border-border"></div>
          <div class="flex-1"></div>
        </div>
        <!-- Right gutter -->
        <div class="bg-surface-alt w-[40px] min-w-[40px] border-l border-border"></div>
      </div>
    </section>
  </body>
</html>
