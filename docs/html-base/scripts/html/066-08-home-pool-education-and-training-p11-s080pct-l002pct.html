<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
      .newsletter-bg {
        background: #0456e9;
        background-image: url('https://www.transparenttextures.com/patterns/diamond-upholstery.png'), linear-gradient(120deg, #0456e9 0%, #0456e9 100%);
        background-size: cover;
        position: relative;
        overflow: hidden;
      }
      @media (max-width: 1023px) {
        .newsletter-form-flex {
          flex-direction: column;
          gap: 1rem;
        }
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="newsletter-section py-12 newsletter-bg">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between gap-8">
        <h2 class="text-on-primary text-2xl md:text-2xl font-bold tracking-tight">
          Sign Up to get updates & news about us.
        </h2>
        <form class="flex newsletter-form-flex flex-row gap-4 w-full max-w-xl justify-end" autocomplete="off">
          <label for="newsletter-email" class="sr-only">Enter your Email</label>
          <input
            id="newsletter-email"
            type="email"
            required
            placeholder="Enter your Email"
            class="flex-1 rounded-lg px-6 py-4 bg-surface text-text text-base placeholder:text-text-muted border-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
            aria-label="Enter your Email"
          />
          <button
            type="submit"
            class="rounded-lg px-10 py-4 bg-[#0a1633] text-on-primary text-base font-semibold transition hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
          >
            SUBSCRIBE
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
