<html>
  <head>
    <title>Water Analysis - Poolax</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background text-text">
    <!-- Header/Navbar -->
    <header class="w-full bg-[#1792f5]">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24">
        <!-- Logo -->
        <div class="flex items-center">
          <div class="bg-background rounded-bl-[80px] rounded-br-[80px] rounded-tl-none rounded-tr-[80px] h-24 flex items-center px-8 -ml-4 shadow-none">
            <span class="text-[44px] font-bold text-[#0f1c18] flex items-center select-none" style="font-family: 'Montserrat', sans-serif;">
              <span class="relative mr-1">
                P
                <span class="absolute left-1 top-2">
                  <svg width="32" height="18" viewBox="0 0 32 18" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block align-middle" style="vertical-align:middle;">
                    <ellipse cx="8" cy="9" rx="8" ry="9" fill="#1792f5"/>
                    <ellipse cx="24" cy="9" rx="8" ry="9" fill="#1792f5"/>
                  </svg>
                </span>
              </span>
              <span class="ml-2">oolax</span>
            </span>
          </div>
        </div>
        <!-- Navigation -->
        <nav class="flex-1 flex items-center justify-center">
          <ul class="flex space-x-8 text-[15px] font-medium text-on-primary">
            <li>
              <a href="#" class="flex items-center hover:underline">
                HOME
                <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">ABOUT US</a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                SERVICES
                <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                PAGES
                <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="flex items-center hover:underline">
                BLOGS
                <i class="fas fa-plus text-xs ml-1" data-icon="plus"></i>
              </a>
            </li>
            <li>
              <a href="#" class="hover:underline">CONTACT US</a>
            </li>
          </ul>
        </nav>
        <!-- Icons -->
        <div class="flex items-center space-x-4">
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-background text-[#0f1c18] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Search">
            <i class="fas fa-search" data-icon="search"></i>
          </button>
          <button class="w-12 h-12 flex items-center justify-center rounded-full bg-background text-[#0f1c18] text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" aria-label="Menu">
            <i class="fas fa-bars" data-icon="bars"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section relative bg-[#156bbd] overflow-hidden" style="background: linear-gradient(120deg, #156bbd 60%, #1792f5 100%);">
      <div class="absolute inset-0 z-0">
        <!-- Pool background image with bubbles (placeholder) -->
        <img src="https://placehold.co/1600x600/156bbd/ffffff?text=Pool+background+with+bubbles" alt="Background image of a swimming pool with bubbles" class="w-full h-full object-cover opacity-60">
        <!-- Overlay for blue geometric shapes -->
        <svg class="absolute left-0 top-0 w-full h-full" viewBox="0 0 1600 600" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="0,0 900,0 1600,600 0,600" fill="#1792f5" fill-opacity="0.25"/>
        </svg>
      </div>
      <div class="relative z-10 container mx-auto px-4 max-w-7xl py-24 md:py-32">
        <h1 class="text-5xl md:text-6xl font-bold text-on-primary mb-8">Water Analysis</h1>
        <nav class="flex items-center space-x-2 text-lg" aria-label="Breadcrumb">
          <a href="#" class="text-on-primary text-base hover:underline">Home</a>
          <span class="text-on-primary text-base flex items-center">
            <i class="fas fa-arrow-right mx-2 text-base" data-icon="arrow-right"></i>
          </span>
          <span class="text-on-primary text-base">Water Analysis</span>
        </nav>
      </div>
    </section>
  </body>
</html>
