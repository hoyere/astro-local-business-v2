<html>
  <head>
    <style>
      :root {
        /* Primary (Emerald Green) */
        --color-primary: #02a26a;
        --color-primary-light: #3ad69e;
        --color-primary-dark: #0c7e5a;

        /* Accent (Golden Yellow) */
        --color-accent: #ffdd6a;
        --color-accent-dark: #e6be46;

        /* Text (Green-Black Tones) */
        --color-text: #0f1c18;
        --color-text-secondary: #374b44;
        --color-text-muted: #64786e;
        --color-text-inverse: #ffffff;
        --color-on-primary: #ffffff;
        --color-on-accent: #0f1c18;

        /* Surfaces */
        --color-background: #ffffff;
        --color-surface: #ffffff;
        --color-surface-alt: #f5fbf8;
        --color-border: #dcebe4;

        /* Status */
        --color-success: #0d9668;
        --color-error: #dc2626;
        --color-warning: #d97706;
        --color-info: #0284c7;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  </head>
  <body class="bg-background">
    <section class="hero-section relative overflow-hidden bg-[#232834]">

        <div class="absolute inset-0 bg-black/60"></div>
      </div>
      <div class="relative z-10 py-24 md:py-32">
        <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row items-center justify-between">
          <div class="w-full md:w-2/3">
            <div class="flex items-center mb-4">
              <span class="text-[#2196f3] font-medium text-lg md:text-base" style="letter-spacing:0.01em;">Feel Free To Contact Use</span>
              <span class="ml-4 h-0.5 w-20 bg-[#2196f3] rounded"></span>
            </div>

              Get Premium Pool Services<br>
              From With Us!
            </h1>

              GET OUR SERVICES
            </button>
            <button class="px-8 py-5 bg-transparent border border-white text-white text-lg font-medium rounded transition-colors hover:bg-white hover:text-[#232834] focus:outline-none focus:ring-2 focus:ring-[#2196f3] focus:ring-offset-2">
              CONTACT US
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
