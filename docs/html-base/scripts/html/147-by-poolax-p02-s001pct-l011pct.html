<html>
<head>
  <meta charset="UTF-8">
  <title>Author: Poolax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Primary (Emerald Green) */
      --color-primary: #02a26a;
      --color-primary-light: #3ad69e;
      --color-primary-dark: #0c7e5a;

      /* Accent (Golden Yellow) */
      --color-accent: #ffdd6a;
      --color-accent-dark: #e6be46;

      /* Text (Green-Black Tones) */
      --color-text: #0f1c18;
      --color-text-secondary: #374b44;
      --color-text-muted: #64786e;
      --color-text-inverse: #ffffff;
      --color-on-primary: #ffffff;
      --color-on-accent: #0f1c18;

      /* Surfaces */
      --color-background: #ffffff;
      --color-surface: #ffffff;
      --color-surface-alt: #f5fbf8;
      --color-border: #dcebe4;

      /* Status */
      --color-success: #0d9668;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --color-info: #0284c7;
    }
    /* Custom styles for logo shape */
    .logo-bg {
      border-bottom-right-radius: 4rem;
      border-bottom-left-radius: 0;
      border-top-right-radius: 4rem;
      border-top-left-radius: 0;
    }
    /* Bubble effect for hero background */
    .bubble {
      position: absolute;
      border-radius: 9999px;
      background: rgba(255,255,255,0.25);
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
      pointer-events: none;
      mix-blend-mode: lighten;
    }
    .bubble1 { width: 56px; height: 56px; left: 140px; top: 260px; }
    .bubble2 { width: 36px; height: 36px; left: 340px; top: 420px; }
    .bubble3 { width: 28px; height: 28px; left: 900px; top: 320px; }
    .bubble4 { width: 44px; height: 44px; left: 1100px; top: 200px; }
    .bubble5 { width: 24px; height: 24px; left: 1200px; top: 400px; }
    .bubble6 { width: 20px; height: 20px; left: 700px; top: 500px; }
    /* Responsive logo shape */
    @media (max-width: 768px) {
      .logo-bg {
        border-bottom-right-radius: 2rem;
        border-top-right-radius: 2rem;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
</head>
<body class="bg-background text-text">

  <!-- Header/Navbar -->
  <header class="w-full bg-primary">
    <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between h-24">
      <!-- Logo -->
      <div class="flex items-center">
        <div class="bg-background logo-bg shadow-md flex items-center px-8 py-4 h-24" style="border-bottom-right-radius: 4rem; border-top-right-radius: 4rem;">
          <span class="text-4xl font-bold text-text flex items-center select-none" style="font-family: 'Montserrat', sans-serif;">
            <span class="relative mr-1">
              P
              <!-- Pool icon for 'oo' -->
              <span class="inline-block relative -mx-1 align-middle">
                <span class="relative">
                  <span class="inline-block w-6 h-6 bg-primary rounded-full border-2 border-primary-light align-middle"></span>
                  <span class="inline-block w-6 h-6 bg-primary rounded-full border-2 border-primary-light align-middle -ml-3"></span>
                  <!-- Pool ladders -->
                  <span class="absolute left-1 top-0.5 w-1 h-4 border-l-2 border-primary-dark" style="height: 18px; left: 6px;"></span>
                  <span class="absolute left-4 top-0.5 w-1 h-4 border-l-2 border-primary-dark" style="height: 18px; left: 18px;"></span>
                  <span class="absolute left-1.5 top-2 w-3 h-1 border-t-2 border-primary-dark rounded-t" style="width: 10px; left: 8px;"></span>
                </span>
              </span>
            </span>
            lax
          </span>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 flex items-center justify-center">
        <ul class="flex space-x-8 text-on-primary font-medium text-base">
          <li>
            <a href="#" class="hover:underline flex items-center gap-1">
              HOME <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline flex items-center gap-1">
              ABOUT US
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline flex items-center gap-1">
              SERVICES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline flex items-center gap-1">
              PAGES <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline flex items-center gap-1">
              BLOGS <i class="fas fa-plus text-xs" data-icon="plus"></i>
            </a>
          </li>
          <li>
            <a href="#" class="hover:underline flex items-center gap-1">
              CONTACT US
            </a>
          </li>
        </ul>
      </nav>
      <!-- Icons -->
      <div class="flex items-center space-x-4">
        <button aria-label="Search" class="w-12 h-12 rounded-full bg-background flex items-center justify-center text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-search" data-icon="search"></i>
        </button>
        <button aria-label="Menu" class="w-12 h-12 rounded-full bg-background flex items-center justify-center text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
          <i class="fas fa-bars" data-icon="bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section relative overflow-hidden" style="background: linear-gradient(120deg, #1e5eaa 0%, #1e5eaa 40%, #2a7fcf 100%);">
    <div class="absolute inset-0 z-0">
      <!-- Pool net and bubbles background image -->
      <img src="https://placehold.co/1600x600/1e5eaa/ffffff?text=Pool+net+background+with+bubbles" alt="Pool net and water with floating bubbles" class="w-full h-full object-cover opacity-60">
      <!-- Bubbles (SVG or divs for effect) -->
      <span class="bubble bubble1"></span>
      <span class="bubble bubble2"></span>
      <span class="bubble bubble3"></span>
      <span class="bubble bubble4"></span>
      <span class="bubble bubble5"></span>
      <span class="bubble bubble6"></span>
    </div>
    <div class="relative z-10 container mx-auto px-4 max-w-7xl py-24 md:py-32">
      <div class="mb-6">
        <nav class="flex items-center space-x-2 text-on-primary text-lg" aria-label="Breadcrumb">
          <a href="#" class="text-on-primary hover:underline">Home</a>
          <span class="mx-1 text-on-primary opacity-70"><i class="fas fa-angle-right" data-icon="angle-right"></i></span>
          <span class="text-on-primary opacity-90">Author: Poolax</span>
        </nav>
      </div>
      <h1 class="text-5xl md:text-6xl font-bold text-on-primary mb-2">Author: Poolax</h1>
    </div>
  </section>

</body>
</html>
