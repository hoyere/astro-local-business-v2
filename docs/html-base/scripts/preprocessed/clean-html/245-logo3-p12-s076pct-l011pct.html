  <!-- Appointment Section -->
  <section class="appointment-section py-16 md:py-24 bg-background">
    <div class="container mx-auto px-4 max-w-5xl">
      <div class="bg-surface rounded-2xl shadow-none border border-border p-6 md:p-10">
        <div class="flex flex-col md:flex-row gap-8">
          <!-- Form -->
          <form class="flex-1" autocomplete="off">
            <h2 class="text-2xl font-bold text-text mb-6">Book An Appointment</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <!-- Name -->
              <div class="relative">
                <label for="name" class="sr-only">Your Name</label>
                <input id="name" type="text" placeholder="Your Name" class="w-full bg-surface border border-border rounded-lg py-3 px-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition" />
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                  <i class="fa fa-user" data-icon="user"></i>
                </span>
              </div>
              <!-- Email -->
              <div class="relative">
                <label for="email" class="sr-only">Your Email</label>
                <input id="email" type="email" placeholder="Your Email" class="w-full bg-surface border border-border rounded-lg py-3 px-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition" />
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                  <i class="fa fa-envelope" data-icon="envelope"></i>
                </span>
              </div>
              <!-- Phone -->
              <div class="relative">
                <label for="phone" class="sr-only">Phone Number</label>
                <input id="phone" type="tel" placeholder="Phone Number" class="w-full bg-surface border border-border rounded-lg py-3 px-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition" />
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                  <i class="fa fa-phone" data-icon="phone"></i>
                </span>
              </div>
              <!-- Service -->
              <div class="relative">
                <label for="service" class="sr-only">Select Service</label>
                <select id="service" class="w-full bg-surface border border-border rounded-lg py-3 px-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition appearance-none">
                  <option>Select Service</option>
                  <option>Cleaning</option>
                  <option>Repair</option>
                  <option>Maintenance</option>
                </select>
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                  <i class="fa fa-chevron-down" data-icon="chevron-down"></i>
                </span>
              </div>
            </div>
            <!-- Message -->
            <div class="relative mb-6">
              <label for="message" class="sr-only">Write message...</label>
              <textarea id="message" rows="4" placeholder="Write message...." class="w-full bg-surface border border-border rounded-lg py-3 px-4 pr-10 text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition resize-none"></textarea>
              <span class="absolute right-3 top-3 text-text-muted pointer-events-none">
                <i class="fa fa-comment" data-icon="comment"></i>
              </span>
            </div>
            <!-- Button -->
            <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-on-primary font-semibold rounded-lg py-3 transition focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
              APPOINTMENT NOW
            </button>
          </form>
        </div>
        <!-- Contact Info -->
        <div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6 text-center md:text-left">
          <div class="flex flex-col items-center md:items-start">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-alt border border-border mb-2">
              <i class="fa fa-map-marker-alt text-primary text-lg" data-icon="map-marker-alt"></i>
            </div>
            <span class="text-text-muted text-sm">Office location</span>
            <span class="font-semibold text-text mt-1">4648 Rocky, New York</span>
          </div>
          <div class="flex flex-col items-center md:items-start">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-alt border border-border mb-2">
              <i class="fa fa-envelope text-primary text-lg" data-icon="envelope"></i>
            </div>
            <span class="text-text-muted text-sm">Send email</span>
            <span class="font-semibold text-text mt-1">info@poolax.com</span>
          </div>
          <div class="flex flex-col items-center md:items-start">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-alt border border-border mb-2">
              <i class="fa fa-phone-alt text-primary text-lg" data-icon="phone-alt"></i>
            </div>
            <span class="text-text-muted text-sm">Call emergency</span>
            <span class="font-semibold text-text mt-1">+88 0123 654 99</span>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Blog Section Heading -->
  <section class="blog-section bg-surface-alt py-12">
    <div class="container mx-auto px-4 max-w-4xl text-center">
      <div class="flex flex-col items-center mb-2">
        <span class="text-primary text-xs font-semibold flex items-center gap-2">
          <span class="inline-block w-1 h-4 bg-primary rounded-sm"></span>
          Blog Posts
          <span class="inline-block w-1 h-4 bg-primary rounded-sm"></span>
        </span>
      </div>
      <h2 class="text-3xl md:text-4xl font-bold text-text mb-2">Our Latest News & Updates</h2>
    </div>
  </section>
