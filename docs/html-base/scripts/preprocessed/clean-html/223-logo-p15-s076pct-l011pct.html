  <!-- Appointment Section -->
  <section class="appointment-section py-16 md:py-24 bg-background">
    <div class="container mx-auto px-4 max-w-4xl">
      <div class="bg-surface rounded-2xl shadow-none md:shadow-lg border border-border p-6 md:p-10">
        <form class="space-y-6">
          <h2 class="text-2xl font-bold text-text mb-4">Book An Appointment</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Name -->
            <div class="relative">
              <label for="name" class="sr-only">Your Name</label>
              <input id="name" name="name" type="text" placeholder="Your Name" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" autocomplete="off" />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                <i class="fa fa-user" data-icon="user"></i>
              </span>
            </div>
            <!-- Email -->
            <div class="relative">
              <label for="email" class="sr-only">Your Email</label>
              <input id="email" name="email" type="email" placeholder="Your Email" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" autocomplete="off" />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                <i class="fa fa-envelope" data-icon="envelope"></i>
              </span>
            </div>
            <!-- Phone -->
            <div class="relative">
              <label for="phone" class="sr-only">Phone Number</label>
              <input id="phone" name="phone" type="tel" placeholder="Phone Number" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" autocomplete="off" />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                <i class="fa fa-phone" data-icon="phone"></i>
              </span>
            </div>
            <!-- Service -->
            <div class="relative">
              <label for="service" class="sr-only">Select Service</label>
              <select id="service" name="service" class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 appearance-none">
                <option value="">Select Service</option>
                <option value="service1">Service 1</option>
                <option value="service2">Service 2</option>
                <option value="service3">Service 3</option>
              </select>
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none">
                <i class="fa fa-chevron-down" data-icon="chevron-down"></i>
              </span>
            </div>
          </div>
          <!-- Message -->
          <div class="relative">
            <label for="message" class="sr-only">Write message</label>
            <textarea id="message" name="message" rows="4" placeholder="Write message...." class="w-full rounded-lg border border-border bg-surface py-3 pl-4 pr-10 text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 resize-none"></textarea>
            <span class="absolute right-3 top-3 text-text-muted pointer-events-none">
              <i class="fa fa-comment-alt" data-icon="comment-alt"></i>
            </span>
          </div>
          <!-- Button -->
          <button type="submit" class="w-full bg-primary text-on-primary font-semibold rounded-lg py-3 transition hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
            APPOINTMENT NOW
          </button>
        </form>
        <!-- Contact Info Row -->
        <div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6" data-collection="contact-info">
          <!-- Office Location -->
          <div data-item="office-location" class="flex items-center space-x-4">
            <span class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-alt border border-border text-primary text-xl">
              <i class="fa fa-map-marker-alt" data-icon="map-marker-alt"></i>
            </span>
            <div>
              <div class="text-text-muted text-sm">Office location</div>
              <div class="font-semibold text-text">4648 Rocky, New York</div>
            </div>
          </div>
          <!-- Send Email -->
          <div data-item="send-email" class="flex items-center space-x-4">
            <span class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-alt border border-border text-primary text-xl">
              <i class="fa fa-envelope" data-icon="envelope"></i>
            </span>
            <div>
              <div class="text-text-muted text-sm">Send email</div>
              <div class="font-semibold text-text"><a href="mailto:info@poolax.com" class="hover:underline text-text">info@poolax.com</a></div>
            </div>
          </div>
          <!-- Call Emergency -->
          <div data-item="call-emergency" class="flex items-center space-x-4">
            <span class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-alt border border-border text-primary text-xl">
              <i class="fa fa-phone-alt" data-icon="phone-alt"></i>
            </span>
            <div>
              <div class="text-text-muted text-sm">Call emergency</div>
              <div class="font-semibold text-text"><a href="tel:+88012365499" class="hover:underline text-text">+88 0123 654 99</a></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Blog Posts Section Heading -->
  <section class="blog-section py-16 md:py-24 bg-surface-alt">
    <div class="container mx-auto px-4 max-w-4xl text-center">
      <div class="flex flex-col items-center mb-2">
        <span class="text-primary text-sm font-semibold flex items-center gap-2">
          <span class="inline-block w-1.5 h-4 bg-primary rounded-sm mr-2"></span>
          Blog Posts
          <span class="inline-block w-1.5 h-4 bg-primary rounded-sm ml-2"></span>
        </span>
      </div>
      <h2 class="text-3xl md:text-4xl font-bold text-text mb-2">Our Latest News & Updates</h2>
    </div>
  </section>
