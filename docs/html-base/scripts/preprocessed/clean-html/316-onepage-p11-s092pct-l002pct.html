    <section class="newsletter-section">
      <div class="relative w-full bg-[#0597fa]">
        <!-- Left angled dark blue shape -->
        <div class="absolute left-0 top-0 h-full w-[170px] md:w-[250px] bg-[#0a1a3c] -skew-x-[20deg] z-0"></div>
        <!-- Right angled dark blue shape -->
        <div class="absolute right-0 top-0 h-full w-[170px] md:w-[250px] bg-[#0a1a3c] skew-x-[20deg] z-0"></div>
        <div class="relative z-10 flex items-center justify-between max-w-7xl mx-auto px-6 py-8 min-h-[120px]">
          <!-- Left illustration -->
          <div class="hidden md:block flex-shrink-0 mr-6">
            <img src="https://placehold.co/80x180/png?text=Person+with+Paddle" alt="Illustration of a person standing with a paddle" class="h-36 w-auto object-contain" />
          </div>
          <!-- Main content -->
          <div class="flex-1 flex flex-col md:flex-row md:items-center md:justify-between">
            <h2 class="text-2xl md:text-3xl font-semibold text-white leading-tight mb-4 md:mb-0 md:mr-8">
              <span class="text-white">Subscribe For Our Latest<br class="hidden md:block" /> Updates And News!</span>
            </h2>
            <form class="flex w-full md:w-auto" autocomplete="off">
              <label for="newsletter-email" class="sr-only">Enter your Email</label>
              <input
                id="newsletter-email"
                type="email"
                placeholder="Enter your Email"
                class="w-full md:w-[340px] rounded-l-lg md:rounded-lg md:rounded-r-none px-6 py-3 text-base text-text bg-white border-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
                required
              />
              <button
                type="submit"
                class="ml-0 md:ml-0 rounded-r-lg md:rounded-lg md:rounded-l-none px-8 py-3 bg-[#0a1a3c] text-white font-medium text-base focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors"
              >
                SUBSCRIBE
              </button>
            </form>
          </div>
          <!-- Right illustration -->
          <div class="hidden md:block flex-shrink-0 ml-6">
            <img src="https://placehold.co/120x80/png?text=Swimmer+in+Pool" alt="Illustration of a swimmer in a pool" class="h-20 w-auto object-contain" />
          </div>
        </div>
      </div>
    </section>
