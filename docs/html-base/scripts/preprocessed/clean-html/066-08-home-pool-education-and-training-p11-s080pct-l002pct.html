    <section class="newsletter-section py-12 newsletter-bg">
      <div class="container mx-auto px-4 max-w-7xl flex items-center justify-between gap-8">
        <h2 class="text-on-primary text-2xl md:text-2xl font-bold tracking-tight">
          Sign Up to get updates & news about us.
        </h2>
        <form class="flex newsletter-form-flex flex-row gap-4 w-full max-w-xl justify-end" autocomplete="off">
          <label for="newsletter-email" class="sr-only">Enter your Email</label>
          <input
            id="newsletter-email"
            type="email"
            required
            placeholder="Enter your Email"
            class="flex-1 rounded-lg px-6 py-4 bg-surface text-text text-base placeholder:text-text-muted border-none focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
            aria-label="Enter your Email"
          />
          <button
            type="submit"
            class="rounded-lg px-10 py-4 bg-[#0a1633] text-on-primary text-base font-semibold transition hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
          >
            SUBSCRIBE
          </button>
        </form>
      </div>
    </section>
